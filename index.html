function calcAttAward(sid, awardWeek, allowedAbsences){
  let absences=0;
  for(let w=1;w<=awardWeek;w++){
    const wd=S.wdata[w];
    const attended=wd?.students?.[sid]?.attendance;
    if(!attended) absences++;
  }
  return absences<=allowedAbsences;
}

function getPastAwards(sid){
  const past={badge:false,wing:false,gems:0,award:false,seals:[]};
  Object.entries(S.wdata).forEach(([w,wd])=>{
    if(Number(w)===S.week) return;
    const a=wd?.students?.[sid]?.awards; if(!a) return;
    if(a.badge) past.badge=true;
    if(a.wing)  past.wing=true;
    if(a.award) past.award=true;
    past.gems+=(a.gems||0);
    (a.seals||[]).forEach(s=>{if(!past.seals.includes(s))past.seals.push(s);});
  });
  return past;
}

function initRound(n){return{id:Date.now()+n,name:`라운드 ${n}`,scores:{red:0,yellow:0,green:0,blue:0}};}
function initGame(n=1){return{rounds:Array.from({length:n},(_,i)=>initRound(i+1))};}
function initWD(){return{students:{},games:{sparks:initGame(1),tnt:initGame(1)},gameFinalized:false};}

function isLocked(){return S.closedWeeks.includes(S.week);}

function stuScore(sid){
  const d=getSD(sid),{attScore:a=50,uniScore:u=50,signScore:sg=50}=S.settings;
  return (d.attendance?a:0)+(d.uniform?u:0)+((d.signs||0)*sg);
}
function teamHb(tid){return S.students.filter(s=>s.team===tid).reduce((s,st)=>s+stuScore(st.id),0);}
function gameCum(type,tid){return(getWD().games?.[type]?.rounds||[]).reduce((s,r)=>s+(r.scores?.[tid]||0),0);}
function rankScores(type){
  const fp=S.settings.firstPlace, gap=S.settings.gap;
  // 점수 기준 정렬
  const sorted=[...TEAMS].sort((a,b)=>gameCum(type,b.id)-gameCum(type,a.id));
  const res={};
  let i=0;
  while(i<sorted.length){
    // 같은 점수인 팀 묶기
    const score=gameCum(type,sorted[i].id);
    let j=i;
    while(j<sorted.length && gameCum(type,sorted[j].id)===score) j++;
    // i~j-1 모두 같은 등수 → i번째 등수 점수 부여 (j-i개 건너뜀)
    const rankScore=Math.max(0, fp - i*gap);
    for(let k=i;k<j;k++) res[sorted[k].id]=rankScore;
    i=j;
  }
  return res;
}
function totalScore(tid){
  const hb=teamHb(tid);
  if(!getWD().gameFinalized) return hb;
  return hb+rankScores("sparks")[tid]+rankScores("tnt")[tid];
}
function allChecked(hb,field){const hs=hbStu(hb);return hs.length>0&&hs.every(s=>(getWD().students?.[s.id]||{})[field]);}

function parseCSV(text){
  text=text.replace(/^\uFEFF/,"").replace(/\r\n/g,"\n").replace(/\r/g,"\n");
  const lines=text.split("\n").map(l=>l.trim()).filter(Boolean);
  const result=[];
  lines.forEach((line,i)=>{
    if(i===0&&/이름|name/i.test(line)) return;
    const sep=line.includes("\t")?"\t":",";
    const raw=line.split(sep).map(x=>x.replace(/^"|"$/g,"").trim());
    const name=raw[0]||"";
    const teamRaw=(raw[1]||"").replace(/\s/g,"");
    const hb=(raw[2]||"").replace(/\s/g,"");
    const tid=TEAM_MAP[teamRaw];
    if(tid&&name) result.push({id:`s_${Date.now()}_${i}_${Math.random().toString(36).slice(2)}`,name,team:tid,handbook:hb});
  });
  return result;
}

function stopAllSounds(){Object.values(_ac).forEach(a=>{try{a.pause();a.currentTime=0;}catch(e){}});}
function playSound(key){
  try{stopAllSounds();if(!_ac[key])_ac[key]=new Audio(SOUNDS[key]);const a=_ac[key];a.currentTime=0;a.play().catch(()=>playFallback(key));}catch(e){playFallback(key);}
}
function playFallback(key){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    if(key==="drumroll"){for(let i=0;i<30;i++){const o=ctx.createOscillator(),g=ctx.createGain();o.type="sawtooth";o.frequency.value=80+Math.random()*40;const t=ctx.currentTime+i*0.05;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.15,t+0.02);g.gain.linearRampToValueAtTime(0,t+0.04);o.connect(g);g.connect(ctx.destination);o.start(t);o.stop(t+0.05);}}
    else if(key==="chime"){[523,659,784].forEach((f,i)=>{const o=ctx.createOscillator(),g=ctx.createGain();o.frequency.value=f;const t=ctx.currentTime+i*0.12;g.gain.setValueAtTime(0.3,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.4);o.connect(g);g.connect(ctx.destination);o.start(t);o.stop(t+0.4);});}
    else if(key==="fanfare"){[440,523,659,523].forEach((f,i)=>{const o=ctx.createOscillator(),g=ctx.createGain();o.type="square";o.frequency.value=f;const t=ctx.currentTime+i*0.15;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.2,t+0.02);g.gain.linearRampToValueAtTime(0,t+0.3);o.connect(g);g.connect(ctx.destination);o.start(t);o.stop(t+0.35);});}
    else if(key==="fanfare_big"){[523,659,784,1047,784,1047,1319].forEach((f,i)=>{const o=ctx.createOscillator(),g=ctx.createGain();o.type="square";o.frequency.value=f;const t=ctx.currentTime+i*0.15;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.3,t+0.02);g.gain.linearRampToValueAtTime(0,t+0.3);o.connect(g);g.connect(ctx.destination);o.start(t);o.stop(t+0.35);});}
  }catch(e){}
}

function startCeremony(){
  S.ceremony=true; S.cRevealed=[]; S.cBlink=null; S.cBlinkGroup=null;
  S.cScores={red:0,yellow:0,green:0,blue:0};
  S.cGameScores={red:0,yellow:0,green:0,blue:0};
  S.cPhase="ready"; S.cStep=0; S.cBanner=""; S.cBannerIdx=0;
  const targets={};
  TEAMS.forEach(t=>{targets[t.id]=totalScore(t.id);});
  S.cTargets=targets;
  S.cHbScores={};
  TEAMS.forEach(t=>{
    S.cGameScores[t.id]=(rankScores("sparks")[t.id]||0)+(rankScores("tnt")[t.id]||0);
    S.cHbScores[t.id]=totalScore(t.id)-(S.cGameScores[t.id]||0);
  });
  S.cSorted=[...TEAMS].sort((a,b)=>totalScore(b.id)-totalScore(a.id));
  S.cMaxScore=Math.max(...TEAMS.map(t=>targets[t.id]||0),1);

  // 동점 그룹 구성: [[4등팀들], [3등팀들], [2등팀들], [1등팀들]] 순 (낮은 등수부터)
  const byScore=[...S.cSorted]; // 높은 점수 순
  const groups=[];
  let i=0;
  while(i<byScore.length){
    const sc=totalScore(byScore[i].id);
    let j=i;
    while(j<byScore.length&&totalScore(byScore[j].id)===sc) j++;
    groups.push(byScore.slice(i,j).map(t=>t.id));
    i=j;
  }
  // 낮은 등수(4등)부터 발표 순서로 역순
  S.cTieGroups=groups.reverse(); // [4등그룹, 3등그룹, 2등그룹, 1등그룹]
  render();
}
function cAnimate(fromScores,toScores,dur,onDone){
  const t0=Date.now();
  (function tick(){
    const p=Math.min((Date.now()-t0)/dur,1),e=1-Math.pow(1-p,3);
    TEAMS.forEach(t=>{
      S.cScores[t.id]=Math.round((fromScores[t.id]||0)+((toScores[t.id]||0)-(fromScores[t.id]||0))*e);
    });
    updateBarsDirect();
    if(p<1){requestAnimationFrame(tick);}
    else{TEAMS.forEach(t=>{S.cScores[t.id]=toScores[t.id]||0;});onDone();}
  })();
}
function cNextStep(){
  if(S.cPhase==="animating"||S.cPhase==="done") return;
  const step=S.cStep;
  S.cPhase="animating";
  S.cDynBanner=null; S.cDynBanner2=null; // 이전 배너 클리어

  function noDecrease(from,to){
    const safe={};TEAMS.forEach(t=>{safe[t.id]=Math.max(from[t.id]||0,to[t.id]||0);});return safe;
  }

  // 동점 그룹: S.cTieGroups = [[4등들],[3등들],[2등들],[1등들]]
  const groups=S.cTieGroups||S.cSorted.map(t=>[t.id]).reverse();
  const totalGroups=groups.length;

  if(step===0){
    // 게임 점수 공개
    S.cBannerIdx=1; render();
    playSound("drumroll");
    cAnimate({red:0,yellow:0,green:0,blue:0},S.cGameScores,3200,()=>{
      S.cStep=1; S.cPhase="paused"; S.cBannerIdx=2; render();
    });
  } else if(step===1){
    // 암송 점수 합산 → 최저 순위 그룹부터 순차 공개
    S.cBannerIdx=2; S.cGroupStep=0; S.cStep=2; render();
    playSound("drumroll");
    _revealGroup(groups, 0, noDecrease);
  } else {
    // step 2+: 다음 그룹 공개 or 우승 공개
    const gIdx=S.cGroupStep||0;
    const groups2=S.cTieGroups||S.cSorted.map(t=>[t.id]).reverse();
    if(gIdx>=groups2.length){
      // 모든 그룹 공개됨 → 우승 선언
      const winners=groups2[groups2.length-1];
      const winNames=winners.map(id=>TEAMS.find(t=>t.id===id)?.name).join(", ");
      const isTie=winners.length>1;
      S.cDynBanner=isTie?`🏆 공동 우승! ${winNames}팀!`:`🏆 우승! ${winNames}팀!`;
      S.cDynBanner2="";
      S.cPhase="done";
      S.cBlinkGroup=winners;
      S.cBlink=winners[0];
      spawnConfetti(); playSound("fanfare_big");
      render();
      setTimeout(()=>{
        S.cDynBanner2="서울영동교회 어와나클럽원 모두 최고! 🎉\n우리는 하나님께 인정받는 부끄러울 것이 없는 일꾼!";
        render();
      },10000);
      return;
    }
    _revealGroup(groups, gIdx, noDecrease);
  }
}

function _revealGroup(groups, gIdx, noDecrease){
  const totalGroups=groups.length;
  if(gIdx>=totalGroups){
    S.cPhase="done"; S.cBannerIdx=9; spawnConfetti(); playSound("fanfare_big"); render();
    return;
  }
  const group=groups[gIdx]; // 이번에 공개할 팀들
  const isLast=gIdx===totalGroups-1;
  const groupRankFromBottom=gIdx; // 0=최하위, totalGroups-1=1등
  const rankFromTop=totalGroups-1-gIdx; // 0=1등

  // 바 목표: 이 그룹의 점수까지
  const groupScore=S.cTargets[group[0]]||0;
  const from={...S.cScores};
  const rawTo={};
  TEAMS.forEach(t=>{rawTo[t.id]=Math.min(S.cTargets[t.id]||0, groupScore);});
  const to=noDecrease(from,rawTo);

  playSound("drumroll");
  cAnimate(from,to,3200,()=>{
    // 그룹 공개
    S.cRevealed=[...S.cRevealed,...group];
    S.cGroupStep=gIdx+1;

    // 배너 인덱스 업데이트
    const sorted=S.cSorted;
    const names=group.map(id=>TEAMS.find(t=>t.id===id).name).join(", ");
    const isTie=group.length>1;

    if(isLast){
      // 1등 바 올라온 후 → 바로 우승 선언
      const isTieLast=group.length>1;
      const winNames=group.map(id=>TEAMS.find(t=>t.id===id)?.name).join(", ");
      S.cDynBanner=isTieLast?`🏆 공동 우승! ${winNames}팀!`:`🏆 우승! ${winNames}팀!`;
      S.cDynBanner2="";
      S.cPhase="done";
      S.cBlinkGroup=group; S.cBlink=group[0];
      spawnConfetti(); playSound("fanfare_big");
      setTimeout(()=>{S.cDynBanner2="서울영동교회 어와나클럽원 모두 최고! 🎉\n우리는 하나님께 인정받는 부끄러울 것이 없는 일꾼!";render()},10000);
    } else {
      // 중간 등수 공개
      const nextGroup=groups[gIdx+1];
      S.cPhase="paused";
      playSound("chime");
      const teamsAbove=groups.slice(gIdx+1).reduce((s,g)=>s+g.length,0);
      const curRank=teamsAbove+group.length;
      const nextRank=teamsAbove;
      const isSecond=nextRank===1;
      // 2등 = 준우승, 나머지는 숫자
      let curLabel;
      if(curRank===2) curLabel=isTie?"공동 준우승":"준우승";
      else curLabel=isTie?`공동 ${curRank}등`:`${curRank}등`;
      S.cDynBanner=`${names}팀 ${curLabel}! 🎉`;
      S.cDynBanner2=isSecond?`바로! 🏆 우승은?! 🥁`:`다음은 ${nextGroup.length>1?"공동 "+nextRank+"등":nextRank+"등"}은?! 🥁`;
      S.cBlinkGroup=group;
      S.cBlink=group[0];
      setTimeout(()=>{if(S.cBlink===group[0]){S.cBlink=null;S.cBlinkGroup=null;render();}},3000);
    }
    render();
  });
}

function el(tag,props={},...ch){
  const e=document.createElement(tag);
  Object.entries(props).forEach(([k,v])=>{
    if(k==="style"&&typeof v==="object") Object.assign(e.style,v);
    else if(k==="className") e.className=v;
    else if(k.startsWith("on")&&typeof v==="function") e.addEventListener(k.slice(2).toLowerCase(),v);
    else e.setAttribute(k,v);
  });
  ch.flat().forEach(c=>{if(c==null||c===false)return;e.appendChild(typeof c==="string"||typeof c==="number"?document.createTextNode(String(c)):c);});
  return e;
}
const D=(s,...c)=>el("div",{style:s},...c);
const SP=(s,...c)=>el("span",{style:s},...c);
const B=(s,fn,...c)=>el("button",{style:s,onClick:fn},...c);
function inp(ph,val,fn,style={},type="text"){
  const i=document.createElement("input");i.type=type;i.placeholder=ph;i.value=val!=null?String(val):"";
  Object.assign(i.style,{border:"1px solid #E2E8F0",borderRadius:"8px",padding:"8px 10px",fontSize:"13px",...style});
  i.addEventListener("input",()=>fn(i.value));return i;
}
function sel(opts,val,fn,style={}){
  const s=document.createElement("select");Object.assign(s.style,style);
  opts.forEach(([v,l,os])=>{const o=document.createElement("option");o.value=v;o.textContent=l;if(v===val)o.selected=true;if(os)Object.assign(o.style,os);s.appendChild(o);});
  s.addEventListener("change",()=>fn(s.value));return s;
}

        ()=>{S.hbTab=id;render();});
      btn.appendChild(mkClubLabel(id," "+label,16));return btn;
    })
  );

  const group=HB_GROUPS.find(g=>g.label===(S.hbTab==="sparks"?"Sparks":"T&T"));
  const dotColor=S.hbTab==="sparks"?"#EF4444":"#16A34A";
  const books=group?group.books.filter(hb=>S.students.some(s=>s.handbook===hb)):[];
  const wd=getWD();
  const bookCards=books.map((hb,i)=>{
    const hs=hbStu(hb);
    const att=hs.filter(s=>(wd.students?.[s.id]||{}).attendance).length;
    const uni=hs.filter(s=>(wd.students?.[s.id]||{}).uniform).length;
    const signs=hs.reduce((s,st)=>{const v=(wd.students?.[st.id]||{}).signs||0;return s+(typeof v==="number"?v:parseFloat(v)||0);},0);
    const pts=hs.reduce((s,st)=>s+stuScore(st.id),0);
    const btn=B({width:"100%",background:"#fff",border:"none",padding:"12px 14px",textAlign:"left",
      cursor:"pointer",display:"flex",flexDirection:"column",gap:"6px"},
      ()=>{S.selHb=hb;render();});
    const topRow=D({display:"flex",alignItems:"center",gap:"8px"});
    topRow.appendChild(D({width:"8px",height:"8px",borderRadius:"50%",background:dotColor,flexShrink:"0"}));
    topRow.appendChild(SP({fontWeight:"700",fontSize:"16px",color:"#1E293B",flex:"1"},hb));
    topRow.appendChild(SP({fontSize:"16px",fontWeight:"800",color:"#1E293B"},pts.toLocaleString()+"점"));
    topRow.appendChild(SP({color:"#CBD5E1",fontSize:"12px"},"›"));
    const botRow=D({display:"flex",alignItems:"center",gap:"6px",paddingLeft:"16px"});
    botRow.appendChild(SP({fontSize:"13px",color:"#94A3B8"},`출석 ${att}명 · 단복 ${uni}명 · 암송 ${Math.round(signs*10)/10}개`));
    btn.appendChild(topRow);btn.appendChild(botRow);
    return D({background:"#fff",borderRadius:"12px",border:"1px solid #E2E8F0",overflow:"hidden"},btn);
  });

  // 팀 합계
  const totalSigns=books.reduce((sum,hb)=>{
    return sum+hbStu(hb).reduce((s,st)=>{const v=(wd.students?.[st.id]||{}).signs||0;return s+(typeof v==="number"?v:parseFloat(v)||0);},0);
  },0);
  const totalPts=books.reduce((sum,hb)=>sum+hbStu(hb).reduce((s,st)=>s+stuScore(st.id),0),0);
  const totalStudents=books.reduce((sum,hb)=>sum+hbStu(hb).length,0);
  const footer=D({background:"#F8FAFC",borderRadius:"12px",border:"1px solid #E2E8F0",
    padding:"10px 14px",marginTop:"8px",
    display:"flex",justifyContent:"space-between",alignItems:"center"},
    SP({fontSize:"12px",color:"#94A3B8"},`총 ${totalStudents}명 · 암송 ${Math.round(totalSigns*10)/10}개`),
    SP({fontSize:"14px",fontWeight:"800",color:"#1E293B"},totalPts.toLocaleString()+"점")
  );

  const listBox=books.length
    ? D({display:"flex",flexDirection:"column",gap:"8px"},...bookCards)
    : mkEmpty();

  return D({},noticeBanner,tabBar,listBox,books.length?footer:null);
}

  const el=document.createElement("div");
  el.style.cssText=`width:${size}px;height:${size}px;flex-shrink:0;cursor:pointer;opacity:${active?"1":"0.2"};transition:opacity 0.15s;`;
  el.innerHTML=`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="${size}" height="${size}">
    <path fill="${active?"#ccd6dd":"#bbc"}" d="M29.333 2.667C23.111 0 16 0 16 0S8.889 0 2.667 2.667C0 16 2.667 27.556 16 32c13.333-4.444 16-16 13.333-29.333z"/>
    <path fill="${active?"#55acee":"#aab"}" d="M16 30.119C5.7 26.426 1.743 17.628 4.231 3.95 9.834 1.804 15.936 1.778 16 1.778c.063 0 6.185.036 11.769 2.172 2.488 13.677-1.468 22.476-11.769 26.169z"/>
    <path fill="${active?"#226699":"#889"}" d="M27.769 3.95C22.185 1.813 16.063 1.778 16 1.778v28.341c10.3-3.693 14.257-12.492 11.769-26.169z"/>
  </svg>`;
  return el;
}

    SP({fontSize:"17px",fontWeight:"800",color:"#1E293B"},totalPts.toLocaleString()+"점")
  );

  return D({},hdrRow,noticeBanner,...cards,footer);

function buildGame(){
  const wd=getWD(),fin=wd.gameFinalized,locked=isLocked();
  if(!S.roundModes) S.roundModes={};
  if(!S.roundLocks) S.roundLocks={};

  return D({},
    // 스팍스/티앤티 탭 + 게임 종료 버튼
    D({display:"flex",gap:"8px",marginBottom:"14px",alignItems:"stretch"},
      ...[["sparks","스팍스"],["tnt","티앤티"]].map(([t,l])=>{
        const btn=B({flex:"1",padding:"10px 0",borderRadius:"10px",border:"none",cursor:"pointer",
          fontWeight:"700",fontSize:"14px",
          background:S.gameTab===t?"#1E293B":"#F1F5F9",
          color:S.gameTab===t?"#fff":"#64748B"},
          ()=>{S.gameTab=t;render();});
        btn.appendChild(mkClubLabel(t," "+l,16));return btn;
      }),
      !locked?(
        !fin
          ? B({background:"#F8FAFC",border:"1px solid #E2E8F0",borderRadius:"10px",
              padding:"10px 12px",color:"#64748B",fontWeight:"700",fontSize:"13px",
              cursor:"pointer",whiteSpace:"nowrap",flexShrink:"0"},
              ()=>setFinalized(true),"🏆 게임 종료")
          : B({background:"#FEF2F2",border:"1px solid #FECACA",borderRadius:"10px",
              padding:"10px 12px",color:"#EF4444",fontWeight:"700",fontSize:"13px",
              cursor:"pointer",whiteSpace:"nowrap",flexShrink:"0"},
              ()=>setFinalized(false),"↩️ 취소")
      ):null
    ),
    fin?D({background:"#F0FDF4",border:"1px solid #BBF7D0",borderRadius:"10px",
      padding:"10px 14px",marginBottom:"12px",fontSize:"13px",color:"#16A34A"},
      "✅ 게임 결과 확정됨"):null,
    buildGameType(S.gameTab,wd,fin,locked)
  );
}

function buildGameType(type,wd,fin,locked){
  const game=wd.games?.[type]||initGame(1);
  // 라운드가 없으면 기본 라운드 1 자동 추가
  if(!game.rounds||game.rounds.length===0){
    setGame(type,g=>({...g,rounds:[initRound(1)]}));
  }
  if(!S.roundModes) S.roundModes={};
  if(!S.roundLocks) S.roundLocks={};

  async function addScore(roundId, tid, sc){
    // 잠금 상태 스냅샷 (비동기 전에)
    const lk=S.roundLocks[roundId]||{};
    const prevSc=lk[tid]!=null?lk[tid]:null;

    // 이미 같은 버튼 → 토글 해제
    if(prevSc===sc){
      const curScore=getWD().games?.[type]?.rounds?.find(r=>r.id===roundId)?.scores?.[tid]||0;
      await setGame(type,g=>({...g,rounds:g.rounds.map(r=>
        r.id===roundId?{...r,scores:{...r.scores,[tid]:Math.max(0,curScore-sc)}}:r
      )}));
      if(S.roundLocks[roundId]) delete S.roundLocks[roundId][tid];
      render(); return;
    }

    // 다른 버튼 선택 → 기존 입력 빼고 새 점수 추가
    const curScore=getWD().games?.[type]?.rounds?.find(r=>r.id===roundId)?.scores?.[tid]||0;
    const revert=prevSc!=null?prevSc:0;
    const newScore=Math.max(0, curScore - revert + sc);
    await setGame(type,g=>({...g,rounds:g.rounds.map(r=>
      r.id===roundId?{...r,scores:{...r.scores,[tid]:newScore}}:r
    )}));
    if(!S.roundLocks[roundId]) S.roundLocks[roundId]={};
    S.roundLocks[roundId][tid]=sc;
    render();
  }

  const reversedRounds=[...game.rounds].reverse();
  const wrap=D({});

  reversedRounds.forEach((round,ri)=>{
    const mode=S.roundModes[round.id]||"team";
    const isIndividual=mode==="individual";
    const scoreButtons=isIndividual?[50,100,150,200]:[100,200,300,400];
    const lk=S.roundLocks[round.id]||{};
    const allLocked=TEAMS.every(t=>lk[t.id]!=null);
    const lockedCount=TEAMS.filter(t=>lk[t.id]!=null).length;
    const origIdx=game.rounds.findIndex(r=>r.id===round.id);
    const isFirstRound=origIdx===0;
    const isLastRound=ri===0;

    const roundEl=D({});

    if(ri>0) roundEl.appendChild(D({borderTop:"2px dashed #E2E8F0",margin:"10px 0 8px"}));

    // 라운드 헤더
    const hdrRight=D({display:"flex",gap:"4px",alignItems:"center"});
    if(!fin&&!locked){
      hdrRight.appendChild(B({background:"none",border:"1px solid #E2E8F0",borderRadius:"6px",
        color:"#94A3B8",cursor:"pointer",fontSize:"11px",fontWeight:"600",padding:"3px 8px",whiteSpace:"nowrap"},
        ()=>{const n=prompt("라운드 이름:",round.name);if(n)setGame(type,g=>({...g,rounds:g.rounds.map(r=>r.id===round.id?{...r,name:n}:r)}));},"수정"));
      if(isFirstRound){
        hdrRight.appendChild(B({background:"none",border:"1px solid #FECACA",borderRadius:"6px",
          color:"#EF4444",cursor:"pointer",fontSize:"11px",fontWeight:"600",padding:"3px 8px",whiteSpace:"nowrap"},
          ()=>setGame(type,g=>({...g,rounds:[initRound(1)]})),"삭제"));
      } else {
        hdrRight.appendChild(B({background:"none",border:"1px solid #FECACA",borderRadius:"6px",
          color:"#EF4444",cursor:"pointer",fontSize:"11px",fontWeight:"600",padding:"3px 8px",whiteSpace:"nowrap"},
          ()=>{if(confirm("이 라운드를 삭제할까요?"))setGame(type,g=>({...g,rounds:g.rounds.filter(r=>r.id!==round.id)}));},"삭제"));
      }
    }

    const modeToggle=(!fin&&!locked)
      ? D({display:"flex",gap:"2px",background:"#F1F5F9",borderRadius:"8px",padding:"2px",flexShrink:"0"},
          B({padding:"4px 10px",borderRadius:"6px",border:"none",cursor:"pointer",fontSize:"14px",fontWeight:"700",
            background:!isIndividual?"#1E293B":"transparent",color:!isIndividual?"#fff":"#94A3B8"},
            ()=>{S.roundModes[round.id]="team";render();},"팀전"),
          B({padding:"10px 16px",borderRadius:"6px",border:"none",cursor:"pointer",fontSize:"13px",fontWeight:"700",
            background:isIndividual?"#1E293B":"transparent",color:isIndividual?"#fff":"#94A3B8"},
            ()=>{S.roundModes[round.id]="individual";render();},"개인전")
        )
      : SP({fontSize:"13px",color:"#94A3B8",fontWeight:"600",background:"#F8FAFC",borderRadius:"6px",padding:"3px 8px",flexShrink:"0"},
          isIndividual?"개인전":"팀전");

    roundEl.appendChild(D({display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"8px"},
      D({display:"flex",alignItems:"center",gap:"8px",flexWrap:"wrap"},
        D({fontWeight:"700",fontSize:"16px"},`🏃 ${round.name}`),
        modeToggle,
        lockedCount>0&&!allLocked
          ? SP({fontSize:"13px",color:"#F59E0B",background:"#FFFBEB",borderRadius:"6px",padding:"2px 8px",fontWeight:"600"},`${lockedCount}/4 입력됨`)
          : null
      ),
      hdrRight
    ));

    // 팀 카드들
    const cardsGrid=D({display:"grid",gap:"8px",marginBottom:"8px"});
    TEAMS.forEach(t=>{
      const isTeamLocked=lk[t.id]!=null;
      const curScore=round.scores?.[t.id]||0;
      const card=D({background:"#fff",borderRadius:"12px",
        border:`2px solid ${isTeamLocked?t.color:t.border}`,
        padding:"10px 12px",transition:"border-color 0.15s"});
      card.appendChild(D({display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"8px"},
        SP({fontWeight:"600",color:t.color,fontSize:"15px",display:"flex",alignItems:"center",gap:"5px"},
          D({width:"8px",height:"8px",borderRadius:"50%",background:t.color,flexShrink:"0"}),t.name+"팀"),
        SP({fontWeight:"800",color:t.color,fontSize:"17px"},curScore.toLocaleString(),"점")
      ));
      const btnRow=D({display:"flex",gap:"5px"});
      scoreButtons.forEach(sc=>{
        const isSelected=lk[t.id]===sc;
        const sb=D({flex:"1",background:isSelected?t.color:"#fff",
          color:isSelected?"#fff":isTeamLocked?"#CBD5E1":"#475569",
          borderRadius:"20px",padding:"14px 4px",textAlign:"center",
          fontWeight:"700",fontSize:"14px",cursor:(fin||locked)?"not-allowed":"pointer",
          border:`1.5px solid ${isSelected?t.color:"#E2E8F0"}`,
          opacity:isTeamLocked&&!isSelected?"0.5":"1",transition:"all 0.12s",userSelect:"none"});
        sb.textContent="+"+sc.toLocaleString();
        if(!fin&&!locked) sb.addEventListener("click",()=>addScore(round.id,t.id,sc));
        btnRow.appendChild(sb);
      });
      card.appendChild(btnRow);
      cardsGrid.appendChild(card);
    });
    roundEl.appendChild(cardsGrid);

    // 라운드 추가 버튼: 최신 라운드 아래, 전체입력시 초록 활성화
    if(isLastRound&&!fin&&!locked){
      const addBtn=B({
        width:"100%",
        background:allLocked?"linear-gradient(135deg,#22C55E,#16A34A)":"#F8FAFC",
        border:allLocked?"none":"2px dashed #CBD5E1",
        borderRadius:"10px",padding:"11px",
        color:allLocked?"#fff":"#94A3B8",
        fontWeight:"700",fontSize:"13px",cursor:"pointer",marginTop:"4px",
        boxShadow:allLocked?"0 4px 16px rgba(34,197,94,0.35)":"none",
        transition:"all 0.2s"
      },()=>setGame(type,g=>({...g,rounds:[...g.rounds,initRound(g.rounds.length+1)]})),
      allLocked?"✅ 라운드 완료 — 다음 라운드 추가":"+ 라운드 추가");
      roundEl.appendChild(addBtn);
    }

    wrap.appendChild(roundEl);
  });

  // 순위 모달
  if(S.showRankModal===type){
    const overlay=D({position:"fixed",inset:"0",background:"rgba(0,0,0,0.45)",
      display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:"160"});
    overlay.addEventListener("click",e=>{if(e.target===overlay){S.showRankModal=null;render();}});

    const sheet=D({background:"#fff",borderRadius:"20px 20px 0 0",
      width:"100%",maxWidth:"480px",padding:"20px 20px 32px"});

    sheet.appendChild(D({display:"flex",justifyContent:"space-between",alignItems:"center",
      marginBottom:"16px"},
      D({fontWeight:"700",fontSize:"16px"},"📊 "+(type==="sparks"?"스팍스":"티앤티")+" 누적 순위"),
      B({background:"none",border:"none",fontSize:"22px",cursor:"pointer",color:"#64748B"},
        ()=>{S.showRankModal=null;render();},"×")
    ));

    [...TEAMS].sort((a,b)=>gameCum(type,b.id)-gameCum(type,a.id)).forEach((t,i)=>{
      const maxScore=Math.max(...TEAMS.map(x=>gameCum(type,x.id)),1);
      const pct=Math.round((gameCum(type,t.id)/maxScore)*100);
      sheet.appendChild(D({marginBottom:"12px"},
        D({display:"flex",justifyContent:"space-between",marginBottom:"4px"},
          D({display:"flex",alignItems:"center",gap:"6px"},
            SP({fontSize:"16px"},["🥇","🥈","🥉",""][i]),
            SP({fontWeight:"700",color:t.color,fontSize:"14px"},t.name,"팀")
          ),
          SP({fontWeight:"800",color:t.color,fontSize:"14px"},gameCum(type,t.id).toLocaleString(),"점")
        ),
        D({background:"#F1F5F9",borderRadius:"6px",height:"8px",overflow:"hidden"},
          D({width:pct+"%",height:"100%",background:t.color,borderRadius:"6px",
            transition:"width 0.4s ease"})
        )
      ));
    });

    overlay.appendChild(sheet);
    wrap.appendChild(overlay);
  }

  return wrap;
}

function buildResult(sorted){
  const wd=getWD();
  function teamHbGroup(tid,grp){
    return S.students.filter(s=>s.team===tid&&grp.books.includes(s.handbook))
      .reduce((sum,st)=>sum+stuScore(st.id),0);
  }
  const sparksGrp=HB_GROUPS.find(g=>g.label==="Sparks");
  const tntGrp=HB_GROUPS.find(g=>g.label==="T&T");

  return D({},
    wd.gameFinalized?B({width:"100%",background:"linear-gradient(135deg,#7C3AED,#A855F7)",color:"#fff",border:"none",borderRadius:"12px",padding:"14px",fontWeight:"800",fontSize:"15px",cursor:"pointer",marginBottom:"14px"},()=>startCeremony(),"🏆 시상식 공개"):null,
    D({fontWeight:"600",fontSize:"15px",marginBottom:"12px"},"최종 결과"),
    ...sorted.map((t,i)=>{
      const isFirst=i===0;
      const sparksHb=teamHbGroup(t.id,sparksGrp);
      const tntHb=teamHbGroup(t.id,tntGrp);

          ),

  );

function buildAwardPopup(){
  const {sid,name,hb}=S.awardPopup;
  const st=S.students.find(s=>s.id===sid);
  const t=getTeam(st?.team||"red");
  const isSpks=getAwardGroup(hb)==="sparks";
  const cur=getAwards(sid);
  const past=getPastAwards(sid);
  const isAdmin=S.role==="admin";
  const locked=isLocked();
  const close=()=>{S.awardPopup=null;render();};
  async function save(patch){await saveAwards(sid,{...cur,...patch});S.awardPopup={sid,name,hb};render();}

  function mkCircle(n,color,bg,border,size=36){
    return D({width:size+"px",height:size+"px",borderRadius:"50%",
      display:"flex",alignItems:"center",justifyContent:"center",
      background:bg,border:`2px solid ${border}`,
      fontWeight:"800",fontSize:(size*0.38)+"px",color,flexShrink:"0"},String(n));
  }

  function buildSparks(){
    const badgeNum=HB_BADGE_NUM[hb]||1;
    const hadBadge=!!st?.badge, hasBadge=!!cur.badge;
    const hadWing=!!st?.wing,   hasWing=!!cur.wing;
    const pastGems=past.gems||0, curGems=cur.gems||0, totalGems=pastGems+curGems;

    function mkBadgeCard(label,had,has,stuKey,curKey){
      const bc=HB_BADGE_COLOR[hb]||{color:"#22C55E",light:"#F0FDF4",border:"#86EFAC"};
      const bg=had?bc.light:has?bc.light:"#F8FAFC";
      const border=had?bc.color:has?bc.color:"#E2E8F0";
      const circleColor=had?bc.color:has?bc.color:"#E2E8F0";
      const card=D({flex:"1",borderRadius:"12px",border:`2px solid ${border}`,
        background:bg,padding:"12px 8px",textAlign:"center",
        cursor:locked?"not-allowed":"pointer",position:"relative"},
        D({width:"44px",height:"44px",borderRadius:"50%",margin:"0 auto 8px",
          background:circleColor,
          display:"flex",alignItems:"center",justifyContent:"center",
          fontWeight:"800",fontSize:"18px",color:"#fff"},
          had||has?"✓":String(badgeNum)
        ),
        D({fontSize:"12px",fontWeight:"700",color:(had||has)?bc.color:"#1E293B",lineHeight:"1.3"},label),
        had?D({fontSize:"10px",color:bc.color,marginTop:"4px"},"완료 ✓"):null,
        isAdmin&&had?B({position:"absolute",top:"4px",right:"4px",fontSize:"10px",
          color:"#EF4444",background:"#fff",border:"1px solid #FECACA",
          borderRadius:"4px",padding:"1px 5px",cursor:"pointer"},
          async e=>{e.stopPropagation();
            await saveStuMilestone(sid,{[stuKey]:false});
            await save({[curKey]:false});
            S.awardPopup={sid,name,hb};render();
          },"해제"):null
      );
      if(!locked) card.addEventListener("click",async e=>{
        if(e.target.tagName==="BUTTON") return;
        const newVal=!(had||has);
        await saveStuMilestone(sid,{[stuKey]:newVal});
        await save({[curKey]:newVal});
      });
      return card;
    }

    const totalGems2=pastGems+curGems;
    const gemGrid=D({display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:"8px"},
      ...GEM_SEQ.map((tid,i)=>{
        const tm=TEAMS.find(x=>x.id===tid);
        const gemName=tid==="red"?"빨강":"초록";
        const isDone=i<totalGems2;
        const isCurRange=i>=pastGems&&i<totalGems2;
        const isDisabled=locked;

        const circleStyle={width:"36px",height:"36px",borderRadius:"50%",
          display:"flex",alignItems:"center",justifyContent:"center",
          fontWeight:"800",fontSize:"15px"};

        const circle=isDone
          ?D({...circleStyle,background:tm.color,color:"#fff"},"✓")
          :D({...circleStyle,background:"#F8FAFC",border:"1px solid #E2E8F0",color:"#CBD5E1"},String(i+1));

        const box=D({display:"flex",flexDirection:"column",alignItems:"center",gap:"5px",
          padding:"10px 6px",borderRadius:"10px",
          border:`2px solid ${isDone?tm.color:"#E2E8F0"}`,
          background:isDone?tm.light:"#F8FAFC",
          cursor:isDisabled?"default":"pointer",
          opacity:"1"},
          circle,
          SP({fontSize:"10px",fontWeight:isDone?"700":"400",
            color:isDone?tm.color:"#CBD5E1"},gemName)
        );

        if(!isDisabled) box.addEventListener("click",async()=>{
          if(isDone){
            if(isCurRange) await save({gems:curGems-1});
          } else {
            await save({gems:i-pastGems+1});
          }
        });
        return box;
      })
    );

    return D({},
      D({display:"flex",gap:"10px",marginBottom:"14px"},
        mkBadgeCard(HB_BADGE_LABEL[hb]||"승급표식",hadBadge,hasBadge,"badge","badge"),
        mkBadgeCard(HB_WING_LABEL[hb]||"날개핀",hadWing,hasWing,"wing","wing")
      ),
      D({fontWeight:"700",fontSize:"13px",color:"#475569",marginBottom:"8px"},"▸ 보석"),
      totalGems2>=8
        ? D({fontSize:"11px",color:"#94A3B8",marginBottom:"10px"},"🎉 8개 보석을 모두 받았어요!")
        : D({fontSize:"11px",color:"#94A3B8",marginBottom:"10px"},
            `${pastGems>0?pastGems+"개 받음 · ":""}${totalGems2>=8?"8개 모두 완료!":"이미 받은 보석은 색깔 표시됩니다"}`),
      gemGrid
    );
  }

  function buildTnt(){
    const hasAward=!!cur.award, hadAward=past.award;
    const curSeals=cur.seals||[];
    const hbc=HB_TNT_COLOR[hb]||{color:t.color,light:t.light,border:t.border};
    const tntColor=hbc.color, tntLight=hbc.light, tntBorder=hbc.border;

    const awardNum={"어드벤처1":1,"어드벤처2":2,"챌린지1":1,"챌린지2":2};
    const awardNumVal=awardNum[hb]||1;
    const awardCard=D({flex:"1",borderRadius:"12px",border:`2px solid ${hadAward?"#CBD5E1":hasAward?tntColor:"#E2E8F0"}`,
      background:hadAward?"#F8FAFC":hasAward?tntLight:"#F8FAFC",
      padding:"12px 8px",textAlign:"center",
      cursor:locked?"not-allowed":"pointer",position:"relative"},
      D({width:"44px",height:"44px",borderRadius:"50%",margin:"0 auto 8px",
        background:hadAward?"#CBD5E1":hasAward?tntColor:"#E2E8F0",
        display:"flex",alignItems:"center",justifyContent:"center",
        fontWeight:"800",fontSize:"18px",color:"#fff"},
        hadAward||hasAward?"✓":String(awardNumVal)
      ),
      D({fontSize:"12px",fontWeight:"700",color:(hadAward||hasAward)?tntColor:"#1E293B",lineHeight:"1.3"},hb+"\n수상대"),
      hadAward?D({fontSize:"10px",color:"#94A3B8",marginTop:"4px"},"완료 ✓"):null,
      isAdmin&&hadAward?B({position:"absolute",top:"4px",right:"4px",fontSize:"10px",
        color:"#EF4444",background:"#fff",border:"1px solid #FECACA",
        borderRadius:"4px",padding:"1px 5px",cursor:"pointer"},
        async e=>{e.stopPropagation();await save({award:false});},"해제"):null
    );
    if(!locked&&!hadAward) awardCard.addEventListener("click",async e=>{
      if(e.target.tagName==="BUTTON") return;
      await save({award:!cur.award});
    });

    const sealGrid=D({display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:"8px"},
      ...[1,2,3,4,5,6,7,8].map(n=>{
        const sn="씰"+n;
        const hadBefore=past.seals.includes(sn);
        const hasCur=curSeals.includes(sn);
        const prevDone=n===1||past.seals.includes("씰"+(n-1))||curSeals.includes("씰"+(n-1));
        const isBlocked=!prevDone&&!hadBefore&&!hasCur;
        const box=D({display:"flex",flexDirection:"column",alignItems:"center",gap:"4px",
          padding:"10px 6px",borderRadius:"10px",
          border:`2px solid ${hadBefore?tntColor:hasCur?tntColor:"#E2E8F0"}`,
          background:hadBefore?tntLight:hasCur?tntLight:"#F8FAFC",
          cursor:(locked||hadBefore||isBlocked)?"default":"pointer",position:"relative"},
          hadBefore
            ? D({width:"36px",height:"36px",borderRadius:"50%",background:tntColor,
                display:"flex",alignItems:"center",justifyContent:"center",
                fontWeight:"800",fontSize:"16px",color:"#fff"},"✓")
            : mkCircle(n,hasCur?tntColor:"#94A3B8",hasCur?tntLight:"#F8FAFC",hasCur?tntColor:"#E2E8F0")
        );

        if(!locked&&!hadBefore&&!isBlocked) box.addEventListener("click",async()=>{
          const next=hasCur?curSeals.filter(x=>x!==sn):[...curSeals,sn];
          await save({seals:next});
        });
        return box;
      })
    );

    return D({},
      D({display:"flex",gap:"10px",marginBottom:"14px"},awardCard),
      D({fontWeight:"700",fontSize:"13px",color:"#475569",marginBottom:"10px"},"▸ 씰"),
      D({fontSize:"11px",color:"#94A3B8",marginBottom:"10px"},
        `${hb} · 완료된 씰은 채워진 원으로 표시`),
      sealGrid
    );
  }

  const summary=[];
  if(isSpks){
    if(cur.badge) summary.push("🏅"+HB_BADGE_LABEL[hb]);
    if(cur.wing)  summary.push("🪽 "+HB_WING_LABEL[hb]);
    if(cur.gems)  GEM_SEQ.slice(past.gems, past.gems+cur.gems).forEach(tid=>summary.push(tid==="red"?"🔴 빨강 보석":"🟢 초록 보석"));
  } else {
    if(cur.award) summary.push("🏆"+hb+"수상대");
    (cur.seals||[]).forEach(s=>summary.push("●"+s));
  }

  const curMemo=getWD()?.students?.[sid]?.memo||"";

  return D({position:"fixed",inset:"0",background:"rgba(0,0,0,0.5)",
    display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:"150"},
    D({background:"#fff",borderRadius:"20px 20px 0 0",width:"100%",maxWidth:"480px",
      padding:"20px 20px 32px",maxHeight:"88vh",overflowY:"auto"},
      D({display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"8px"},
        D({display:"flex",alignItems:"center",gap:"8px"},
          (()=>{const el=mkShield(true,26);el.style.cursor="default";return el;})(),
          D({},
            D({fontWeight:"700",fontSize:"16px"},`${name} 시상`),
            D({fontSize:"12px",color:"#94A3B8",marginTop:"2px"},
              `${S.week===0?"0주차":S.week+"주차"} · ${hb}`)
          )
        ),
        B({background:"none",border:"none",fontSize:"22px",cursor:"pointer",color:"#64748B"},close,"×")
      ),
      summary.length
        ? D({fontSize:"12px",color:"#475569",marginBottom:"12px",background:"#F1F5F9",
            borderRadius:"8px",padding:"6px 10px",fontWeight:"600"},
            "이번 주: "+summary.join(" "))
        : D({fontSize:"12px",color:"#94A3B8",marginBottom:"12px"},"이번 주 시상 없음"),
      isSpks?buildSparks():buildTnt(),
      D({marginTop:"16px",borderTop:"1px solid #F1F5F9",paddingTop:"14px"},
        D({fontWeight:"600",fontSize:"13px",color:"#475569",marginBottom:"6px"},"📝 특이사항 메모"),
        (()=>{
          const ta=document.createElement("textarea");
          Object.assign(ta.style,{width:"100%",boxSizing:"border-box",border:"1px solid #E2E8F0",
            borderRadius:"10px",padding:"10px 12px",fontSize:"13px",
            fontFamily:"inherit",color:"#1E293B",resize:"vertical",minHeight:"72px",
            outline:"none",lineHeight:"1.5",background:locked?"#F8FAFC":"#fff"});
          ta.placeholder="이번 주 특이사항을 적어주세요...";
          ta.value=curMemo;
          ta.readOnly=locked;
          let saveTimer=null;
          ta.addEventListener("input",()=>{
            clearTimeout(saveTimer);
            saveTimer=setTimeout(()=>saveMemo(sid,ta.value),800);
          });
          return ta;
        })()
      ),
      B({width:"100%",background:"#F1F5F9",color:"#475569",border:"none",
        borderRadius:"10px",padding:"12px",fontWeight:"600",fontSize:"14px",
        cursor:"pointer",marginTop:"14px"},close,"닫기")
    )
  );
}
function buildCeremonyReady(){ return null; }
function buildCeremony(){
  const sorted=S.cSorted||[...TEAMS].sort((a,b)=>totalScore(b.id)-totalScore(a.id));
  const maxScore=S.cMaxScore||Math.max(...TEAMS.map(t=>totalScore(t.id)),1);
  const FIXED=["red","blue","green","yellow"];
  const step=S.cStep||0;
  const isAnim=S.cPhase==="animating";
  const isDone=S.cPhase==="done";
  const isReady=S.cPhase==="ready";
  const groups=S.cTieGroups||[];
  const gStep=S.cGroupStep||0;

  // 등수 표시용: sorted 기준 실제 등수 계산
  function getRankLabel(tid){
    const sc=S.cTargets?.[tid]||0;
    const rank=sorted.filter(t=>(S.cTargets?.[t.id]||0)>sc).length+1;
    const tiedCount=sorted.filter(t=>(S.cTargets?.[t.id]||0)===sc).length;
    return tiedCount>1?`공동 ${rank}등 🎉`:`${rank}등 ${rank===1?"🏆":rank===2?"🥈":rank===3?"🥉":""}`;
  }

  // 배너 텍스트: S.cDynBanner 우선, 없으면 단계별 기본
  let bannerText;
  if(isReady){
    bannerText="🎉 이번 주 최종 순위를 발표합니다!";
  } else if(S.cDynBanner){
    bannerText=S.cDynBanner+(S.cDynBanner2?"\n"+S.cDynBanner2:"");
  } else if(isDone){
    const winners=S.cTieGroups?S.cTieGroups[S.cTieGroups.length-1]:[];
    const winNames=winners.map(id=>TEAMS.find(t=>t.id===id)?.name).join(", ");
    bannerText=winners.length>1?`🏆 공동 우승! ${winNames}팀!`:`🏆 우승! ${winNames}팀!`;
  } else if(step===0||isAnim&&step===0){
    bannerText="🏃 게임 점수부터 공개!";
  } else if(step<=2){
    bannerText="📖 암송 점수 합산! 🥁";
  } else {
    bannerText="진행 중...";
  }

  const bi=S.cBannerIdx||0;

  const fs={
    title:"clamp(9px,1.1vw,13px)",
    week:"clamp(12px,1.4vw,16px)",
    banner:"clamp(16px,3.2vw,32px)",
    banner2:"clamp(13px,2.2vw,22px)",
    score:"clamp(18px,4vw,46px)",
    rank:"clamp(18px,4vw,46px)",
    team:"clamp(13px,2.2vw,24px)",
    sub:"clamp(11px,1.8vw,18px)",
    btn:"clamp(13px,1.4vw,17px)",
  };

  const bannerLines=bannerText.split("\n");
  const bannerArea=D({minHeight:"clamp(38px,6vh,70px)",display:"flex",flexDirection:"column",
    alignItems:"center",justifyContent:"center",flexShrink:"0",
    padding:"4px 16px",textAlign:"center"},
    ...bannerLines.map((line,i)=>line?D({
      fontSize:i===0?fs.banner:fs.banner,
      fontWeight:"900",
      color:i===0?"#1E293B":"#D97706",
      lineHeight:"1.4"
    },line):null).filter(Boolean)
  );

  const BAR_MAX=500;

  const barArea=D({display:"flex",alignItems:"flex-end",gap:"clamp(4px,0.8vw,12px)",
    width:"100%",height:"100%",boxSizing:"border-box",padding:"0 clamp(6px,1vw,16px)"},
    ...FIXED.map(tid=>{
      const t=TEAMS.find(x=>x.id===tid);
      const score=S.cScores?.[t.id]||0;
      const barH=Math.max(isReady?2:4,Math.round((score/maxScore)*BAR_MAX));
      const rev=S.cRevealed?.includes(t.id);
      const rank=sorted.findIndex(x=>x.id===t.id);
      const isBlinking=S.cBlinkGroup?S.cBlinkGroup.includes(t.id):(S.cBlink===t.id);
      const gs=S.cGameScores?.[t.id]||0;
      const hs=S.cHbScores?.[t.id]||0;
      const showGame=step>=1;
      const showHb=isDone;

      // 바 위 텍스트 wrapper (absolute, bottom=barH)
      const aboveBar=document.createElement("div");
      aboveBar.id="above_"+t.id;
      Object.assign(aboveBar.style,{
        position:"absolute",bottom:barH+"px",left:"0",width:"100%",
        display:"flex",flexDirection:"column",alignItems:"center",
        paddingBottom:"4px"
      });

      // 점수
      const numEl=document.createElement("div");
      numEl.id="cnum_"+t.id;
      Object.assign(numEl.style,{fontSize:fs.score,fontWeight:"900",
        color:t.color,lineHeight:"1.1",textAlign:"center"});
      numEl.textContent=score>0?score.toLocaleString():"";
      aboveBar.appendChild(numEl);

      // 등수 (확정 후)
      if(rev){
        const rankEl=document.createElement("div");
        Object.assign(rankEl.style,{fontSize:fs.rank,fontWeight:"900",
          color:"#1E293B",lineHeight:"1.1",textAlign:"center"});
        rankEl.textContent=getRankLabel(t.id);
        aboveBar.appendChild(rankEl);
      }

      // 바
      const barEl=document.createElement("div");
      barEl.id="cbar_"+t.id;
      Object.assign(barEl.style,{
        width:"100%",height:barH+"px",
        background:t.grad,borderRadius:"6px 6px 0 0",
        boxShadow:rev?"0 0 28px "+t.color+"bb":"none",
        border:"2px solid "+t.color,
        animation:isBlinking?"barBlink 0.5s ease-in-out infinite":""
      });

      // 팀명 + 게임/핸드북 점수 (바 아래)
      const nameEl=D({marginTop:"6px",textAlign:"center",width:"100%",
        display:"flex",flexDirection:"column",gap:"1px"},
        D({fontSize:fs.team,fontWeight:"900",color:t.color,lineHeight:"1.2"},t.name+"팀"),
        showGame?D({fontSize:fs.sub,fontWeight:"800",color:"#1E293B",lineHeight:"1.3"},
          gs.toLocaleString()):null,
        showHb?D({fontSize:fs.sub,fontWeight:"800",color:"#475569",lineHeight:"1.3"},
          hs.toLocaleString()):null
      );

      const wrapper=document.createElement("div");
      Object.assign(wrapper.style,{
        width:"100%",height:BAR_MAX+"px",
        position:"relative",display:"flex",alignItems:"flex-end"
      });
      wrapper.appendChild(aboveBar);
      wrapper.appendChild(barEl);

      return D({display:"flex",flexDirection:"column",alignItems:"center",flex:"1"},
        wrapper,nameEl);
    })
  );

  const btnLabel=isReady?"\u25b6 시작하기":isDone?"완료":"다음 진행";
  const mainBtn=!isDone?B({
    background:isAnim?"#E2E8F0":"#1E293B",
    color:isAnim?"#94A3B8":"#fff",border:"none",
    borderRadius:"clamp(8px,1vw,12px)",
    padding:"clamp(8px,1.2vh,14px) clamp(14px,2.5vw,32px)",
    fontWeight:"800",fontSize:fs.btn,
    cursor:isAnim?"not-allowed":"pointer",
    opacity:isAnim?"0.5":"1",whiteSpace:"nowrap"
  },()=>{if(!isAnim)cNextStep();},btnLabel):null;

  const closeBtn=B({
    background:"#F1F5F9",color:"#64748B",border:"1px solid #E2E8F0",
    borderRadius:"clamp(6px,0.8vw,10px)",
    padding:"clamp(6px,1vh,10px) clamp(10px,1.5vw,20px)",
    fontWeight:"600",fontSize:fs.btn,cursor:"pointer",whiteSpace:"nowrap"
  },()=>{stopAllSounds();S.ceremony=false;S.cBlink=null;render();},"닫기");

  const topBar=D({
    width:"100%",display:"flex",alignItems:"center",justifyContent:"space-between",
    padding:"clamp(6px,1vh,10px) clamp(10px,1.5vw,20px)",flexShrink:"0",
    boxSizing:"border-box"
  },
    D({display:"flex",flexDirection:"column",gap:"2px"},
      D({fontSize:fs.title,color:"#DC2626",letterSpacing:"3px",fontWeight:"700"},"A W A N A  시상식"),
      D({fontSize:fs.week,fontWeight:"700",color:"#1E293B"},
        (S.week===0?"0주차":S.week+"주차")+" 최종 순위")
    ),
    D({display:"flex",gap:"clamp(6px,0.8vw,10px)",alignItems:"center"},mainBtn,closeBtn)
  );

  if(!document.getElementById("_blinkStyle")){
    const st=document.createElement("style");
    st.id="_blinkStyle";
    st.textContent=`@keyframes barBlink{0%,100%{opacity:1}50%{opacity:0.3}}
@keyframes confettiFall{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}`;

function buildStMgr(){
  const srch=inp("🔍 학생 이름 검색...",S.search,v=>{S.search=v;render();},{width:"100%",marginBottom:"12px",boxSizing:"border-box"});
  const nameI=inp("이름",S.newSt.name,v=>{S.newSt.name=v;},{flex:"1"});
  const teamS=sel(TEAMS.map(t=>[t.id,t.name]),S.newSt.team,v=>{S.newSt.team=v;},{border:"1px solid #E2E8F0",borderRadius:"8px",padding:"8px 6px",fontSize:"13px"});
  const hbS=sel(HANDBOOKS.map(h=>[h,h]),S.newSt.handbook,v=>{S.newSt.handbook=v;},{border:"1px solid #E2E8F0",borderRadius:"8px",padding:"8px 6px",fontSize:"13px",flex:"1"});
  const addRow=el("div",{style:{display:"grid",gridTemplateColumns:"1fr 60px 1fr 34px",gap:"6px",marginBottom:"12px"}},
    nameI,teamS,hbS,
    B({background:"#22C55E",color:"#fff",border:"none",borderRadius:"8px",cursor:"pointer",fontWeight:"700",fontSize:"18px"},async()=>{
      if(!S.newSt.name.trim()) return;
      S.students.push({id:`s_${Date.now()}`,name:S.newSt.name.trim(),team:S.newSt.team,handbook:S.newSt.handbook});
      S.newSt={name:"",team:"red",handbook:"행글라이더"};
      await saveStudents();render();
    },"+")
  );

  const listItems=HB_GROUPS.flatMap(group=>{
    const books=group.books.filter(hb=>hbStu(hb).filter(s=>s.name.includes(S.search)).length>0);
    if(!books.length) return [];
    const gKey="stMgr_"+group.label;
    const open=S.statsOpen[gKey]!==false;

    // 클럽 구분선 — 시상탭과 완전 동일
    const divBtn=D({display:"flex",alignItems:"center",gap:"6px",
      marginBottom:"6px",marginTop:"14px",padding:"8px 14px",
      background:group.label==="Sparks"?"#FFF0F0":"#F0F4FF",
      borderRadius:"10px",
      border:`1px solid ${group.label==="Sparks"?"#FECACA":"#C7D2FE"}`});
    divBtn.appendChild(group.label==="Sparks"?mkSparksIcon(15):mkTntIcon(15));
    divBtn.appendChild(SP({fontWeight:"700",fontSize:"13px",
      color:group.label==="Sparks"?"#EF4444":"#6366F1"},
      group.label==="Sparks"?"스팍스":"티앤티"));
    const cnt=group.books.reduce((n,hb)=>n+hbStu(hb).filter(s=>s.name.includes(S.search)).length,0);
    divBtn.appendChild(SP({fontSize:"11px",color:"#94A3B8",marginLeft:"2px"},cnt+"명"));
    divBtn.appendChild(D({flex:"1"}));
    divBtn.appendChild(SP({fontSize:"12px",color:"#94A3B8"},open?"▲":"▼"));
    divBtn.addEventListener("click",()=>{S.statsOpen[gKey]=!open;render();});
    if(!open) return [divBtn];

    const sections=books.flatMap(hb=>{
      const filtered=hbStu(hb).filter(s=>s.name.includes(S.search));
      if(!filtered.length) return [];

      // 핸드북 소제목 — 시상탭과 동일
      const hbHdr=D({display:"flex",alignItems:"center",gap:"6px",
        padding:"8px 0 6px",marginTop:"8px",
        borderBottom:"2px solid #E2E8F0"},
        D({width:"7px",height:"7px",borderRadius:"50%",background:"#E2E8F0",flexShrink:"0"}),
        SP({fontWeight:"700",fontSize:"13px",color:"#1E293B"},hb),
        SP({fontSize:"11px",color:"#94A3B8",marginLeft:"2px"},filtered.length+"명")
      );

      const listEl=D({background:"#fff",borderRadius:"10px",
        border:"1px solid #E2E8F0",overflow:"hidden",marginTop:"6px",marginBottom:"4px"});

      filtered.forEach((s,si2)=>{
        const t=getTeam(s.team);
        if(S.editSt?.id===s.id){
          const es=S.editSt;
          const en=inp("이름",es.name,v=>{S.editSt.name=v;},{flex:"1"});
          const et=sel(TEAMS.map(x=>[x.id,x.name]),es.team,v=>{S.editSt.team=v;},{border:"1px solid #E2E8F0",borderRadius:"8px",padding:"6px",fontSize:"12px"});
          const eh=sel(HANDBOOKS.map(h=>[h,h]),es.handbook,v=>{S.editSt.handbook=v;},{border:"1px solid #E2E8F0",borderRadius:"8px",padding:"6px",fontSize:"12px",flex:"1"});
          listEl.appendChild(D({background:"#F0F9FF",padding:"10px 12px",
            borderBottom:si2<filtered.length-1?"1px solid #E2E8F0":"none"},
            D({display:"flex",gap:"6px",marginBottom:"6px"},en,et),
            D({display:"flex",gap:"6px"},eh,
              B({background:"#22C55E",color:"#fff",border:"none",borderRadius:"6px",padding:"6px 12px",cursor:"pointer",fontWeight:"700",fontSize:"13px"},
                async()=>{S.students=S.students.map(x=>x.id===s.id?{...x,...S.editSt}:x);S.editSt=null;await saveStudents();render();},"저장"),
              B({background:"#F1F5F9",border:"none",borderRadius:"6px",padding:"6px 12px",cursor:"pointer",fontSize:"13px"},
                ()=>{S.editSt=null;render();},"취소")
            )
          ));
          return;
        }
        let att=0,signs=0;
        Object.values(S.wdata).forEach(wd2=>{
          const d=(wd2?.students||{})[s.id]||{};
          if(d.attendance) att++;
          signs+=d.signs||0;
        });
        listEl.appendChild(D({display:"flex",justifyContent:"space-between",alignItems:"center",
          padding:"10px 12px",
          borderBottom:si2<filtered.length-1?"1px solid #F1F5F9":"none"},
          D({display:"flex",flexDirection:"column",gap:"3px"},
            D({display:"flex",alignItems:"center",gap:"6px"},
              SP({fontWeight:"700",fontSize:"13px",color:"#1E293B"},s.name),
              D({width:"6px",height:"6px",borderRadius:"50%",background:t.color,flexShrink:"0"}),
              SP({fontSize:"11px",color:t.color,fontWeight:"600"},t.name)
            ),
            SP({fontSize:"11px",color:"#94A3B8"},
              "출석 ",att,"회 · 암송 ",Math.round(signs*10)/10,"개")
          ),
          D({display:"flex",gap:"4px"},
            B({background:"none",border:"1px solid #E2E8F0",borderRadius:"6px",
              color:"#64748B",cursor:"pointer",fontSize:"11px",padding:"3px 8px"},
              ()=>{S.editSt={...s};render();},"수정"),
            B({background:"none",border:"1px solid #FECACA",borderRadius:"6px",
              color:"#EF4444",cursor:"pointer",fontSize:"11px",padding:"3px 8px"},
              async()=>{if(!confirm(s.name+"을(를) 삭제할까요?"))return;
                S.students=S.students.filter(x=>x.id!==s.id);await saveStudents();render();},"삭제")
          )
        ));
      });

      return [hbHdr, listEl];
    });

    return [divBtn, ...sections];
  });

  return D({},
    srch,
    D({fontWeight:"600",fontSize:"13px",color:"#475569",marginBottom:"8px",display:"flex",justifyContent:"space-between",alignItems:"center"},
      SP({},"학생 추가"),
      SP({fontSize:"11px",color:"#94A3B8"},`총 ${S.students.length}명`)
    ),
    addRow,
    ...listItems,
    !S.students.length?mkEmpty():null
  );
}

function buildConfigSet(){
  const si=S.settingsInput;
  if(!S.configOpen) S.configOpen={score:false,att:false,pw:false,reset:false};
  const co=S.configOpen;

  function mkAccordion(key,title,contentFn){
    const isOpen=co[key];
    const hdr=D({display:"flex",justifyContent:"space-between",alignItems:"center",
      padding:"12px 14px",cursor:"pointer",userSelect:"none",
      background:isOpen?"#F8FAFC":"#fff"},
      SP({fontWeight:"600",fontSize:"13px",color:"#1E293B"},title),
      SP({fontSize:"12px",color:"#94A3B8"},isOpen?"▲":"▼")
    );
    hdr.addEventListener("click",()=>{co[key]=!co[key];render();});
    const wrap=D({border:"1px solid #E2E8F0",borderRadius:"10px",marginBottom:"8px",overflow:"hidden"},hdr);
    if(isOpen){
      const body=D({padding:"14px",borderTop:"1px solid #F1F5F9"});
      body.appendChild(contentFn());
      wrap.appendChild(body);
    }
    return wrap;
  }

  function mkInp(key){
    return inp("",si[key],v=>{S.settingsInput[key]=Number(v);render();},
      {width:"100%",boxSizing:"border-box",textAlign:"center"},"number");
  }
  function mkCol(label,key){
    return D({flex:"1"},
      D({fontSize:"11px",color:"#64748B",marginBottom:"4px",textAlign:"center"},label),
      mkInp(key));
  }
  function mkWeekSel(key){

      {width:"100%",border:"1px solid #E2E8F0",borderRadius:"8px",padding:"7px 8px",fontSize:"12px",boxSizing:"border-box"});

    return sel(opts.map(([v,l])=>[String(v),l]),String(si[key]??1),v=>{S.settingsInput[key]=Number(v);render();},

      mkCol("출석","attScore"),mkCol("단복","uniScore"),mkCol("서명 1개","signScore")
    ),
    D({fontSize:"11px",color:"#94A3B8",marginBottom:"8px",fontWeight:"600"},"게임 순위"),
    D({display:"flex",gap:"8px",marginBottom:"8px"},
      mkCol("1등 점수","firstPlace"),mkCol("등수 간 차이","gap")
    ),
    D({fontSize:"11px",color:"#94A3B8",marginBottom:"14px",background:"#F8FAFC",borderRadius:"6px",padding:"8px"},
      `1등 ${si.firstPlace}점 / 2등 ${si.firstPlace-si.gap}점 / 3등 ${si.firstPlace-si.gap*2}점 / 4등 ${si.firstPlace-si.gap*3}점`
    ),
    B({width:"100%",background:"#3B82F6",color:"#fff",border:"none",borderRadius:"8px",padding:"10px",fontWeight:"700",cursor:"pointer"},
      async()=>{S.settings={...S.settingsInput};await saveSettings();alert("저장됐어요!");},"저장")
  ));

  const attAcc=mkAccordion("att","🏆 출석상",()=>D({},
    D({fontSize:"12px",color:"#94A3B8",marginBottom:"10px"},"수여 주차와 허용 결석 횟수를 설정합니다."),

      async()=>{S.passwords=pw;await saveSettings();alert("저장됐어요!");},"저장"));
    return wrap;

  const wsel=sel(WEEKS.map(w=>[String(w),w===0?`0주차 ${WEEK_DATES[0]}`:`${w}주차 (${WEEK_DATES[w]})`]),String(S.week),()=>{},{width:"100%",border:"1px solid #E2E8F0",borderRadius:"8px",padding:"8px",fontSize:"13px",boxSizing:"border-box",marginBottom:"8px"});
  const resetAcc=mkAccordion("reset","🗑️ 주차 초기화",()=>D({},

    B({width:"100%",background:"#EF4444",color:"#fff",border:"none",borderRadius:"8px",padding:"10px",fontWeight:"700",cursor:"pointer"},async()=>{
      const w=Number(wsel.value),label=w===0?`0주차 ${WEEK_DATES[0]}`:`${w}주차`;
      if(!confirm(`${label} 데이터를 초기화할까요?`)) return;
      await resetWeekData(w);alert(`✅ ${label} 초기화 완료!`);
    },"초기화")
  ));

  return D({},scoreAcc,attAcc,pwAcc,resetAcc);
}

function buildStatsView(){
  const win1={red:0,yellow:0,green:0,blue:0}, win2={red:0,yellow:0,green:0,blue:0};
  Object.keys(S.wdata).forEach(w=>{
    const wd=S.wdata[w]; if(!wd?.gameFinalized) return;
    const sorted=[...TEAMS].sort((a,b)=>{
      const calc=(tid)=>{
        const hb=S.students.filter(s=>s.team===tid).reduce((s2,st)=>{
          const d=(wd?.students||{})[st.id]||{};
          const{attScore:a=50,uniScore:u=50,signScore:sg=50}=S.settings;
          return s2+(d.attendance?a:0)+(d.uniform?u:0)+((d.signs||0)*sg);
        },0);
        let g=0;
        ["sparks","tnt"].forEach(type=>{
          const rounds=(wd.games?.[type]?.rounds)||[];
          const cum={};TEAMS.forEach(x=>{cum[x.id]=rounds.reduce((s3,r)=>s3+(r.scores?.[x.id]||0),0);});
          const si2=[...TEAMS].sort((x,y)=>cum[y.id]-cum[x.id]);
          const ri=si2.findIndex(x=>x.id===tid);
          g+=Math.max(0,S.settings.firstPlace-ri*S.settings.gap);
        });
        return hb+g;
      };
      return calc(b.id)-calc(a.id);
    });
    if(sorted[0]) win1[sorted[0].id]++;
    if(sorted[1]) win2[sorted[1].id]++;
  });

  return D({},
    D({fontWeight:"600",fontSize:"14px",marginBottom:"10px",color:"#1E293B"},"팀 통계"),
    D({display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px"},
      ...TEAMS.map(t=>{
        const cumHb=Object.values(S.wdata).reduce((sum,wd2)=>
          sum+S.students.filter(s=>s.team===t.id).reduce((s2,st)=>{
            const d=(wd2?.students||{})[st.id]||{};
            const{attScore:a=50,uniScore:u=50,signScore:sg=50}=S.settings;
            return s2+(d.attendance?a:0)+(d.uniform?u:0)+((d.signs||0)*sg);
          },0),0);
        const cumSigns=Object.values(S.wdata).reduce((sum,wd2)=>
          sum+S.students.filter(s=>s.team===t.id).reduce((s2,st)=>{
            const v=(wd2?.students||{})[st.id]?.signs||0;
            return s2+(typeof v==="number"?v:parseFloat(v)||0);
          },0),0);
        return D({background:"#fff",borderRadius:"10px",padding:"12px 14px",border:"1px solid #E2E8F0"},
          D({display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"8px"},
            D({display:"flex",alignItems:"center",gap:"6px"},
              D({width:"8px",height:"8px",borderRadius:"50%",background:t.color,flexShrink:"0"}),
              SP({fontWeight:"600",color:"#1E293B",fontSize:"13px"},t.name+"팀")
            ),
            SP({fontSize:"11px",color:"#94A3B8"},S.students.filter(s=>s.team===t.id).length,"명")
          ),
          D({display:"flex",gap:"6px",marginBottom:"8px"},
            D({flex:"1",background:"#F8FAFC",borderRadius:"6px",padding:"6px 4px",textAlign:"center"},
              D({fontSize:"10px",color:"#94A3B8",marginBottom:"2px"},"🥇 우승"),
              SP({fontWeight:"600",color:"#1E293B",fontSize:"13px"},win1[t.id],"회")
            ),
            D({flex:"1",background:"#F8FAFC",borderRadius:"6px",padding:"6px 4px",textAlign:"center"},
              D({fontSize:"10px",color:"#94A3B8",marginBottom:"2px"},"🥈 준우승"),
              SP({fontWeight:"600",color:"#1E293B",fontSize:"13px"},win2[t.id],"회")
            )
          ),
          D({fontSize:"11px",color:"#94A3B8",marginBottom:"4px"},"핸드북 누적 ",SP({color:"#475569",fontWeight:"600"},cumHb.toLocaleString()),"점"),
          D({fontSize:"11px",color:"#94A3B8"},"암송 누적 ",SP({color:"#475569",fontWeight:"600"},Math.round(cumSigns*10)/10),"개")
        );
      })
    ),
    !S.students.length?mkEmpty():null
  );
}

onSnapshot(doc(db,"awana","settings"),snap=>{
  if(snap.exists()){
    const d=snap.data();
    S.settings={firstPlace:d.firstPlace||1000,gap:d.gap||150,attScore:d.attScore||50,uniScore:d.uniScore||50,signScore:d.signScore||50,
      attAward1Week:d.attAward1Week||0,attAward1Allow:d.attAward1Allow??1,
      attAward2Week:d.attAward2Week||0,attAward2Allow:d.attAward2Allow??1};
    S.settingsInput={...S.settings};
    if(d.passwords) S.passwords=d.passwords;
    S.closedWeeks=d.closedWeeks||Array.from({length:15},(_,i)=>i+1);
  }
  if(!S.loaded){ S.loaded=true; render(); }
});

function buildSchedule(){
  const sc=S.schedule[String(S.week)];
  const wd=getWD();

  function fmtPerson(role,name){
    if(!role||!name) return name||role||"-";
    if(role==="선생님"||role==="목사님"||role==="장로님") return name+" "+role;
    return role+" "+name;
  }

  const selTeam=S.scheduleTeam||"all";
  const isAll=selTeam==="all";
  const teamStudents=isAll?[]:S.students.filter(s=>s.team===selTeam);
  const sparksHbs=["행글라이더","윙러너","스카이스토머"];
  const tntHbs=["어드벤처1","어드벤처2","챌린지1","챌린지2"];

  function mkStudentRow(s){
    const sd=wd.students?.[s.id]||{};
    const att=sd.attendance, uni=sd.uniform;
    const t=getTeam(s.team);

    const cell=D({display:"flex",flexDirection:"column",gap:"10px",
      padding:"12px 12px",borderRadius:"12px",
      background:"#fff",border:"1px solid #E2E8F0",minWidth:"0",cursor:"pointer"});

    // 윗줄: 도트 + 이름 + 핸드북명
    const topRow=D({display:"flex",alignItems:"center",gap:"7px"});
    const dot=D({width:"8px",height:"8px",borderRadius:"50%",background:t.color,flexShrink:"0"});
    topRow.appendChild(dot);
    topRow.appendChild(D({fontWeight:"600",fontSize:"14px",color:"#1E293B",flexShrink:"0",minWidth:"60px"},s.name));
    topRow.appendChild(SP({fontSize:"11px",color:"#CBD5E1",flexShrink:"0"},s.handbook));
    cell.appendChild(topRow);

    // 아랫줄: 출석 / 단복 버튼 — 이름 시작점(도트8px+gap7px=15px) 정렬
    const NAME_OFFSET=15; // dot(8) + gap(7)
    const HB_OFFSET=NAME_OFFSET+60+7; // +minWidth(60)+gap(7) = 핸드북명 시작점
    const mkBigBtn=(label,active,color,onClick)=>{
      const el=D({flex:"1",height:"44px",borderRadius:"8px",
        display:"flex",alignItems:"center",justifyContent:"center",
        background:active?color+"18":"#F8FAFC",
        border:`1.5px solid ${active?color:"#E2E8F0"}`,
        cursor:"pointer",userSelect:"none",
        fontSize:"14px",fontWeight:active?"700":"400",
        color:active?color:"#CBD5E1",transition:"all 0.15s"},label);
      el.addEventListener("click",async e=>{e.stopPropagation();await onClick();});
      return el;
    };
    const botRow=D({display:"flex",gap:"6px",paddingLeft:HB_OFFSET+"px"});
    botRow.appendChild(mkBigBtn("출석",att,"#16A34A",()=>setSD(s.id,{attendance:!att})));
    botRow.appendChild(mkBigBtn("단복",uni,"#2563EB",()=>setSD(s.id,{uniform:!uni})));
    cell.appendChild(botRow);

    cell.addEventListener("click",async()=>setSD(s.id,{attendance:!att,uniform:!att}));
    return cell;
  }

  function mkClubHeader(type){
    const icon=document.createElement("div");
    icon.appendChild(type==="sparks"?mkSparksIcon(18):mkTntIcon(18));
    const label=type==="sparks"?"스팍스":"티앤티";
    const grpColor=type==="sparks"?"#EF4444":"#16A34A";
    return D({display:"flex",alignItems:"center",gap:"6px",
      margin:"14px 0 8px",padding:"6px 0 6px",
      borderBottom:`2px solid ${grpColor}`},
      icon,
      D({fontWeight:"700",fontSize:"15px",color:"#475569",flex:"1"},label)
    );
  }

  function mkClubHeaderWithCheck(type, students, sortMode){
    const icon=document.createElement("div");
    icon.appendChild(type==="sparks"?mkSparksIcon(16):mkTntIcon(16));
    const label=type==="sparks"?"스팍스":"티앤티";
    const stuList=students;
    const allAtt=stuList.length>0&&stuList.every(s=>(wd.students?.[s.id]||{}).attendance);
    const allUni=stuList.length>0&&stuList.every(s=>(wd.students?.[s.id]||{}).uniform);
    const locked=isLocked();

    const sortToggle=D({display:"flex",gap:"2px",background:"#F1F5F9",borderRadius:"8px",padding:"2px",flexShrink:"0"});
    ["name","hb"].forEach(mode=>{
      const lbl=mode==="name"?"ㄱㄴㄷ":"핸드북순";
      const btn=B({padding:"3px 8px",borderRadius:"6px",border:"none",cursor:"pointer",
        fontSize:"10px",fontWeight:"700",
        background:sortMode===mode?"#1E293B":"transparent",
        color:sortMode===mode?"#fff":"#94A3B8"},
        ()=>{S.scheduleSortMode=mode;render();},lbl);
      sortToggle.appendChild(btn);
    });

    const attBtn=!locked?B({
      fontSize:"11px",fontWeight:"700",padding:"3px 9px",borderRadius:"20px",
      cursor:"pointer",border:"none",flexShrink:"0",
      background:allAtt?"#16A34A":"#F1F5F9",color:allAtt?"#fff":"#64748B"},
      async()=>{
        const next=!allAtt;
        const wdCopy=JSON.parse(JSON.stringify(getWD()));
        stuList.forEach(s=>{wdCopy.students[s.id]={...(wdCopy.students[s.id]||{attendance:false,uniform:false,signs:0}),attendance:next};});
        S.wdata[S.week]=wdCopy; render(); await saveWeek(S.week);
      }, allAtt?"✓ 출석":"전체 출석"):null;

    const uniBtn=!locked?B({
      fontSize:"11px",fontWeight:"700",padding:"3px 9px",borderRadius:"20px",
      cursor:"pointer",border:"none",flexShrink:"0",
      background:allUni?"#2563EB":"#F1F5F9",color:allUni?"#fff":"#64748B"},
      async()=>{
        const next=!allUni;
        const wdCopy=JSON.parse(JSON.stringify(getWD()));
        stuList.forEach(s=>{wdCopy.students[s.id]={...(wdCopy.students[s.id]||{attendance:false,uniform:false,signs:0}),uniform:next};});
        S.wdata[S.week]=wdCopy; render(); await saveWeek(S.week);
      }, allUni?"✓ 단복":"전체 단복"):null;

    const grpColor=type==="sparks"?"#EF4444":"#16A34A";
    return D({display:"flex",alignItems:"center",gap:"6px",
      margin:"14px 0 8px",padding:"6px 0 6px",
      borderBottom:`2px solid ${grpColor}`,flexWrap:"wrap"},
      icon,
      D({fontWeight:"700",fontSize:"13px",color:"#475569"},label),
      sortToggle,
      D({flex:"1"}),
      attBtn,
      uniBtn
    );
  }

  function mkClubSection(students, type, showCheckAll=false){
    const filtered=students.filter(s=>type==="sparks"?sparksHbs.includes(s.handbook):tntHbs.includes(s.handbook));
    const hbOrder=type==="sparks"?sparksHbs:tntHbs;
    const sortMode=S.scheduleSortMode||"name";
    const sorted=[...filtered].sort((a,b)=>{
      if(sortMode==="hb"){
        const hi=hbOrder.indexOf(a.handbook)-hbOrder.indexOf(b.handbook);
        if(hi!==0) return hi;
      }
      return a.name.localeCompare(b.name,"ko");
    });
    return D({},
      showCheckAll?mkClubHeaderWithCheck(type,sorted,sortMode):mkClubHeader(type),
      sorted.length===0
        ? mkEmpty("해당 학생이 없어요")
        : D({display:"flex",flexDirection:"column",gap:"6px"},...sorted.map(mkStudentRow))
    );
  }

  if(!S.scheduleSortMode) S.scheduleSortMode="name";
  if(!S.scheduleTeam) S.scheduleTeam="all";

  let listArea;
  if(isAll){
    listArea=D({},
      mkClubSection(S.students,"sparks",true),
      mkClubSection(S.students,"tnt",true)
    );
  } else {
    listArea=D({},
      mkClubSection(teamStudents,"sparks"),
      mkClubSection(teamStudents,"tnt")
    );
  }

  const selT=TEAMS.find(t=>t.id===selTeam);
  const teamSection=D({marginTop:"18px"},
    D({display:"flex",gap:"6px",marginBottom:"14px"},
      B({flex:"1",padding:"8px 4px",borderRadius:"10px",fontWeight:"700",fontSize:"13px",
        border:`2px solid ${isAll?"#1E293B":"#E2E8F0"}`,
        background:isAll?"#1E293B":"#F8FAFC",
        color:isAll?"#fff":"#94A3B8",cursor:"pointer"
      },()=>{S.scheduleTeam="all";render();},"전체"),
      ...TEAMS.map(t=>B({
        flex:"1",padding:"8px 4px",borderRadius:"10px",fontWeight:"700",fontSize:"13px",
        border:`2px solid ${selTeam===t.id&&!isAll?t.color:"#E2E8F0"}`,
        background:selTeam===t.id&&!isAll?t.light:"#F8FAFC",
        color:selTeam===t.id&&!isAll?t.color:"#94A3B8",cursor:"pointer"
      },()=>{S.scheduleTeam=t.id;render();},t.name))
    ),
    listArea
  );

  return D({},
    D({fontWeight:"600",fontSize:"15px",marginBottom:"14px",color:"#1E293B"},"이번 주 진행 순서"),
    sc
      ? D({background:"#fff",borderRadius:"12px",border:"2px solid #CBD5E1",padding:"16px 18px",display:"flex",flexDirection:"column",gap:"14px"},
          D({},
            D({fontSize:"12px",color:"#475569",fontWeight:"800",marginBottom:"6px"},"📢 기수"),
            D({display:"flex",gap:"8px"},
              D({flex:"1",background:"#F1F5F9",borderRadius:"8px",padding:"10px 12px",textAlign:"center",border:"1px solid #E2E8F0"},
                SP({fontWeight:"700",fontSize:"14px",color:"#1E293B"},fmtPerson(sc.l1role,sc.l1name))
              ),
              D({display:"flex",alignItems:"center",color:"#94A3B8",fontSize:"16px"},"/"),
              D({flex:"1",background:"#F1F5F9",borderRadius:"8px",padding:"10px 12px",textAlign:"center",border:"1px solid #E2E8F0"},
                SP({fontWeight:"700",fontSize:"14px",color:"#1E293B"},fmtPerson(sc.l2role,sc.l2name))
              )
            )
          ),
          D({},
            D({fontSize:"12px",color:"#475569",fontWeight:"800",marginBottom:"6px"},"🙏 기도"),
            D({background:"#F1F5F9",borderRadius:"8px",padding:"10px 12px",textAlign:"center",border:"1px solid #E2E8F0"},
              SP({fontWeight:"700",fontSize:"14px",color:"#1E293B"},fmtPerson(sc.prole,sc.pname))
            )
          )
        )
      : D({textAlign:"center",padding:"20px 0",color:"#94A3B8",fontSize:"13px"},"이번 주 순서 정보가 없어요\n설정에서 입력해주세요"),
    teamSection
  );
}

function buildScheduleEditor(){
  const scWeeks=WEEKS; // 전역 WEEKS 사용
  const COLS=["기수1 학년","기수1 이름","기수2 학년","기수2 이름","기도 구분","기도 이름"];
  const KEYS=["l1role","l1name","l2role","l2name","prole","pname"];

  // 로컬 편집 버퍼 (S.schedEdit에 저장)
  if(!S.schedEdit){
    S.schedEdit={};
    scWeeks.forEach(w=>{
      const sc=S.schedule[String(w)]||{};
      S.schedEdit[w]={l1role:sc.l1role||"",l1name:sc.l1name||"",l2role:sc.l2role||"",l2name:sc.l2name||"",prole:sc.prole||"",pname:sc.pname||""};
    });
  }

  const status=D({fontSize:"12px",color:"#94A3B8",marginTop:"6px",minHeight:"18px"},"");

  // 테이블 래퍼
  const tableWrap=document.createElement("div");
  Object.assign(tableWrap.style,{overflowX:"auto",borderRadius:"10px",border:"1px solid #E2E8F0"});

  const table=document.createElement("table");
  Object.assign(table.style,{width:"100%",borderCollapse:"collapse",fontSize:"12px"});

  // 헤더 행
  const thead=document.createElement("thead");
  const hrow=document.createElement("tr");
  Object.assign(hrow.style,{background:"#1E293B"});
  ["주차",...COLS].forEach(h=>{
    const th=document.createElement("th");
    th.textContent=h;
    Object.assign(th.style,{padding:"8px 6px",color:"#94A3B8",fontWeight:"700",
      fontSize:"11px",textAlign:"center",whiteSpace:"nowrap",
      borderRight:"1px solid #334155"});
    hrow.appendChild(th);
  });
  thead.appendChild(hrow);
  table.appendChild(thead);

  // 데이터 행
  const tbody=document.createElement("tbody");
  scWeeks.forEach((w,wi)=>{
    const tr=document.createElement("tr");
    Object.assign(tr.style,{background:wi%2===0?"#fff":"#F8FAFC",borderBottom:"1px solid #F1F5F9"});
    tr.addEventListener("mouseenter",()=>tr.style.background="#EFF6FF");
    tr.addEventListener("mouseleave",()=>tr.style.background=wi%2===0?"#fff":"#F8FAFC");

    // 주차 셀
    const wkTd=document.createElement("td");
    wkTd.textContent=w===0?"0주차":w+"주차";
    Object.assign(wkTd.style,{padding:"6px 8px",fontWeight:"700",fontSize:"12px",
      color:"#475569",textAlign:"center",whiteSpace:"nowrap",
      borderRight:"1px solid #F1F5F9",background:"#F8FAFC"});
    tr.appendChild(wkTd);

    // 편집 셀
    KEYS.forEach((key,ki)=>{
      const td=document.createElement("td");
      Object.assign(td.style,{padding:"3px 4px",borderRight:"1px solid #F1F5F9"});
      const inp=document.createElement("input");
      inp.value=S.schedEdit[w][key];
      inp.placeholder=COLS[ki];
      Object.assign(inp.style,{width:"100%",boxSizing:"border-box",
        border:"1px solid transparent",borderRadius:"6px",
        padding:"5px 6px",fontSize:"12px",color:"#1E293B",
        background:"transparent",outline:"none",
        fontFamily:"inherit"});
      inp.addEventListener("focus",()=>{inp.style.border="1px solid #3B82F6";inp.style.background="#fff";});
      inp.addEventListener("blur",()=>{inp.style.border="1px solid transparent";inp.style.background="transparent";});
      inp.addEventListener("input",()=>{S.schedEdit[w][key]=inp.value;});
      // Tab 키로 다음 셀 이동
      inp.addEventListener("keydown",e=>{
        if(e.key==="Enter"){saveBtn.click();}
      });
      td.appendChild(inp);
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
  table.appendChild(tbody);
  tableWrap.appendChild(table);

  const saveBtn=B({width:"100%",background:"#1E293B",color:"#fff",border:"none",
    borderRadius:"10px",padding:"12px",fontWeight:"700",fontSize:"14px",cursor:"pointer",marginTop:"10px"},
    async()=>{
      try{
        const parsed={};
        scWeeks.forEach(w=>{
          const d=S.schedEdit[w];
          if(d.l1name||d.l2name||d.pname) parsed[String(w)]=d;
        });
        await fbSave("schedule",parsed);
        S.schedule=parsed;
        S.schedEdit=null; // 버퍼 초기화
        status.textContent="✅ 저장됐어요!";
        status.style.color="#22C55E";
        render();
      } catch(e){
        status.textContent="❌ 저장 실패: "+e.message;
        status.style.color="#EF4444";
      }
    },"💾 저장");

  return D({},
    D({fontSize:"12px",color:"#94A3B8",marginBottom:"10px"},
      "셀을 클릭해서 바로 수정하고, 저장 버튼으로 한 번에 반영해요."),
    tableWrap,
    status,
    saveBtn
  );
}

function buildAwardsTab(){
  const wd=getWD();

  // ── 상태 초기화 ──
  if(!S.awPerspective) S.awPerspective="team";      // "team" | "handbook"
  if(!S.awClub)        S.awClub="all";              // "all" | "sparks" | "tnt"
  if(!S.awTeamSel)     S.awTeamSel="rank";          // "rank" | team id
  if(!S.awHbSel)       S.awHbSel=null;

  const sparksHbs=["행글라이더","윙러너","스카이스토머"];
  const tntHbs=["어드벤처1","어드벤처2","챌린지1","챌린지2"];
  const sparksGrp=HB_GROUPS.find(g=>g.label==="Sparks");
  const tntGrp=HB_GROUPS.find(g=>g.label==="T&T");

  // 현재 클럽 필터에 맞는 핸드북 목록
  function clubHbs(){
    if(S.awClub==="sparks") return sparksHbs;
    if(S.awClub==="tnt")    return tntHbs;
    return [...sparksHbs,...tntHbs];
  }

  // awHbSel 유효성 확인
  const validHbs=clubHbs();
  if(!S.awHbSel||!validHbs.includes(S.awHbSel)) S.awHbSel=validHbs[0]||null;

  // ── 공통 helpers ──
  function awardItems(sid,hb){
    const a=wd?.students?.[sid]?.awards; if(!a) return [];
    const items=[];
    const attInfo=getAttAwardInfo(S.week);
    if(attInfo && calcAttAward(sid,attInfo.week,attInfo.allow))
      items.push({label:"출석상",color:"#7C3AED",bg:"#F5F3FF",border:"#DDD6FE"});
    if(getAwardGroup(hb)==="sparks"){
      const hbc=HB_BADGE_COLOR[hb]||{color:"#22C55E",light:"#F0FDF4",border:"#86EFAC"};
      if(a.badge) items.push({label:HB_BADGE_LABEL[hb]||"승급표식",color:hbc.color,bg:hbc.light,border:hbc.border});
      if(a.wing)  items.push({label:HB_WING_LABEL[hb]||"날개핀",color:hbc.color,bg:hbc.light,border:hbc.border});
      if(a.gems){
        const pastG=getPastAwards(sid).gems||0;
        GEM_SEQ.slice(pastG,pastG+a.gems).forEach(tid=>{
          const gc=TEAMS.find(x=>x.id===tid);
          items.push({label:tid==="red"?"빨강 보석":"초록 보석",color:gc.color,bg:gc.light,border:gc.border});
        });
      }
    } else {
      const hbc=HB_TNT_COLOR[hb]||{color:"#64748B",light:"#F8FAFC",border:"#E2E8F0"};
      if(a.award) items.push({label:hb+" 수상대",color:hbc.color,bg:hbc.light,border:hbc.border});
      (a.seals||[]).sort((x,y)=>parseInt(x)-parseInt(y))
        .forEach(s=>items.push({label:s,color:hbc.color,bg:hbc.light,border:hbc.border}));
    }
    return items;

    const t=getTeam(s.team);

      borderBottom:idx<total-1?"1px solid #F1F5F9":"none",

    // ── 이름+도트+암송 / 수상 뱃지들 ──
    const topRow=D({display:"flex",alignItems:"center",gap:"8px"});

    topRow.appendChild(D({display:"flex",alignItems:"center",gap:"6px",flexShrink:"0"},
      D({width:"9px",height:"9px",borderRadius:"50%",background:t.color,flexShrink:"0"}),
      SP({fontWeight:"700",fontSize:"18px",color:"#1E293B"},s.name),
      signs>0?SP({fontSize:"14px",fontWeight:"700",color:"#D97706"},signs+"개"):null
    ));

    topRow.appendChild(D({flex:"1",display:"flex",flexWrap:"wrap",gap:"4px",alignItems:"center"},

        ? items.map(it=>SP({background:it.bg,borderRadius:"6px",

    ));
