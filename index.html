function getAttAwardInfo(week){
  const cfg=[];
  if(S.settings.attAward1Week>0) cfg.push({week:S.settings.attAward1Week,allow:S.settings.attAward1Allow??1});
  if(S.settings.attAward2Week>0) cfg.push({week:S.settings.attAward2Week,allow:S.settings.attAward2Allow??1});
  const found=cfg.find(c=>c.week===week);
  if(!found) return null;
  return found;
}
function calcAttAward(sid, awardWeek, allowedAbsences){
  let absences=0;
  for(let w=1;w<=awardWeek;w++){
    const wd=S.wdata[w];
    const attended=wd?.students?.[sid]?.attendance;
    if(!attended) absences++;
  }
  return absences<=allowedAbsences;
}
function getAwards(sid){ return getWD().students?.[sid]?.awards||{}; }
function getPastAwards(sid){
  const past={badge:false,wing:false,gems:0,award:false,seals:[],enroll:false};
  Object.entries(S.wdata).forEach(([w,wd])=>{
    if(Number(w)===S.week) return;
    const a=wd?.students?.[sid]?.awards; if(!a) return;
    if(a.badge)  past.badge=true;
    if(a.wing)   past.wing=true;
    if(a.award)  past.award=true;
    if(a.enroll) past.enroll=true;
    past.gems+=(a.gems||0);
    (a.seals||[]).forEach(s=>{if(!past.seals.includes(s))past.seals.push(s);});
  });
  return past;
}

async function addLog(sid, event, detail){
  try{
    const st=S.students.find(s=>s.id===sid);
    if(!st) return;
    const dateStr=WEEK_DATES[S.week]||"";
    const logId=`${sid}_w${S.week}_${Date.now()}`;
    const logDoc={
      studentId:sid,
      name:st.name,
      grade:st.grade||"",
      team:st.team||"",
      handbook:st.handbook||"",
      week:S.week,
      date:dateStr,
      event,   // "시상"|"과정시작"|"과정완료"|"암송"
      detail,  // 상세내용
      signs:(getWD()?.students?.[sid]?.signs)||0,
      ts:Date.now()
    };
    const logs=S._logs||{};
    logs[logId]=logDoc;
    S._logs=logs;
    try{ await updateDoc(doc(db,"awana","logs"),{[logId]:logDoc}); }
    catch(e){ if(e.code==="not-found") await setDoc(doc(db,"awana","logs"),logs); else throw e; }
  }catch(e){console.warn("로그 저장 실패",e);}
}

async function saveAwards(sid, awards){
  if(isLocked()) return;
  const wd = JSON.parse(JSON.stringify(getWD()));
  const prev=(wd.students[sid]?.awards)||{};
  wd.students[sid] = {...(wd.students[sid]||{attendance:false,uniform:false,signs:0}), awards};
  S.wdata[S.week] = wd;
  await updateStudentWeek(S.week,sid,{awards});
  // 로그: 변경된 시상 항목 기록
  const details=[];
  if(awards.enroll&&!prev.enroll) details.push("입단");
  if(awards.badge&&!prev.badge) details.push("승급표식");
  if(awards.wing&&!prev.wing) details.push("날개핀");
  if(awards.award&&!prev.award) details.push("수상대");
  if((awards.gems||0)>(prev.gems||0)) details.push(`보석 ${awards.gems}개`);
  const newSeals=(awards.seals||[]).filter(s=>!(prev.seals||[]).includes(s));
  if(newSeals.length) details.push(`씰 ${newSeals.join(",")}`);
  if(details.length) await addLog(sid,"시상",details.join(" / "));
}

// ── Local Patch Layer: 내가 저장한 필드는 onSnapshot이 덮어쓰지 못하게 보호 ──
S._lp={};
function _lpSet(docKey,flat){
  if(!S._lp[docKey]) S._lp[docKey]={};
  const ts=Date.now();
  Object.entries(flat).forEach(([k,v])=>{ if(k==="_savedAt") return; S._lp[docKey][k]={value:v,ts}; });
}
function _lpApply(docKey,incoming){
  const patches=S._lp[docKey];
  if(!patches||!Object.keys(patches).length) return incoming;
  const merged=JSON.parse(JSON.stringify(incoming));
  Object.entries(patches).forEach(([dotPath,{value}])=>{
    const keys=dotPath.split(".");
    let cur=merged;
    for(let i=0;i<keys.length-1;i++){ if(!cur[keys[i]]||typeof cur[keys[i]]!=="object") cur[keys[i]]={};  cur=cur[keys[i]]; }
    cur[keys[keys.length-1]]=value;
  });
  return merged;
}
function _lpClean(docKey,incomingTs){
  const patches=S._lp[docKey];
  if(!patches) return;
  Object.keys(patches).forEach(k=>{ if(incomingTs>=patches[k].ts) delete patches[k]; });
}

// 학생 단위 부분 업데이트 (동시 편집 충돌 방지)
async function updateStudentWeek(w,sid,patch){
  const docKey=`week_${w}`;
  const ref=doc(db,"awana",docKey);
  const flat={};
  Object.entries(patch).forEach(([k,v])=>{ flat[`students.${sid}.${k}`]=v; });
  flat["_savedAt"]=Date.now();
  _lpSet(docKey,flat);
  try{ await updateDoc(ref,flat); }
  catch(e){
    if(e.code==="not-found"){ const wd=S.wdata[w]||initWD(); wd.students[sid]={...(wd.students[sid]||{}),...patch}; await setDoc(ref,{...wd,_savedAt:flat["_savedAt"]}); }
    else throw e;
  }
}

// 주차 문서 특정 필드만 업데이트
async function updateWeekField(w,flatPatch){
  const docKey=`week_${w}`;
  const ref=doc(db,"awana",docKey);
  const payload={...flatPatch,"_savedAt":Date.now()};
  _lpSet(docKey,payload);
  try{ await updateDoc(ref,payload); }
  catch(e){ if(e.code==="not-found") await saveWeek(w); else throw e; }
}

let wUnsub=null;
function listenWeek(w){
  if(wUnsub) wUnsub();
  wUnsub=onSnapshot(doc(db,"awana",`week_${w}`),snap=>{
    if(!snap.exists()){
      // Firebase에 문서 없을 때 - 기존 데이터 있으면 유지, 없을 때만 초기화
      if(!S.wdata[w]) S.wdata[w]=initWD();
      render(); return;
    }
    const incoming=snap.data();
    const existing=S.wdata[w];
    // 기존에 게임 데이터가 있는데 새 데이터에 없으면 게임 데이터 유지
    if(existing?.games && !incoming?.games?.sparks?.rounds?.length && !incoming?.games?.tnt?.rounds?.length){
      const spkRounds=existing.games?.sparks?.rounds||[];
      const tntRounds=existing.games?.tnt?.rounds||[];
      if(spkRounds.length>0||tntRounds.length>0){
        incoming.games=existing.games;
        incoming.gameFinalized=existing.gameFinalized||incoming.gameFinalized;
      }
    }
    _lpClean(`week_${w}`,incoming._savedAt||0);
    incoming=_lpApply(`week_${w}`,incoming);
    S.wdata[w]=incoming;
    render();
  });
}
function startListeners(){
  onSnapshot(doc(db,"awana","students"),snap=>{
    S.students=snap.exists()?(snap.data().list||[]):[];
    render();
  });
  WEEKS.forEach(w=>{
    if(w===S.week) return;
    onSnapshot(doc(db,"awana",`week_${w}`),snap=>{
      S.wdata[w]=snap.exists()?snap.data():initWD();
    });
  });
  onSnapshot(doc(db,"awana","settings"),snap=>{
    if(snap.exists()){
      const d=snap.data();
      S.settings={firstPlace:d.firstPlace||1000,gap:d.gap||150,attScore:d.attScore||50,uniScore:d.uniScore||50,signScore:d.signScore||50,
        attAward1Week:d.attAward1Week||0,attAward1Allow:d.attAward1Allow??1,
        attAward2Week:d.attAward2Week||0,attAward2Allow:d.attAward2Allow??1};
      S.settingsInput={...S.settings};
      if(d.passwords) S.passwords=d.passwords;
      S.closedWeeks=d.closedWeeks||Array.from({length:15},(_,i)=>i+1);
    }
    render();
  });
  onSnapshot(doc(db,"awana","schedule"),snap=>{
    S.schedule=snap.exists()?snap.data():{};
    render();
  });
  listenWeek(S.week);

  // 리모컨 동기화
  onSnapshot(doc(db,"awana","remote"),snap=>{
    if(!snap.exists()){console.log("[remote] 문서 없음");return;}
    const d=snap.data();
    const cmd=d.cmd||"";
    const ts=d.ts||0;
    console.log("[remote] 수신:",cmd,"ts:",ts,"lastTs:",S._lastRemoteTs,"isDisplay:",S._isDisplay,"showControl:",S._showControl);
    // 이미 처리한 명령이면 무시
    if(ts===S._lastRemoteTs){console.log("[remote] 중복 무시");return;}
    S._lastRemoteTs=ts;
    // 리모컨(컨트롤) 화면이거나 디스플레이 모드가 아니면 무시
    if(S._showControl){console.log("[remote] showControl 무시");return;}
    if(!S._isDisplay){console.log("[remote] isDisplay OFF 무시");return;}
    console.log("[remote] 실행:",cmd);
    if(cmd==="next"){
      if(S.ceremonyReady){S.ceremonyReady=false;startCeremony();}
      else cNextStep();
    }
    else if(cmd==="ceremony_start"){
      if(!S.ceremony&&!S.ceremonyReady){startCeremony();}
    }
    else if(cmd==="schedule_this"){S.scheduleScreen=true;render();}
    else if(cmd==="schedule_next"){S.scheduleScreen="next";render();}
    else if(cmd==="schedule_close"){S.scheduleScreen=false;render();}
    else if(cmd==="ceremony_close"){stopAllSounds();S.ceremony=false;S.cBlink=null;render();}
    else if(cmd==="slides_open"){S._slidesOpen=true;render();}
    else if(cmd==="slides_close"){S._slidesOpen=false;S._pdfPage=1;render();}
    else if(cmd==="slides_next"){if(S._pdfPage<S._pdfTotal){S._pdfPage++;renderPdfPage();}}
    else if(cmd==="slides_prev"){if(S._pdfPage>1){S._pdfPage--;renderPdfPage();}}
    else if(cmd==="pdf_url"){S._slidesUrl=d.url||"";S._pdfDoc=null;S._pdfPage=1;S._pdfTotal=0;}
    else if(cmd==="bonus"){
      // 보너스 점수: {cmd:"bonus", team:"red", val:50}
      const tid=d.team, val=d.val||0;
      if(tid) setBonus(tid,val);
    }
  });
}

function initRound(n){return{id:Date.now()+n,name:`라운드 ${n}`,mode:"team",scores:{red:0,yellow:0,green:0,blue:0}};}
function initGame(n=1){return{rounds:Array.from({length:n},(_,i)=>initRound(i+1))};}
function initWD(){return{students:{},games:{sparks:initGame(1),tnt:initGame(1)},gameFinalized:false};}
function getWD(){return S.wdata[S.week]||initWD();}
function getSD(sid){return getWD().students?.[sid]||{attendance:false,uniform:false,signs:0};}
function getTeam(tid){return TEAMS.find(t=>t.id===tid)||TEAMS[0];}
function hbStu(hb){return S.students.filter(s=>s.handbook===hb);}
const TEAM_DOTS={"red":"🔴","yellow":"🟡","green":"🟢","blue":"🔵"};
function isLocked(){return S.closedWeeks.includes(S.week);}
async function sendRemote(cmd, extra={}){
  await setDoc(doc(db,"awana","remote"),{cmd,...extra,ts:Date.now()});
}

function stuScore(sid){
  const d=getSD(sid),{attScore:a=50,uniScore:u=50,signScore:sg=50}=S.settings;
  return (d.attendance?a:0)+(d.uniform?u:0)+((d.signs||0)*sg);
}
function teamHb(tid){return S.students.filter(s=>s.team===tid).reduce((s,st)=>s+stuScore(st.id),0);}
function gameCum(type,tid){return(getWD().games?.[type]?.rounds||[]).reduce((s,r)=>s+(r.scores?.[tid]||0),0);}
function rankScores(type){
  const fp=S.settings.firstPlace, gap=S.settings.gap;
  // 점수 기준 정렬
  const sorted=[...TEAMS].sort((a,b)=>gameCum(type,b.id)-gameCum(type,a.id));
  const res={};
  let i=0;
  while(i<sorted.length){
    // 같은 점수인 팀 묶기
    const score=gameCum(type,sorted[i].id);
    let j=i;
    while(j<sorted.length && gameCum(type,sorted[j].id)===score) j++;
    // i~j-1 모두 같은 등수 → i번째 등수 점수 부여 (j-i개 건너뜀)
    const rankScore=Math.max(0, fp - i*gap);
    for(let k=i;k<j;k++) res[sorted[k].id]=rankScore;
    i=j;
  }
  return res;
}
function getBonus(tid){
  return (getWD().bonus?.[tid]||0);
}
async function setBonus(tid,val){
  const wd=JSON.parse(JSON.stringify(getWD()));
  if(!wd.bonus) wd.bonus={};
  wd.bonus[tid]=Math.max(0,val);

function parseCSV(text){
  text=text.replace(/^\uFEFF/,"").replace(/\r\n/g,"\n").replace(/\r/g,"\n");
  const lines=text.split("\n").map(l=>l.trim()).filter(Boolean);
  const result=[];
  lines.forEach((line,i)=>{
    if(i===0&&/이름|name/i.test(line)) return;
    const sep=line.includes("\t")?"\t":",";
    const raw=line.split(sep).map(x=>x.replace(/^"|"$/g,"").trim());
    const name=raw[0]||"";
    const teamRaw=(raw[1]||"").replace(/\s/g,"");
    const hb=(raw[2]||"").replace(/\s/g,"");
    const tid=TEAM_MAP[teamRaw];
    if(tid&&name) result.push({id:`s_${Date.now()}_${i}_${Math.random().toString(36).slice(2)}`,name,team:tid,handbook:hb});
  });
  return result;
}

    S.cHbScores[t.id]=totalScore(t.id)-(S.cGameScores[t.id]||0);
  });
  S.cSorted=[...TEAMS].sort((a,b)=>totalScore(b.id)-totalScore(a.id));
  S.cMaxScore=Math.max(...TEAMS.map(t=>targets[t.id]||0),1);

  // 동점 그룹 구성: [[4등팀들], [3등팀들], [2등팀들], [1등팀들]] 순 (낮은 등수부터)
  const byScore=[...S.cSorted]; // 높은 점수 순
  const groups=[];
  let i=0;
  while(i<byScore.length){
    const sc=totalScore(byScore[i].id);
    let j=i;
    while(j<byScore.length&&totalScore(byScore[j].id)===sc) j++;
    groups.push(byScore.slice(i,j).map(t=>t.id));
    i=j;
  }

  S.cTieGroups=groups.reverse(); // [4등그룹, 3등그룹, 2등그룹, 1등그룹]

function cAnimate(fromScores,toScores,dur,onDone){
  const t0=Date.now();
  (function tick(){
    const p=Math.min((Date.now()-t0)/dur,1),e=1-Math.pow(1-p,3);
    TEAMS.forEach(t=>{
      S.cScores[t.id]=Math.round((fromScores[t.id]||0)+((toScores[t.id]||0)-(fromScores[t.id]||0))*e);
    });
    updateBarsDirect();
    if(p<1){requestAnimationFrame(tick);}
    else{TEAMS.forEach(t=>{S.cScores[t.id]=toScores[t.id]||0;});onDone();}
  })();
}

function _revealGroup(groups, gIdx, noDecrease){
  const totalGroups=groups.length;
  if(gIdx>=totalGroups){
    S.cPhase="done"; S.cBannerIdx=9; playSound("fanfare_big"); render(); setTimeout(spawnConfetti,50);
    return;
  }
  const group=groups[gIdx]; // 이번에 공개할 팀들
  const isLast=gIdx===totalGroups-1;
  const groupRankFromBottom=gIdx; // 0=최하위, totalGroups-1=1등
  const rankFromTop=totalGroups-1-gIdx; // 0=1등

  // 바 목표: 이 그룹의 점수까지
  // 현재 그룹 이상 점수인 팀(상위 그룹)은 캡 미적용 → 현재 그룹 점수에 머무름
  const groupScore=S.cTargets[group[0]]||0;
  const from={...S.cScores};
  const rawTo={};
  // 현재 그룹에 속한 팀들의 점수 집합
  const groupIds=new Set(group);
  // 상위 그룹 팀들 (현재 그룹보다 높은 점수)
  const higherGroupIds=new Set(
    groups.slice(gIdx+1).reduce((arr,g)=>[...arr,...g],[])
  );
  TEAMS.forEach(t=>{
    if(higherGroupIds.has(t.id)){
      rawTo[t.id]=groupScore; // 상위 팀은 현재 그룹 점수까지만 (아직 공개 안됨)
    } else {
      rawTo[t.id]=Math.min(S.cTargets[t.id]||0, groupScore);
    }
  });
  const to=noDecrease(from,rawTo);

  playSound("drumroll");
  cAnimate(from,to,3200,()=>{
    // 그룹 공개 (dramatic일 때는 나중에 추가)
    S.cGroupStep=gIdx+1;

    // 배너 인덱스 업데이트
    const sorted=S.cSorted;
    const names=group.map(id=>TEAMS.find(t=>t.id===id).name).join(", ");
    const isTie=group.length>1;

    if(isLast){
      // 1등 바 올라온 후 → 바로 우승 선언
      const isTieLast=group.length>1;
      const winNames=group.map(id=>TEAMS.find(t=>t.id===id)?.name).join(", ");
      S.cRevealed=[...S.cRevealed,...group];
      S.cDynBanner=isTieLast?`🏆 공동 우승! ${winNames}팀!`:`🏆 우승! ${winNames}팀!`;
      S.cDynBanner2="";
      S.cPhase="done";
      S.cBlinkGroup=group; S.cBlink=group[0];
      playFanfareBig();
      render(); setTimeout(spawnConfetti,50);
      setTimeout(()=>{S.cDynBanner2="서울영동교회 어와나클럽원 모두 최고! 🎉\n우리는 하나님께 인정받는 부끄러울 것이 없는 일꾼!";render()},10000);
    } else {
      // 중간 등수 공개
      const teamsAbove=groups.slice(gIdx+1).reduce((s,g)=>s+g.length,0);
      const curRank=teamsAbove+1;
      const teamsAboveNext=groups.slice(gIdx+2).reduce((s,g)=>s+g.length,0);
      const nextRank=teamsAboveNext+1;
      const isSecond=nextRank===1;
      let curLabel;
      if(curRank===2) curLabel=isTie?"공동 준우승":"준우승";
      else curLabel=isTie?`공동 ${curRank}등`:`${curRank}등`;

      // ★ 2등(단독/공동) + 다음이 1등 단독 → 극적 연출 모드
      const nextGroup=groups[gIdx+1];
      const isDramatic = isSecond && nextGroup.length===1;

      if(isDramatic){
        // 2등 바 올라온 상태에서 1등+2등 동시 깜빡 + "과연 우승팀은?"
        S.cPhase="dramatic"; // 새 페이즈: 클릭 대기
        playSound("drumroll_final");
        const winnerName=TEAMS.find(t=>t.id===nextGroup[0])?.name;
        const secondName=names;
        S.cDynBanner=`🥁 과연 우승팀은?!`;
        S.cDynBanner2=``;
        // 1등+2등 둘 다 깜빡
        S.cBlinkGroup=[...group, ...nextGroup];
        S.cBlink=group[0];
        // 클릭 시 동작을 저장
        S._dramaticGroups=groups;
        S._dramaticGIdx=gIdx;
        S._dramaticWinner=nextGroup;
        S._dramaticSecond=group;
      } else {
        S.cRevealed=[...S.cRevealed,...group];
        S.cPhase="paused";
        playSound("chime");
        S.cDynBanner=`${names}팀 ${curLabel}! 🎉`;
        S.cDynBanner2=isSecond?`🏆 우승과 준우승은?! 🥁`:`다음은 ${nextRank}등은?! 🥁`;
        S.cBlinkGroup=group;
        S.cBlink=group[0];
        setTimeout(()=>{if(S.cBlink===group[0]){S.cBlik=null;S.cBlinkGroup=null;render();}},3000);
      }
    }
    render();
  });
}
function updateBarsDirect(){
  const maxScore=S.cMaxScore||1;
  const MIN_GAP=20;
  // 최소 간격 보정
  const rawH={};
  TEAMS.forEach(t=>{rawH[t.id]=Math.max(4,Math.round((S.cScores[t.id]/maxScore)*420));});
  const sortedT=[...TEAMS].sort((a,b)=>(S.cScores[b.id]||0)-(S.cScores[a.id]||0));
  for(let i=1;i<sortedT.length;i++){
    const prev=sortedT[i-1],cur=sortedT[i];
    if((S.cScores[prev.id]||0)>(S.cScores[cur.id]||0) && rawH[prev.id]-rawH[cur.id]<MIN_GAP){
      rawH[cur.id]=Math.max(4,rawH[prev.id]-MIN_GAP);
    }
  }
  TEAMS.forEach(t=>{
    const bar=document.getElementById("cbar_"+t.id);
    const num=document.getElementById("cnum_"+t.id);
    const above=document.getElementById("above_"+t.id);
    if(bar){
      const newH=rawH[t.id];
      const curH=parseInt(bar.style.height)||0;
      const h=Math.max(curH,newH);
      bar.style.height=h+"px";
      if(above) above.style.bottom=h+"px";
    }
    if(num) num.textContent=S.cScores[t.id]>0?S.cScores[t.id].toLocaleString():"";
  });
}

function spawnConfetti(){
  const c=document.getElementById("cconf");if(!c) return;
  c.innerHTML="";
  // keyframes를 JS로 직접 생성 (CSS 변수 없이)
  const COLORS=["#EF4444","#3B82F6","#22C55E","#EAB308","#FFD700","#FF69B4","#A855F7","#06B6D4","#ffffff","#FF8C00"];
  const SHAPES=["circle","rect","ribbon"];
  for(let i=0;i<200;i++){
    const col=COLORS[Math.floor(Math.random()*COLORS.length)];
    const shape=SHAPES[Math.floor(Math.random()*SHAPES.length)];
    const sz=shape==="ribbon"?(3+Math.random()*5):(6+Math.random()*10);
    const h=shape==="ribbon"?(sz*5):(sz);
    const dur=(2.5+Math.random()*3.0).toFixed(2);
    const delay=(Math.random()*2.5).toFixed(2);
    const endX=(-120+Math.random()*240).toFixed(0);
    const rot=(Math.random()*720-360).toFixed(0);
    const left=(Math.random()*100).toFixed(1);
    const br=shape==="circle"?"50%":shape==="ribbon"?"2px":"3px";
    // 각 조각마다 고유 keyframe 이름
    const kfName="cf"+i;
    const st=document.createElement("style");
    st.textContent=`@keyframes ${kfName}{0%{transform:translateY(-20px) translateX(0px) rotate(0deg);opacity:1}100%{transform:translateY(105vh) translateX(${endX}px) rotate(${rot}deg);opacity:0}}`;
    document.head.appendChild(st);
    const d=document.createElement("div");
    d.style.cssText=`position:fixed;top:-20px;left:${left}%;width:${sz.toFixed(1)}px;height:${h.toFixed(1)}px;background:${col};border-radius:${br};pointer-events:none;z-index:9999;animation:${kfName} ${dur}s linear ${delay}s forwards;`;
    c.appendChild(d);
  }
}

function el(tag,props={},...ch){
  const e=document.createElement(tag);
  Object.entries(props).forEach(([k,v])=>{
    if(k==="style"&&typeof v==="object") Object.assign(e.style,v);
    else if(k==="className") e.className=v;
    else if(k.startsWith("on")&&typeof v==="function") e.addEventListener(k.slice(2).toLowerCase(),v);
    else e.setAttribute(k,v);
  });
  ch.flat().forEach(c=>{if(c==null||c===false)return;e.appendChild(typeof c==="string"||typeof c==="number"?document.createTextNode(String(c)):c);});
  return e;
}

function inp(ph,val,fn,style={},type="text"){
  const i=document.createElement("input");i.type=type;i.placeholder=ph;i.value=val!=null?String(val):"";
  Object.assign(i.style,{border:"1px solid #E2E8F0",borderRadius:"8px",padding:"8px 10px",fontSize:"13px",...style});
  i.addEventListener("input",()=>fn(i.value));return i;
}
function sel(opts,val,fn,style={}){
  const s=document.createElement("select");Object.assign(s.style,style);
  opts.forEach(([v,l,os])=>{const o=document.createElement("option");o.value=v;o.textContent=l;if(v===val)o.selected=true;if(os)Object.assign(o.style,os);s.appendChild(o);});
  s.addEventListener("change",()=>fn(s.value));return s;
}

    btn.appendChild(topRow);btn.appendChild(botRow);
    return D({background:"#fff",borderRadius:"12px",border:"1px solid #E2E8F0",overflow:"hidden"},btn);
  });

  // 팀 합계
  const totalSigns=books.reduce((sum,hb)=>{
    return sum+hbStu(hb).reduce((s,st)=>{const v=(wd.students?.[st.id]||{}).signs||0;return s+(typeof v==="number"?v:parseFloat(v)||0);},0);
  },0);
  const totalPts=books.reduce((sum,hb)=>sum+hbStu(hb).reduce((s,st)=>s+stuScore(st.id),0),0);
  const totalStudents=books.reduce((sum,hb)=>sum+hbStu(hb).length,0);

function mkShield(active, size=22){
  const el=document.createElement("div");
  el.style.cssText=`width:${size}px;height:${size}px;flex-shrink:0;cursor:pointer;opacity:${active?"1":"0.25"};transition:opacity 0.15s;position:relative;`;
  const fs=Math.round(size*0.38);
  el.innerHTML=`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="${size}" height="${size}" style="display:block">
    <path fill="${active?"#ccd6dd":"#bbc"}" d="M29.333 2.667C23.111 0 16 0 16 0S8.889 0 2.667 2.667C0 16 2.667 27.556 16 32c13.333-4.444 16-16 13.333-29.333z"/>
    <path fill="${active?"#55acee":"#aab"}" d="M16 30.119C5.7 26.426 1.743 17.628 4.231 3.95 9.834 1.804 15.936 1.778 16 1.778c.063 0 6.185.036 11.769 2.172 2.488 13.677-1.468 22.476-11.769 26.169z"/>
    <path fill="${active?"#226699":"#889"}" d="M27.769 3.95C22.185 1.813 16.063 1.778 16 1.778v28.341c10.3-3.693 14.257-12.492 11.769-26.169z"/>
  </svg>`;
  return el;
}

function buildHbDetail(hb){
  const locked=isLocked(),attAll=allChecked(hb,"attendance"),uniAll=allChecked(hb,"uniform");
  const wd=getWD();
  const stuList=[...hbStu(hb)].sort((a,b)=>a.name.localeCompare(b.name,"ko"));
  const att=stuList.filter(s=>(wd.students?.[s.id]||{}).attendance).length;
  const uni=stuList.filter(s=>(wd.students?.[s.id]||{}).uniform).length;
  const signs=stuList.reduce((s,st)=>{const v=(wd.students?.[st.id]||{}).signs||0;return s+(typeof v==="number"?v:parseFloat(v)||0);},0);

  // 헤더: 핸드북명만
  const hdrRow=D({display:"flex",alignItems:"center",marginBottom:"6px",
    background:"#fff",borderRadius:"12px",border:"1px solid #E2E8F0",padding:"10px 14px"},
    SP({fontWeight:"700",fontSize:"18px",color:"#1E293B"},hb)
  );

  const noticeBanner=D({display:"flex",alignItems:"center",gap:"8px",
    background:"#F8FAFC",borderRadius:"10px",border:"1px solid #E2E8F0",
    padding:"9px 13px",marginBottom:"12px"},
    SP({fontSize:"14px",flexShrink:"0"},"📌"),
    SP({fontSize:"13px",color:"#94A3B8",fontWeight:"500"},"개수 조정 시 자동으로 저장됩니다.")
  );

  const cards=stuList.map(s=>{
    const d=getSD(s.id),t=getTeam(s.team);
    const isTnt=getAwardGroup(hb)==="tnt";
    const aw=d.awards||{};
    const hasAward=!!(aw.enroll||aw.badge||aw.wing||aw.award||(aw.gems>0)||(aw.seals&&aw.seals.length>0));
    const isEditing=S.editingSigns===s.id;

    function mkBtn(label,onClick,isRed){
      return B({
        flex:"1",padding:"8px 0",borderRadius:"8px",border:"none",
        background:isRed?"#F1F5F9":"#64748B",
        cursor:locked?"not-allowed":"pointer",
        fontSize:"14px",fontWeight:"700",textAlign:"center",
        color:isRed?"#94A3B8":"#fff",userSelect:"none"},onClick,label);
    }

    let signsEl;
    if(isEditing){
      signsEl=document.createElement("input");
      Object.assign(signsEl.style,{
        width:"36px",textAlign:"center",fontWeight:"800",fontSize:"20px",
        border:"none",borderBottom:"2px solid #3B82F6",outline:"none",
        background:"transparent",color:"#1E293B"});
      signsEl.type="number";signsEl.value=d.signs||0;
      signsEl.addEventListener("blur",async()=>{
        const v=parseFloat(signsEl.value)||0;
        await setSD(s.id,{signs:Math.max(0,v)});
        S.editingSigns=null;render();
      });
      signsEl.addEventListener("keydown",e=>{if(e.key==="Enter")signsEl.blur();});
      setTimeout(()=>signsEl.select(),0);
    } else {
      signsEl=D({flex:"1",textAlign:"center",fontWeight:"800",fontSize:"20px",
        color:"#1E293B",cursor:"pointer",userSelect:"none"},d.signs||0);
      signsEl.addEventListener("click",e=>{
        e.stopPropagation();if(!locked){S.editingSigns=s.id;render();}});
    }

    const awardEl=(()=>{
      const el=mkShield(hasAward,22);
      el.addEventListener("click",e=>{e.stopPropagation();S.awardPopup={sid:s.id,name:s.name,hb};render();});
      return el;
    })();

    return D({background:"#fff",borderRadius:"12px",border:"1px solid #E2E8F0",
      padding:"12px 14px",marginBottom:"8px",
      display:"flex",flexDirection:"column",gap:"12px"},
      // 윗줄: 이름 + 출석/단복 동그라미 + 방패 + 점수
      D({display:"flex",alignItems:"center",gap:"8px"},
        D({width:"8px",height:"8px",borderRadius:"50%",background:t.color,flexShrink:"0"}),
        SP({fontWeight:"700",fontSize:"18px",color:"#1E293B"},s.name),
        s.grade?SP({fontSize:"11px",fontWeight:"700",flexShrink:"0",
          padding:"2px 6px",borderRadius:"6px",
          background:"#F1F5F9",color:"#64748B",border:"1px solid #E2E8F0",
          marginLeft:"2px"},s.grade==="유"?"7세":s.grade+"학년"):null,
        D({flex:"1"}),
        // 출석 뱃지
        SP({fontSize:"11px",fontWeight:"700",flexShrink:"0",
          padding:"2px 6px",borderRadius:"6px",
          border:d.attendance?"1.5px solid #16A34A":"1.5px solid #E2E8F0",
          color:d.attendance?"#16A34A":"#CBD5E1",
          background:d.attendance?"#F0FDF4":"#F8FAFC"},
          "출"),
        // 단복 뱃지
        SP({fontSize:"11px",fontWeight:"700",flexShrink:"0",marginRight:"2px",
          padding:"2px 6px",borderRadius:"6px",
          border:d.uniform?"1.5px solid #2563EB":"1.5px solid #E2E8F0",
          color:d.uniform?"#2563EB":"#CBD5E1",
          background:d.uniform?"#EFF6FF":"#F8FAFC"},
          "단"),
        D({width:"22px",display:"flex",justifyContent:"center",flexShrink:"0"},awardEl),
        SP({fontWeight:"800",color:"#1E293B",fontSize:"16px",
          width:"54px",textAlign:"right",flexShrink:"0"},stuScore(s.id)+"점")
      ),
      // 아랫줄: 암송 입력 그룹 (도트 8px + gap 8px = 16px 들여쓰기)
      D({display:"flex",alignItems:"center",gap:"6px",opacity:locked?"0.5":"1",paddingLeft:"16px"},
        mkBtn("-",()=>{setSD(s.id,{signs:Math.max(0,(d.signs||0)-1)});showToast();},true),
        signsEl,
        isTnt?mkBtn("+½",()=>{setSD(s.id,{signs:Math.round(((d.signs||0)+0.5)*10)/10});showToast();},false):null,
        mkBtn("+",()=>{setSD(s.id,{signs:(d.signs||0)+1});showToast();},false),
        mkBtn("+3",()=>{setSD(s.id,{signs:(d.signs||0)+3});showToast();},false)
      )
    );
  });

  const totalPts=stuList.reduce((s,st)=>s+stuScore(st.id),0);
  const footer=D({background:"#F8FAFC",borderRadius:"12px",border:"1px solid #E2E8F0",
    padding:"10px 14px",marginTop:"4px",
    display:"flex",justifyContent:"space-between",alignItems:"center"},
    SP({fontSize:"14px",color:"#94A3B8"},`암송 ${Math.round(signs*10)/10}개 · 출석 ${att}명 · 단복 ${uni}명`),
    SP({fontSize:"17px",fontWeight:"800",color:"#1E293B"},totalPts.toLocaleString()+"점")
  );

  return D({},hdrRow,noticeBanner,...cards,footer);
}

function buildGame(){
  const wd=getWD(),fin=wd.gameFinalized,locked=isLocked()||S.role==="general";

  return D({},
    // 스팍스/티앤티 탭 + 게임 종료 버튼
    D({display:"flex",gap:"8px",marginBottom:"14px",alignItems:"stretch"},
      ...[["sparks","스팍스"],["tnt","티앤티"]].map(([t,l])=>{
        const btn=B({flex:"1",padding:"10px 0",borderRadius:"10px",border:"none",cursor:"pointer",
          fontWeight:"700",fontSize:"14px",
          background:S.gameTab===t?"#1E293B":"#F1F5F9",
          color:S.gameTab===t?"#fff":"#64748B"},
          ()=>{S.gameTab=t;render();});
        btn.appendChild(mkClubLabel(t," "+l,16));return btn;
      }),
      !locked?(
        !fin
          ? B({background:"#F8FAFC",border:"1px solid #E2E8F0",borderRadius:"10px",
              padding:"10px 12px",color:"#64748B",fontWeight:"700",fontSize:"13px",
              cursor:"pointer",whiteSpace:"nowrap",flexShrink:"0"},
              ()=>setFinalized(true),"🏁 게임 종료")
          : B({background:"#FEF2F2",border:"1px solid #FECACA",borderRadius:"10px",
              padding:"10px 12px",color:"#EF4444",fontWeight:"700",fontSize:"13px",
              cursor:"pointer",whiteSpace:"nowrap",flexShrink:"0"},
              ()=>setFinalized(false),"↩️ 취소")
      ):null
    ),
    (()=>{
      const mkLine=(type)=>{
        const lbl=type==="sparks"?"스팍스":"티앤티";
        const lblColor=type==="sparks"?"#EF4444":"#16A34A";
        const row=D({display:"flex",alignItems:"center",gap:"6px",
          padding:"6px 10px",background:"#F8FAFC",
          borderRadius:"8px",border:"1px solid #E2E8F0"});

        TEAMS.forEach((t)=>{
          const pts=gameCum(type,t.id);
          const cell=D({flex:"1",display:"flex",flexDirection:"column",alignItems:"center",gap:"0px"});
          cell.appendChild(SP({fontSize:"12px",fontWeight:"800",color:t.color,textAlign:"center"},t.name));
          cell.appendChild(SP({fontSize:"11px",fontWeight:"700",color:"#475569",textAlign:"center"},pts.toLocaleString()));
          row.appendChild(cell);
        });
        return row;
      };
      return D({display:"flex",flexDirection:"column",gap:"4px",marginBottom:"10px"},
        mkLine(S.gameTab));
    })(),
    fin?D({background:"#F0FDF4",border:"1px solid #BBF7D0",borderRadius:"10px",
      padding:"10px 14px",marginBottom:"12px",fontSize:"13px",color:"#16A34A"},
      "✅ 게임 결과 확정됨"):null,
    buildGameType(S.gameTab,wd,fin,locked)
  );
}

function buildGameType(type,wd,fin,locked){
  const game=wd.games?.[type]||initGame(1);
  // 라운드가 없으면 기본 라운드 1 자동 추가
  if(!game.rounds||game.rounds.length===0){
    setGame(type,g=>({...g,rounds:[initRound(1)]}));
  }

  async function addScore(roundId, tid, sc){
    const curScore=getWD().games?.[type]?.rounds?.find(r=>r.id===roundId)?.scores?.[tid]||0;
    // 이미 같은 버튼(점수 일치) → 토글 해제 (0으로)
    if(curScore===sc){
      await setGame(type,g=>({...g,rounds:g.rounds.map(r=>
        r.id===roundId?{...r,scores:{...r.scores,[tid]:0}}:r
      )}));
      render(); return;
    }
    // 다른 버튼 → 해당 점수로 덮어쓰기
    await setGame(type,g=>({...g,rounds:g.rounds.map(r=>
      r.id===roundId?{...r,scores:{...r.scores,[tid]:sc}}:r
    )}));
    render();
  }

  const reversedRounds=[...game.rounds].reverse();
  const wrap=D({});

  reversedRounds.forEach((round,ri)=>{
    const mode=round.mode||"team";
    const isIndividual=mode==="individual";
    const scoreButtons=isIndividual?[50,100,150,200]:[100,200,300,400];
    const allLocked=TEAMS.every(t=>scoreButtons.includes(round.scores?.[t.id]||0)&&(round.scores?.[t.id]||0)>0);
    const lockedCount=TEAMS.filter(t=>scoreButtons.includes(round.scores?.[t.id]||0)&&(round.scores?.[t.id]||0)>0).length;
    const origIdx=game.rounds.findIndex(r=>r.id===round.id);
    const isFirstRound=origIdx===0;
    const isLastRound=ri===0;

    const roundEl=D({});

    if(ri>0) roundEl.appendChild(D({borderTop:"2px dashed #E2E8F0",margin:"10px 0 8px"}));

    // 라운드 헤더
    const hdrRight=D({display:"flex",gap:"4px",alignItems:"center"});
    if(!fin&&!locked){
      if(isLastRound){
        hdrRight.appendChild(B({background:"#1E293B",border:"none",borderRadius:"6px",
          color:"#fff",cursor:"pointer",fontSize:"14px",fontWeight:"700",padding:"4px 10px",whiteSpace:"nowrap"},
          ()=>setGame(type,g=>({...g,rounds:[...g.rounds,initRound(g.rounds.length+1)]})),"+ 라운드"));
      }
      if(isFirstRound){
        hdrRight.appendChild(B({background:"none",border:"1px solid #FECACA",borderRadius:"6px",
          color:"#EF4444",cursor:"pointer",fontSize:"14px",fontWeight:"600",padding:"4px 8px",whiteSpace:"nowrap"},
          ()=>setGame(type,g=>({...g,rounds:[initRound(1)]})),"🗑️"));
      } else {
        hdrRight.appendChild(B({background:"none",border:"1px solid #FECACA",borderRadius:"6px",
          color:"#EF4444",cursor:"pointer",fontSize:"14px",fontWeight:"600",padding:"4px 8px",whiteSpace:"nowrap"},
          ()=>{if(confirm("이 라운드를 삭제할까요?"))setGame(type,g=>({...g,rounds:g.rounds.filter(r=>r.id!==round.id)}));},"🗑️"));
      }
    }

    const modeToggle=(!fin&&!locked)
      ? D({display:"flex",gap:"2px",background:"#F1F5F9",borderRadius:"8px",padding:"2px",flexShrink:"0"},
          B({padding:"4px 10px",borderRadius:"6px",border:"none",cursor:"pointer",fontSize:"14px",fontWeight:"700",
            background:!isIndividual?"#1E293B":"transparent",color:!isIndividual?"#fff":"#94A3B8"},
            ()=>{setGame(type,g=>({...g,rounds:g.rounds.map(r=>r.id===round.id?{...r,mode:"team"}:r)}));},"팀"),
          B({padding:"4px 10px",borderRadius:"6px",border:"none",cursor:"pointer",fontSize:"14px",fontWeight:"700",
            background:isIndividual?"#1E293B":"transparent",color:isIndividual?"#fff":"#94A3B8"},
            ()=>{setGame(type,g=>({...g,rounds:g.rounds.map(r=>r.id===round.id?{...r,mode:"individual"}:r)}));},"개인")
        )
      : SP({fontSize:"13px",color:"#94A3B8",fontWeight:"600",background:"#F8FAFC",borderRadius:"6px",padding:"3px 8px",flexShrink:"0"},
          isIndividual?"개인":"팀");

    roundEl.appendChild(D({display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"8px"},
      D({display:"flex",alignItems:"center",gap:"8px",flexWrap:"wrap"},
        B({fontWeight:"700",fontSize:"15px",
          background:"#F1F5F9",border:"1px solid #E2E8F0",borderRadius:"8px",
          padding:"4px 10px",cursor:fin||locked?"default":"pointer",color:"#1E293B"},
          ()=>{if(!fin&&!locked){const n=prompt("라운드 이름:",round.name);if(n)setGame(type,g=>({...g,rounds:g.rounds.map(r=>r.id===round.id?{...r,name:n}:r)}));}},
          round.name),
        modeToggle,
        null
      ),
      hdrRight
    ));

    // 팀 카드들
    const cardsGrid=D({display:"grid",gap:"8px",marginBottom:"8px"});
    TEAMS.forEach(t=>{
      const curScore=round.scores?.[t.id]||0;
      const isTeamLocked=scoreButtons.includes(curScore)&&curScore>0;
      const card=D({background:"#fff",borderRadius:"12px",
        border:`2px solid ${isTeamLocked?t.color:t.border}`,
        padding:"10px 12px",transition:"border-color 0.15s"});
      card.appendChild(D({display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"8px"},
        SP({fontWeight:"600",color:t.color,fontSize:"15px",display:"flex",alignItems:"center",gap:"5px"},
          D({width:"8px",height:"8px",borderRadius:"50%",background:t.color,flexShrink:"0"}),t.name+"팀"),
        SP({fontWeight:"800",color:t.color,fontSize:"17px"},curScore.toLocaleString(),"점")
      ));
      const btnRow=D({display:"flex",gap:"5px"});
      scoreButtons.forEach(sc=>{
        const isSelected=curScore===sc;
        const sb=D({flex:"1",background:isSelected?t.color:"#fff",
          color:isSelected?"#fff":isTeamLocked?"#CBD5E1":"#475569",
          borderRadius:"20px",padding:"14px 4px",textAlign:"center",
          fontWeight:"700",fontSize:"14px",cursor:(fin||locked)?"not-allowed":"pointer",
          border:`1.5px solid ${isSelected?t.color:"#E2E8F0"}`,
          opacity:isTeamLocked&&!isSelected?"0.5":"1",transition:"all 0.12s",userSelect:"none"});
        sb.textContent="+"+sc.toLocaleString();
        if(!fin&&!locked) sb.addEventListener("click",()=>addScore(round.id,t.id,sc));
        btnRow.appendChild(sb);
      });
      card.appendChild(btnRow);
      cardsGrid.appendChild(card);
    });
    roundEl.appendChild(cardsGrid);

    // 라운드 추가 버튼: 최신 라운드 아래, 전체입력시 초록 활성화
    if(isLastRound&&!fin&&!locked){
      const addBtn=B({
        width:"100%",
        background:allLocked?"linear-gradient(135deg,#22C55E,#16A34A)":"#F8FAFC",
        border:allLocked?"none":"2px dashed #CBD5E1",
        borderRadius:"10px",padding:"11px",
        color:allLocked?"#fff":"#94A3B8",
        fontWeight:"700",fontSize:"13px",cursor:"pointer",marginTop:"4px",
        boxShadow:allLocked?"0 4px 16px rgba(34,197,94,0.35)":"none",
        transition:"all 0.2s"
      },()=>setGame(type,g=>({...g,rounds:[...g.rounds,initRound(g.rounds.length+1)]})),
      allLocked?"✅ 라운드 완료 — 다음 라운드 추가":"+ 라운드 추가");
      roundEl.appendChild(addBtn);
    }

    wrap.appendChild(roundEl);
  });

  // 순위 모달
  if(S.showRankModal===type){
    const overlay=D({position:"fixed",inset:"0",background:"rgba(0,0,0,0.45)",
      display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:"160"});
    overlay.addEventListener("click",e=>{if(e.target===overlay){S.showRankModal=null;render();}});

    const sheet=D({background:"#fff",borderRadius:"20px 20px 0 0",
      width:"100%",maxWidth:"480px",padding:"20px 20px 32px"});

    sheet.appendChild(D({display:"flex",justifyContent:"space-between",alignItems:"center",
      marginBottom:"16px"},
      D({fontWeight:"700",fontSize:"16px"},"📊 "+(type==="sparks"?"스팍스":"티앤티")+" 누적 순위"),
      B({background:"none",border:"none",fontSize:"22px",cursor:"pointer",color:"#64748B"},
        ()=>{S.showRankModal=null;render();},"×")
    ));

    [...TEAMS].sort((a,b)=>gameCum(type,b.id)-gameCum(type,a.id)).forEach((t,i)=>{
      const maxScore=Math.max(...TEAMS.map(x=>gameCum(type,x.id)),1);
      const pct=Math.round((gameCum(type,t.id)/maxScore)*100);
      sheet.appendChild(D({marginBottom:"12px"},
        D({display:"flex",justifyContent:"space-between",marginBottom:"4px"},
          D({display:"flex",alignItems:"center",gap:"6px"},
            SP({fontSize:"16px"},["🥇","🥈","🥉","❤️"][i]),
            SP({fontWeight:"700",color:t.color,fontSize:"14px"},t.name,"팀")
          ),
          SP({fontWeight:"800",color:t.color,fontSize:"14px"},gameCum(type,t.id).toLocaleString(),"점")
        ),
        D({background:"#F1F5F9",borderRadius:"6px",height:"8px",overflow:"hidden"},
          D({width:pct+"%",height:"100%",background:t.color,borderRadius:"6px",
            transition:"width 0.4s ease"})
        )
      ));
    });

    overlay.appendChild(sheet);
    wrap.appendChild(overlay);
  }

  return wrap;
}

function buildResult(sorted){
  const wd=getWD();
  function teamHbGroup(tid,grp){
    return S.students.filter(s=>s.team===tid&&grp.books.includes(s.handbook))
      .reduce((sum,st)=>sum+stuScore(st.id),0);
  }
  const sparksGrp=HB_GROUPS.find(g=>g.label==="Sparks");
  const tntGrp=HB_GROUPS.find(g=>g.label==="T&T");

  return D({},
    wd.gameFinalized?B({width:"100%",background:"linear-gradient(135deg,#7C3AED,#A855F7)",color:"#fff",border:"none",borderRadius:"12px",padding:"14px",fontWeight:"800",fontSize:"15px",cursor:"pointer",marginBottom:"14px"},async()=>{
        const snap=await getDoc(doc(db,"awana","week_"+S.week));
        if(snap.exists()) S.wdata[S.week]=snap.data();
        startCeremony();
      },"🏆 시상식 공개"):null,
    D({fontWeight:"600",fontSize:"15px",marginBottom:"12px"},"최종 결과"),
    ...sorted.map((t,i)=>{
      const isFirst=i===0;
      const sparksHb=teamHbGroup(t.id,sparksGrp);
      const tntHb=teamHbGroup(t.id,tntGrp);
      const sparksGame=wd.gameFinalized?rankScores("sparks")[t.id]:null;
      const tntGame=wd.gameFinalized?rankScores("tnt")[t.id]:null;

      return D({background:"#fff",borderRadius:"12px",
        border:`2px solid ${isFirst?t.color:t.border}`,
        padding:"14px 16px",marginBottom:"10px"},
        D({display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"10px"},
          D({display:"flex",alignItems:"center",gap:"8px"},
            SP({fontSize:"18px"},["🥇","🥈","🥉","❤️"][i]),
            SP({fontWeight:"800",color:t.color,fontSize:"15px"},t.name,"팀")
          ),
          SP({fontWeight:"800",fontSize:"17px",color:t.color},totalScore(t.id).toLocaleString(),"점")
        ),
        D({borderTop:"1px solid #F1F5F9",paddingTop:"8px",display:"flex",gap:"12px",flexWrap:"wrap"},
          D({display:"flex",alignItems:"center",gap:"4px"},
            SP({fontSize:"11px",color:"#64748B"},"암송"),
            SP({fontWeight:"700",fontSize:"12px",color:"#1E293B"},(sparksHb+tntHb).toLocaleString(),"점")
          ),
          wd.gameFinalized?D({display:"flex",alignItems:"center",gap:"4px"},
            SP({fontSize:"11px",color:"#64748B"},"게임"),
            SP({fontWeight:"700",fontSize:"12px",color:"#1E293B"},((sparksGame||0)+(tntGame||0)).toLocaleString(),"점")
          ):SP({fontSize:"11px",color:"#94A3B8"},"게임 미확정")
        )
      );

    !wd.gameFinalized?D({background:"#F8FAFC",border:"1px solid #E2E8F0",borderRadius:"10px",padding:"10px 14px",marginTop:"4px",fontSize:"13px",color:"#64748B"},"⚠️ 경기 결과가 아직 확정되지 않았습니다."):null
  );

// ════════════════════════════════════
//  시상 팝업

function buildAwardPopup(){
  const {sid,name,hb}=S.awardPopup;
  const st=S.students.find(s=>s.id===sid);
  const t=getTeam(st?.team||"red");
  const isSpks=getAwardGroup(hb)==="sparks";
  const cur=getAwards(sid);
  const past=getPastAwards(sid);
  const isAdmin=S.role==="admin";
  const locked=isLocked();
  const close=()=>{S.awardPopup=null;render();};
  async function save(patch){await saveAwards(sid,{...cur,...patch});S.awardPopup={sid,name,hb};render();}

  function mkCircle(n,color,bg,border,size=36){
    return D({width:size+"px",height:size+"px",borderRadius:"50%",
      display:"flex",alignItems:"center",justifyContent:"center",
      background:bg,border:`2px solid ${border}`,
      fontWeight:"800",fontSize:(size*0.38)+"px",color,flexShrink:"0"},String(n));
  }

  function buildSparks(){
    const badgeNum=HB_BADGE_NUM[hb]||1;
    const hadBadge=!!past.badge, hasBadge=!!cur.badge;
    const hadWing=!!past.wing,   hasWing=!!cur.wing;
    const pastGems=past.gems||0, curGems=cur.gems||0, totalGems=pastGems+curGems;

    function mkBadgeCard(label,had,has,stuKey,curKey){
      const bc=HB_BADGE_COLOR[hb]||{color:"#22C55E",light:"#F0FDF4",border:"#86EFAC"};
      const bg=had?bc.light:has?bc.light:"#F8FAFC";
      const border=had?bc.color:has?bc.color:"#E2E8F0";
      const circleColor=had?bc.color:has?bc.color:"#E2E8F0";
      const card=D({flex:"1",borderRadius:"12px",border:`2px solid ${border}`,
        background:bg,padding:"12px 8px",textAlign:"center",
        opacity:had?"0.55":"1",
        cursor:(locked||had)?"not-allowed":"pointer",position:"relative"},
        D({width:"44px",height:"44px",borderRadius:"50%",margin:"0 auto 8px",
          background:circleColor,
          display:"flex",alignItems:"center",justifyContent:"center",
          fontWeight:"800",fontSize:"18px",color:"#fff"},
          had||has?"✓":String(badgeNum)
        ),
        D({fontSize:"12px",fontWeight:"700",color:(had||has)?bc.color:"#1E293B",lineHeight:"1.3"},label),
        isAdmin&&has&&!had?B({position:"absolute",top:"4px",right:"4px",fontSize:"10px",
          color:"#EF4444",background:"#fff",border:"1px solid #FECACA",
          borderRadius:"4px",padding:"1px 5px",cursor:"pointer"},
          async e=>{e.stopPropagation();
            await save({[curKey]:false});
            S.awardPopup={sid,name,hb};render();
          },"해제"):null
      );
      if(!locked&&!had) card.addEventListener("click",async e=>{
        if(e.target.tagName==="BUTTON") return;
        const newVal=!has;
        await saveStuMilestone(sid,{[stuKey]:newVal});
        await save({[curKey]:newVal});
      });
      return card;
    }

    const totalGems2=pastGems+curGems;
    const gemGrid=D({display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:"8px"},
      ...GEM_SEQ.map((tid,i)=>{
        const tm=TEAMS.find(x=>x.id===tid);
        const gemName=tid==="red"?"빨강":"초록";
        const isDone=i<totalGems2;
        const isCurRange=i>=pastGems&&i<totalGems2;
        const isDisabled=locked;

        const circleStyle={width:"36px",height:"36px",borderRadius:"50%",
          display:"flex",alignItems:"center",justifyContent:"center",
          fontWeight:"800",fontSize:"15px"};

        const circle=isDone
          ?D({...circleStyle,background:tm.color,color:"#fff"},"✓")
          :D({...circleStyle,background:"#F8FAFC",border:"1px solid #E2E8F0",color:"#CBD5E1"},String(i+1));

        const box=D({display:"flex",flexDirection:"column",alignItems:"center",gap:"5px",
          padding:"10px 6px",borderRadius:"10px",
          border:`2px solid ${isDone?tm.color:"#E2E8F0"}`,
          background:isDone?tm.light:"#F8FAFC",
          cursor:isDisabled?"default":"pointer",
          opacity:"1"},
          circle,
          SP({fontSize:"10px",fontWeight:isDone?"700":"400",
            color:isDone?tm.color:"#CBD5E1"},gemName)
        );

        if(!isDisabled) box.addEventListener("click",async()=>{
          if(isDone){
            if(isCurRange) await save({gems:curGems-1});
          } else {
            await save({gems:i-pastGems+1});
          }
        });
        return box;
      })
    );

    // 입단 카드 (행글라이더만)
    const showEnroll=hb==="행글라이더";
    const hadEnroll=!!past.enroll, hasEnroll=!!cur.enroll;
    const bc0=HB_BADGE_COLOR[hb]||{color:"#22C55E",light:"#F0FDF4",border:"#86EFAC"};
    const enrollCard=(()=>{
      const bg=hadEnroll?bc0.light:hasEnroll?bc0.light:"#F8FAFC";
      const border=hadEnroll?bc0.color:hasEnroll?bc0.color:"#E2E8F0";
      const cc=hadEnroll?bc0.color:hasEnroll?bc0.color:"#E2E8F0";
      const card=D({flex:"1",borderRadius:"12px",border:`2px solid ${border}`,
        background:bg,padding:"12px 8px",textAlign:"center",
        opacity:hadEnroll?"0.55":"1",
        cursor:(locked||hadEnroll)?"not-allowed":"pointer",position:"relative"},
        D({width:"44px",height:"44px",borderRadius:"50%",margin:"0 auto 8px",
          background:cc,display:"flex",alignItems:"center",justifyContent:"center",
          fontWeight:"800",fontSize:"18px",color:"#fff"},
          hadEnroll||hasEnroll?"✓":"🚀"
        ),
        D({fontSize:"12px",fontWeight:"700",color:(hadEnroll||hasEnroll)?bc0.color:"#1E293B",lineHeight:"1.3"},"스팍스 입단"),

        isAdmin&&hasEnroll&&!hadEnroll?B({position:"absolute",top:"4px",right:"4px",fontSize:"10px",
          color:"#EF4444",background:"#fff",border:"1px solid #FECACA",
          borderRadius:"4px",padding:"1px 5px",cursor:"pointer"},
          async e=>{e.stopPropagation();
            await save({enroll:false});
          },"해제"):null,
        null
      );
      if(!locked&&!hadEnroll) card.addEventListener("click",async e=>{
        if(e.target.tagName==="BUTTON") return;
        const newVal=!hasEnroll;
        await saveStuMilestone(sid,{enroll:newVal});
        await save({enroll:newVal});
      });
      return card;
    })();

    return D({},
      D({display:"flex",gap:"10px",marginBottom:"14px"},
        showEnroll?enrollCard:null,
        mkBadgeCard(HB_BADGE_LABEL[hb]||"승급표식",hadBadge,hasBadge,"badge","badge"),
        mkBadgeCard(HB_WING_LABEL[hb]||"날개핀",hadWing,hasWing,"wing","wing")
      ),
      D({fontWeight:"700",fontSize:"13px",color:"#475569",marginBottom:"8px"},"▸ 보석"),
      totalGems2>=8
        ? D({fontSize:"11px",color:"#94A3B8",marginBottom:"10px"},"🎉 8개 보석을 모두 받았어요!")
        : D({fontSize:"11px",color:"#94A3B8",marginBottom:"10px"},
            `${pastGems>0?pastGems+"개 받음 · ":""}${totalGems2>=8?"8개 모두 완료!":"이미 받은 보석은 색깔 표시됩니다"}`),
      gemGrid
    );
  }

  function buildTnt(){
    const hasAward=!!cur.award, hadAward=past.award;
    const curSeals=cur.seals||[];
    const hbc=HB_TNT_COLOR[hb]||{color:t.color,light:t.light,border:t.border};
    const tntColor=hbc.color, tntLight=hbc.light, tntBorder=hbc.border;

    const awardNum={"어드벤처1":1,"어드벤처2":2,"챌린지1":1,"챌린지2":2};
    const awardNumVal=awardNum[hb]||1;
    const awardCard=D({flex:"1",borderRadius:"12px",border:`2px solid ${hadAward?"#CBD5E1":hasAward?tntColor:"#E2E8F0"}`,
      background:hadAward?"#F8FAFC":hasAward?tntLight:"#F8FAFC",
      padding:"12px 8px",textAlign:"center",
      cursor:locked?"not-allowed":"pointer",position:"relative"},
      D({width:"44px",height:"44px",borderRadius:"50%",margin:"0 auto 8px",
        background:hadAward?"#CBD5E1":hasAward?tntColor:"#E2E8F0",
        display:"flex",alignItems:"center",justifyContent:"center",
        fontWeight:"800",fontSize:"18px",color:"#fff"},
        hadAward||hasAward?"✓":String(awardNumVal)
      ),
      D({fontSize:"12px",fontWeight:"700",color:(hadAward||hasAward)?tntColor:"#1E293B",lineHeight:"1.3"},hb+"\n수상대"),

      isAdmin&&hadAward?B({position:"absolute",top:"4px",right:"4px",fontSize:"10px",
        color:"#EF4444",background:"#fff",border:"1px solid #FECACA",
        borderRadius:"4px",padding:"1px 5px",cursor:"pointer"},
        async e=>{e.stopPropagation();await save({award:false});},"해제"):null
    );
    if(!locked&&!hadAward) awardCard.addEventListener("click",async e=>{
      if(e.target.tagName==="BUTTON") return;
      await save({award:!cur.award});
    });

    const sealGrid=D({display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:"8px"},
      ...[1,2,3,4,5,6,7,8].map(n=>{
        const sn="씰"+n;
        const hadBefore=past.seals.includes(sn);
        const hasCur=curSeals.includes(sn);
        const prevDone=n===1||past.seals.includes("씰"+(n-1))||curSeals.includes("씰"+(n-1));
        const isBlocked=!prevDone&&!hadBefore&&!hasCur;
        const box=D({display:"flex",flexDirection:"column",alignItems:"center",gap:"4px",
          padding:"10px 6px",borderRadius:"10px",
          border:`2px solid ${hadBefore?tntColor:hasCur?tntColor:"#E2E8F0"}`,
          background:hadBefore?tntLight:hasCur?tntLight:"#F8FAFC",
          cursor:(locked||hadBefore||isBlocked)?"default":"pointer",position:"relative"},
          hadBefore
            ? D({width:"36px",height:"36px",borderRadius:"50%",background:tntColor,
                display:"flex",alignItems:"center",justifyContent:"center",
                fontWeight:"800",fontSize:"16px",color:"#fff"},"✓")
            : mkCircle(n,hasCur?tntColor:"#94A3B8",hasCur?tntLight:"#F8FAFC",hasCur?tntColor:"#E2E8F0")
        );

        if(!locked&&!hadBefore&&!isBlocked) box.addEventListener("click",async()=>{
          const next=hasCur?curSeals.filter(x=>x!==sn):[...curSeals,sn];
          await save({seals:next});
        });
        return box;
      })
    );

    // 입단 카드 (어드벤처1, 챌린지1만)
    const showTntEnroll=["어드벤처1","챌린지1"].includes(hb);
    const hadTntEnroll=!!past.enroll, hasTntEnroll=!!cur.enroll;
    const enrollCardTnt=(()=>{
      const bg=hadTntEnroll?tntLight:hasTntEnroll?tntLight:"#F8FAFC";
      const border=hadTntEnroll?tntColor:hasTntEnroll?tntColor:"#E2E8F0";
      const cc=hadTntEnroll?tntColor:hasTntEnroll?tntColor:"#E2E8F0";
      const card=D({flex:"1",borderRadius:"12px",border:`2px solid ${border}`,
        background:bg,padding:"12px 8px",textAlign:"center",
        opacity:hadTntEnroll?"0.55":"1",
        cursor:(locked||hadTntEnroll)?"not-allowed":"pointer",position:"relative"},
        D({width:"44px",height:"44px",borderRadius:"50%",margin:"0 auto 8px",
          background:cc,display:"flex",alignItems:"center",justifyContent:"center",
          fontWeight:"800",fontSize:"18px",color:"#fff"},
          hadTntEnroll||hasTntEnroll?"✓":"🚀"
        ),
        D({fontSize:"12px",fontWeight:"700",color:(hadTntEnroll||hasTntEnroll)?tntColor:"#1E293B",lineHeight:"1.3"},"티앤티 입단"),

        isAdmin&&hasTntEnroll&&!hadTntEnroll?B({position:"absolute",top:"4px",right:"4px",fontSize:"10px",
          color:"#EF4444",background:"#fff",border:"1px solid #FECACA",
          borderRadius:"4px",padding:"1px 5px",cursor:"pointer"},
          async e=>{e.stopPropagation();
            await save({enroll:false});
          },"해제"):null,
        null
      );
      if(!locked&&!hadTntEnroll) card.addEventListener("click",async e=>{
        if(e.target.tagName==="BUTTON") return;
        const newVal=!hasTntEnroll;
        await saveStuMilestone(sid,{enroll:newVal});
        await save({enroll:newVal});
      });
      return card;
    })();

    return D({},
      D({display:"flex",gap:"10px",marginBottom:"14px"},showTntEnroll?enrollCardTnt:null,awardCard),
      D({fontWeight:"700",fontSize:"13px",color:"#475569",marginBottom:"10px"},"▸ 씰"),
      D({fontSize:"11px",color:"#94A3B8",marginBottom:"10px"},
        `${hb} · 완료된 씰은 채워진 원으로 표시`),
      sealGrid
    );
  }

  const summary=[];
  if(isSpks){
    if(cur.enroll) summary.push("🚀스팍스 입단");
    if(cur.badge) summary.push("🏅"+HB_BADGE_LABEL[hb]);
    if(cur.wing)  summary.push("🪽 "+HB_WING_LABEL[hb]);
    if(cur.gems)  GEM_SEQ.slice(past.gems, past.gems+cur.gems).forEach(tid=>summary.push(tid==="red"?"🔴 빨강 보석":"🟢 초록 보석"));
  } else {
    if(cur.enroll) summary.push("🚀티앤티 입단");
    if(cur.award) summary.push("🏆"+hb+"수상대");
    (cur.seals||[]).forEach(s=>summary.push("●"+s));
  }

  const curMemo=getWD()?.students?.[sid]?.memo||"";

  return D({position:"fixed",inset:"0",background:"rgba(0,0,0,0.5)",
    display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:"150"},
    D({background:"#fff",borderRadius:"20px 20px 0 0",width:"100%",maxWidth:"480px",
      padding:"20px 20px 32px",maxHeight:"88vh",overflowY:"auto"},
      D({display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"8px"},
        D({display:"flex",alignItems:"center",gap:"8px"},
          (()=>{const el=mkShield(true,26);el.style.cursor="default";return el;})(),
          D({},
            D({fontWeight:"700",fontSize:"16px"},`${name} 시상`),
            D({fontSize:"12px",color:"#94A3B8",marginTop:"2px"},
              `${S.week===0?"0주차":S.week+"주차"} · ${hb}`)
          )
        ),
        B({background:"none",border:"none",fontSize:"22px",cursor:"pointer",color:"#64748B"},close,"×")
      ),
      summary.length
        ? D({fontSize:"12px",color:"#475569",marginBottom:"12px",background:"#F1F5F9",
            borderRadius:"8px",padding:"6px 10px",fontWeight:"600"},
            "이번 주: "+summary.join(" "))
        : D({fontSize:"12px",color:"#94A3B8",marginBottom:"12px"},"이번 주 시상 없음"),
      isSpks?buildSparks():buildTnt(),
      D({marginTop:"16px",borderTop:"1px solid #F1F5F9",paddingTop:"14px"},
        D({fontWeight:"600",fontSize:"13px",color:"#475569",marginBottom:"6px"},"📝 특이사항 메모"),
        (()=>{
          const ta=document.createElement("textarea");
          Object.assign(ta.style,{width:"100%",boxSizing:"border-box",border:"1px solid #E2E8F0",
            borderRadius:"10px",padding:"10px 12px",fontSize:"13px",
            fontFamily:"inherit",color:"#1E293B",resize:"vertical",minHeight:"72px",
            outline:"none",lineHeight:"1.5",background:locked?"#F8FAFC":"#fff"});
          ta.placeholder="이번 주 특이사항을 적어주세요...";
          ta.value=curMemo;
          ta.readOnly=locked;
          let saveTimer=null;
          ta.addEventListener("input",()=>{
            clearTimeout(saveTimer);
            saveTimer=setTimeout(()=>saveMemo(sid,ta.value),800);
          });
          return ta;
        })()
      ),
      B({width:"100%",background:"#F1F5F9",color:"#475569",border:"none",
        borderRadius:"10px",padding:"12px",fontWeight:"600",fontSize:"14px",
        cursor:"pointer",marginTop:"14px"},close,"닫기")
    )
  );
}
function buildScheduleScreen(){
  const isNext=S.scheduleScreen==="next";
  const targetWeek=isNext?S.week+1:S.week;
  const sc=S.schedule[String(targetWeek)];
  const dateStr=WEEK_DATES[targetWeek]||"";
  function fmtP(role,name){
    if(!role||!name) return name||role||"-";
    if(role==="선생님"||role==="목사님"||role==="장로님") return name+" "+role;
    return role+" "+name;
  }
  const close=()=>{S.scheduleScreen=false;render();};
  const l1=sc?fmtP(sc.l1role,sc.l1name):"-";
  const l2=sc?fmtP(sc.l2role,sc.l2name):"-";
  const pr=sc?fmtP(sc.prole,sc.pname):"-";

  // 컨테이너
  // 파란 테두리 (시상식 빨간 테두리처럼)
  const wrap=D({position:"fixed",inset:"0",background:"#fff",
    zIndex:"300",display:"flex",flexDirection:"column",
    alignItems:"center",justifyContent:"flex-start",boxSizing:"border-box",

    padding:"clamp(16px,3vw,48px)",paddingTop:"clamp(20px,4vh,60px)",overflow:"hidden"});

  // 닫기 버튼
  const closeBtn=B({position:"absolute",top:"clamp(10px,2vw,20px)",right:"clamp(10px,2vw,20px)",
    background:"#F1F5F9",color:"#64748B",border:"1px solid #E2E8F0",
    borderRadius:"8px",padding:"8px 16px",fontWeight:"600",
    fontSize:"clamp(13px,1.5vw,16px)",cursor:"pointer",zIndex:"1"},

  // 콘텐츠 영역 (상단 정렬)
  const cont=D({display:"flex",flexDirection:"column",alignItems:"flex-start",

  // 로고 + 타이틀 행
  const headerRow=D({display:"flex",alignItems:"center",gap:"clamp(10px,1.5vw,20px)",
    marginBottom:"clamp(4px,1vh,12px)"});
  const logoSmall=document.createElement("img");
  logoSmall.src="https://raw.githubusercontent.com/sydcawana/awana/main/awana_logo.jpg";
  logoSmall.style.cssText="width:clamp(60px,7vw,100px);height:clamp(60px,7vw,100px);object-fit:contain;border-radius:8px;flex-shrink:0;";
  headerRow.appendChild(logoSmall);
  headerRow.appendChild(D({display:"flex",flexDirection:"column",gap:"2px"},
    D({fontSize:"clamp(18px,3vw,42px)",fontWeight:"900",color:"#1E293B",lineHeight:"1.2"},
      isNext?"다음 주 진행 안내":"예배 진행 순서"),
    D({fontSize:"clamp(11px,1.2vw,16px)",color:"#94A3B8",letterSpacing:"2px",fontWeight:"600"},
      `${targetWeek}주차 · ${dateStr}`)
  ));
  cont.appendChild(headerRow);

  // 구분선
  cont.appendChild(D({width:"100%",height:"2px",background:"#E2E8F0",borderRadius:"1px"}));

  // 기수
  const gisuWrap=D({width:"100%"});
  gisuWrap.appendChild(D({fontSize:"clamp(13px,1.6vw,20px)",color:"#2563EB",
    fontWeight:"800",marginBottom:"clamp(6px,1.5vh,14px)",letterSpacing:"1px"},"📢 기수"));
  gisuWrap.appendChild(D({display:"flex",gap:"clamp(10px,2vw,24px)",alignItems:"stretch"},
    D({flex:"1",background:"#F8FAFC",borderRadius:"14px",
      padding:"clamp(16px,3vh,36px) clamp(12px,2vw,24px)",textAlign:"center",
      border:"2px solid #BFDBFE",boxShadow:"0 4px 20px rgba(37,99,235,0.08)"},
      SP({fontSize:"clamp(22px,4vw,60px)",fontWeight:"900",color:"#1E293B",
        lineHeight:"1.3",wordBreak:"keep-all"},l1)),
    D({color:"#CBD5E1",fontSize:"clamp(18px,3vw,40px)",fontWeight:"300",
      flexShrink:"0",display:"flex",alignItems:"center"},"/"),
    D({flex:"1",background:"#F8FAFC",borderRadius:"14px",
      padding:"clamp(16px,3vh,36px) clamp(12px,2vw,24px)",textAlign:"center",
      border:"2px solid #BFDBFE",boxShadow:"0 4px 20px rgba(37,99,235,0.08)"},
      SP({fontSize:"clamp(22px,4vw,60px)",fontWeight:"900",color:"#1E293B",
        lineHeight:"1.3",wordBreak:"keep-all"},l2))

  cont.appendChild(gisuWrap);

  // 기도
  const gidoWrap=D({width:"100%"});
  gidoWrap.appendChild(D({fontSize:"clamp(13px,1.6vw,20px)",color:"#2563EB",

  gidoWrap.appendChild(D({background:"#F8FAFC",borderRadius:"14px",
    padding:"clamp(16px,3vh,36px) clamp(12px,2vw,24px)",textAlign:"center",
    border:"2px solid #BFDBFE",boxShadow:"0 4px 20px rgba(37,99,235,0.08)"},
    SP({fontSize:"clamp(22px,4vw,60px)",fontWeight:"900",color:"#1E293B",
      lineHeight:"1.3",wordBreak:"keep-all"},pr)
  ));
  cont.appendChild(gidoWrap);

  wrap.appendChild(cont);
  return wrap;
}
function getDirectUrl(url){
  url=url.trim();
  // 파일명만 입력한 경우 (http 없으면) GitHub 기본 경로 붙이기
  if(!url.startsWith("http")){
    return "https://raw.githubusercontent.com/sydcawana/awana/main/"+url;
  }
  // Google Drive 링크 변환
  const m=url.match(/\/d\/([a-zA-Z0-9_-]+)/);
  if(m) return `https://drive.google.com/uc?export=download&id=${m[1]}`;
  return url;
}

function buildSlides(){
  const close=()=>{S._slidesOpen=false;S._pdfPage=1;render();};
  if(!S._slidesUrl){
    return D({position:"fixed",inset:"0",background:"#000",zIndex:"350",

  pageInfo.id="_pdfPageInfo";
  pageInfo.textContent=`${S._pdfPage} / ${S._pdfTotal||"?"}`;
  ctrl.appendChild(pageInfo);
  ctrl.appendChild(B({background:"#334155",color:"#fff",border:"none",
    borderRadius:"8px",padding:"8px 24px",fontSize:"18px",cursor:"pointer"},
    ()=>{if(S._pdfPage<S._pdfTotal){S._pdfPage++;renderPdfPage();}},"▶"));
  ctrl.appendChild(B({background:"rgba(255,255,255,0.15)",color:"#fff",border:"none",

  wrap.appendChild(ctrl);

  // PDF 로드
  setTimeout(()=>{
    if(S._pdfDoc) renderPdfPage();
    else loadPdf(getDirectUrl(S._slidesUrl));

async function loadPdf(url){
  try{
    if(!window.pdfjsLib){
      await new Promise((res,rej)=>{
        const s=document.createElement("script");
        s.src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js";
        s.onload=res;s.onerror=rej;
        document.head.appendChild(s);
      });
      window.pdfjsLib.GlobalWorkerOptions.workerSrc=
        "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
    }
    const loadingTask=window.pdfjsLib.getDocument({url,withCredentials:false});
    const pdf=await loadingTask.promise;
    S._pdfDoc=pdf;
    S._pdfTotal=pdf.numPages;
    S._pdfPage=1;
    renderPdfPage();
  }catch(e){
    showToast("PDF 로드 실패. 파일 공유 설정을 확인해주세요.");
    console.error("PDF 로드 오류:",e);
  }
}

async function renderPdfPage(){
  const canvas=document.getElementById("_pdfCanvas");
  const info=document.getElementById("_pdfPageInfo");
  if(!canvas||!S._pdfDoc) return;
  try{
    const page=await S._pdfDoc.getPage(S._pdfPage);
    const vw=window.innerWidth;
    const vh=window.innerHeight-56;
    const viewport=page.getViewport({scale:1});
    const scale=Math.min(vw/viewport.width,vh/viewport.height)*0.98;
    const scaled=page.getViewport({scale});
    canvas.width=scaled.width;
    canvas.height=scaled.height;
    const ctx=canvas.getContext("2d");
    ctx.clearRect(0,0,canvas.width,canvas.height);
    await page.render({canvasContext:ctx,viewport:scaled}).promise;
    if(info) info.textContent=`${S._pdfPage} / ${S._pdfTotal}`;
  }catch(e){console.error(e);}
}

function buildCeremony(){
  const sorted=S.cSorted||[...TEAMS].sort((a,b)=>totalScore(b.id)-totalScore(a.id));
  const maxScore=S.cMaxScore||Math.max(...TEAMS.map(t=>totalScore(t.id)),1);
  const FIXED=["red","blue","green","yellow"];
  const step=S.cStep||0;
  const isAnim=S.cPhase==="animating";
  const isDone=S.cPhase==="done";
  const isReady=S.cPhase==="ready";
  const groups=S.cTieGroups||[];
  const gStep=S.cGroupStep||0;

  // 등수 표시용: sorted 기준 실제 등수 계산
  function getRankLabel(tid){
    const sc=S.cTargets?.[tid]||0;
    const rank=sorted.filter(t=>(S.cTargets?.[t.id]||0)>sc).length+1;
    const tiedCount=sorted.filter(t=>(S.cTargets?.[t.id]||0)===sc).length;
    return tiedCount>1?`공동 ${rank}등 🎉`:`${rank}등 ${rank===1?"🏆":rank===2?"🥈":rank===3?"🥉":"❤️"}`;
  }

  // 배너 텍스트: S.cDynBanner 우선, 없으면 단계별 기본
  let bannerText;
  if(isReady){
    bannerText="🎉 이번 주 최종 순위를 발표합니다!";
  } else if(S.cDynBanner){
    bannerText=S.cDynBanner+(S.cDynBanner2?"\n"+S.cDynBanner2:"");
  } else if(isDone){
    const winners=S.cTieGroups?S.cTieGroups[S.cTieGroups.length-1]:[];
    const winNames=winners.map(id=>TEAMS.find(t=>t.id===id)?.name).join(", ");
    bannerText=winners.length>1?`🏆 공동 우승! ${winNames}팀!`:`🏆 우승! ${winNames}팀!`;
  } else if(step===0||isAnim&&step===0){
    bannerText="🏃 게임 점수부터 공개!";
  } else if(step<=2){
    bannerText="📖 핸드북 점수 합산! 🥁";
  } else {
    bannerText="진행 중...";
  }

  const bi=S.cBannerIdx||0;

  const fs={
    title:"clamp(9px,1.1vw,13px)",
    week:"clamp(12px,1.4vw,16px)",
    banner:"clamp(24px,4.8vw,48px)",
    banner2:"clamp(13px,2.2vw,22px)",
    score:"clamp(18px,4vw,46px)",
    rank:"clamp(18px,4vw,46px)",
    team:"clamp(13px,2.2vw,24px)",
    sub:"clamp(11px,1.8vw,18px)",
    btn:"clamp(13px,1.4vw,17px)",
  };

  const bannerLines=bannerText.split("\n");
  const bannerArea=D({minHeight:"clamp(38px,6vh,70px)",display:"flex",flexDirection:"column",
    alignItems:"center",justifyContent:"center",flexShrink:"0",

    ...bannerLines.map((line,i)=>line?D({
      fontSize:i===0?fs.banner:fs.banner,
      fontWeight:"900",
      color:i===0?"#1E293B":"#1D4ED8",
      lineHeight:"1.4"
    },line):null).filter(Boolean)
  );

  const BAR_MAX=420;
  const BAR_MIN_GAP=20;

  // 점수 차이가 있으면 최소 BAR_MIN_GAP px 높이 차이 보장
  const rawBarH={};
  FIXED.forEach(tid=>{
    const score=S.cScores?.[tid]||0;
    rawBarH[tid]=Math.max(isReady?2:4,Math.round((score/maxScore)*BAR_MAX));
  });
  const sortedByScore=[...FIXED].sort((a,b)=>(S.cScores?.[b]||0)-(S.cScores?.[a]||0));
  for(let i=1;i<sortedByScore.length;i++){
    const prev=sortedByScore[i-1],cur=sortedByScore[i];

      if(rev){

  const isDramatic=S.cPhase==="dramatic";
  const btnLabel=isReady?"\u25b6 시작하기":isDone?"완료":isDramatic?"🏆 우승 공개!":"다음 진행";
  const mainBtn=!isDone?B({
    background:isDramatic?"linear-gradient(135deg,#F59E0B,#D97706)":isAnim?"#E2E8F0":"#1E293B",
    color:isAnim&&!isDramatic?"#94A3B8":"#fff",border:"none",
    borderRadius:"clamp(8px,1vw,12px)",
    padding:"clamp(8px,1.2vh,14px) clamp(14px,2.5vw,32px)",
    fontWeight:"800",fontSize:fs.btn,
    cursor:isAnim?"not-allowed":"pointer",
    opacity:isAnim?"0.5":"1",whiteSpace:"nowrap"
  },()=>{if(!isAnim||isDramatic)cNextStep();},btnLabel):null;

  const closeBtn=B({
    background:"#F1F5F9",color:"#64748B",border:"1px solid #E2E8F0",
    borderRadius:"clamp(6px,0.8vw,10px)",
    padding:"clamp(6px,1vh,10px) clamp(10px,1.5vw,20px)",
    fontWeight:"600",fontSize:fs.btn,cursor:"pointer",whiteSpace:"nowrap"
  },()=>{stopAllSounds();S.ceremony=false;S.cBlink=null;render();},"닫기");

  const skipBtn=B({
    background:"#F1F5F9",color:"#64748B",border:"1px solid #E2E8F0",
    borderRadius:"clamp(6px,0.8vw,10px)",
    padding:"clamp(6px,1vh,10px) clamp(10px,1.5vw,20px)",
    fontWeight:"600",fontSize:fs.btn,cursor:"pointer",whiteSpace:"nowrap"
  },()=>{
    stopAllSounds();
    // 모든 팀 최종 점수로 즉시 세팅
    TEAMS.forEach(t=>{
      S.cScores[t.id]=S.cTargets?.[t.id]||totalScore(t.id);
      S.cGameScores[t.id]=(rankScores("sparks")[t.id]||0)+(rankScores("tnt")[t.id]||0);
      S.cHbScores[t.id]=(S.cTargets?.[t.id]||totalScore(t.id))-(S.cGameScores[t.id]||0);
    });
    S.cRevealed=TEAMS.map(t=>t.id);
    S.cPhase="done";
    S.cStep=99;
    S.cGroupStep=(S.cTieGroups||[]).length;
    const winners=(S.cTieGroups||[])[((S.cTieGroups||[]).length)-1]||[];
    const winNames=winners.map(id=>TEAMS.find(t=>t.id===id)?.name).join(", ");
    S.cDynBanner=winners.length>1?`🏆 공동 우승! ${winNames}팀!`:`🏆 우승! ${winNames}팀!`;
    S.cDynBanner2="서울영동교회 어와나클럽원 모두 최고! 🎉\n우리는 하나님께 인정받는 부끄러울 것이 없는 일꾼!";
    S.cBlinkGroup=winners; S.cBlink=winners[0];

async function downloadLogs(){
  try{
    // 모든 주차 로그 수집
    const allRows=[];
    const weeks=WEEKS.filter(w=>w>0);
    for(const w of weeks){
      try{
        const snap=await getDoc(doc(db,"awana",`logs_w${w}`));
        if(!snap.exists()) continue;
        const data=snap.data();
        Object.values(data.rows||{}).forEach(r=>allRows.push({...r,week:w}));
      }catch(e){}
    }
    if(!allRows.length){alert("저장된 로그가 없어요.\n잠금된 주차가 있어야 로그가 생성돼요.");return;}
    allRows.sort((a,b)=>a.week-b.week||(a.name||"" ).localeCompare(b.name||"",'ko'));
    const header="이름,학년,팀,핸드북,주차,날짜,출석,단복,암송개수,시상내역,메모";
    const csv=allRows.map(r=>[
      r.name,r.grade,r.team,r.handbook,r.week,r.date,
      r.attendance,r.uniform,r.signs,
      `"${(r.awards||"").replace(/"/g,"'")}"`,
      `"${(r.memo||"").replace(/"/g,"'")}"`
    ].join(",")).join("\n");
    const blob=new Blob(["\uFEFF"+header+"\n"+csv],{type:"text/csv;charset=utf-8"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;a.download="어와나_활동로그_"+new Date().toLocaleDateString("ko")+".csv";
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }catch(e){alert("다운로드 실패: "+e.message);}
}

function buildStatsView(){
  const win1={red:0,yellow:0,green:0,blue:0}, win2={red:0,yellow:0,green:0,blue:0};
  Object.keys(S.wdata).forEach(w=>{
    const wd=S.wdata[w]; if(!wd?.gameFinalized) return;
    const sorted=[...TEAMS].sort((a,b)=>{
      const calc=(tid)=>{
        const hb=S.students.filter(s=>s.team===tid).reduce((s2,st)=>{
          const d=(wd?.students||{})[st.id]||{};
          const{attScore:a=50,uniScore:u=50,signScore:sg=50}=S.settings;
          return s2+(d.attendance?a:0)+(d.uniform?u:0)+((d.signs||0)*sg);
        },0);
        let g=0;
        ["sparks","tnt"].forEach(type=>{
          const rounds=(wd.games?.[type]?.rounds)||[];
          const cum={};TEAMS.forEach(x=>{cum[x.id]=rounds.reduce((s3,r)=>s3+(r.scores?.[x.id]||0),0);});
          const si2=[...TEAMS].sort((x,y)=>cum[y.id]-cum[x.id]);
          const ri=si2.findIndex(x=>x.id===tid);
          g+=Math.max(0,S.settings.firstPlace-ri*S.settings.gap);
        });
        return hb+g;
      };
      return calc(b.id)-calc(a.id);
    });
    if(sorted[0]) win1[sorted[0].id]++;
    if(sorted[1]) win2[sorted[1].id]++;
  });

  return D({},
    D({fontWeight:"600",fontSize:"14px",marginBottom:"10px",color:"#1E293B"},"팀 통계"),
    D({display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px"},
      ...TEAMS.map(t=>{
        const cumHb=Object.values(S.wdata).reduce((sum,wd2)=>
          sum+S.students.filter(s=>s.team===t.id).reduce((s2,st)=>{
            const d=(wd2?.students||{})[st.id]||{};
            const{attScore:a=50,uniScore:u=50,signScore:sg=50}=S.settings;
            return s2+(d.attendance?a:0)+(d.uniform?u:0)+((d.signs||0)*sg);
          },0),0);
        const cumSigns=Object.values(S.wdata).reduce((sum,wd2)=>
          sum+S.students.filter(s=>s.team===t.id).reduce((s2,st)=>{
            const v=(wd2?.students||{})[st.id]?.signs||0;
            return s2+(typeof v==="number"?v:parseFloat(v)||0);
          },0),0);
        return D({background:"#fff",borderRadius:"10px",padding:"12px 14px",border:"1px solid #E2E8F0"},
          D({display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"8px"},
            D({display:"flex",alignItems:"center",gap:"6px"},
              D({width:"8px",height:"8px",borderRadius:"50%",background:t.color,flexShrink:"0"}),
              SP({fontWeight:"600",color:"#1E293B",fontSize:"13px"},t.name+"팀")
            ),
            SP({fontSize:"11px",color:"#94A3B8"},S.students.filter(s=>s.team===t.id).length,"명")
          ),
          D({display:"flex",gap:"6px",marginBottom:"8px"},
            D({flex:"1",background:"#F8FAFC",borderRadius:"6px",padding:"6px 4px",textAlign:"center"},
              D({fontSize:"10px",color:"#94A3B8",marginBottom:"2px"},"🥇 우승"),
              SP({fontWeight:"600",color:"#1E293B",fontSize:"13px"},win1[t.id],"회")
            ),
            D({flex:"1",background:"#F8FAFC",borderRadius:"6px",padding:"6px 4px",textAlign:"center"},
              D({fontSize:"10px",color:"#94A3B8",marginBottom:"2px"},"🥈 준우승"),
              SP({fontWeight:"600",color:"#1E293B",fontSize:"13px"},win2[t.id],"회")
            )
          ),
          D({fontSize:"11px",color:"#94A3B8",marginBottom:"4px"},"핸드북 누적 ",SP({color:"#475569",fontWeight:"600"},cumHb.toLocaleString()),"점"),
          D({fontSize:"11px",color:"#94A3B8"},"암송 누적 ",SP({color:"#475569",fontWeight:"600"},Math.round(cumSigns*10)/10),"개")
        );
      })
    ),
    !S.students.length?mkEmpty():null
  );
}

});

function buildSchedule(){
  const sc=S.schedule[String(S.week)];
  const wd=getWD();

  function fmtPerson(role,name){
    if(!role||!name) return name||role||"-";
    if(role==="선생님"||role==="목사님"||role==="장로님") return name+" "+role;

  const tntHbs=["어드벤처1","어드벤처2","챌린지1","챌린지2"];

  function mkStudentRow(s){
    const sd=wd.students?.[s.id]||{};

    const cell=D({display:"flex",flexDirection:"column",gap:"10px",

      background:"#fff",border:"1px solid #E2E8F0",minWidth:"0",cursor:"pointer"});

    const topRow=D({display:"flex",alignItems:"center",gap:"7px"});

    topRow.appendChild(SP({fontSize:"11px",color:"#CBD5E1",flexShrink:"0"},s.handbook));
    cell.appendChild(topRow);

    // 아랫줄: 출석 / 단복 버튼 — 이름 시작점(도트8px+gap7px=15px) 정렬
    const NAME_OFFSET=15; // dot(8) + gap(7)
    const HB_OFFSET=NAME_OFFSET+60+7; // +minWidth(60)+gap(7) = 핸드북명 시작점
    const _role=S.role;
    const _canCheck=_role==="game";
    const _isAdminCheck=_role==="admin";
    const _showAdminAlert=()=>showToast("출석·단복 체크는 서기부 선생님께서 담당하고 계십니다 😊");

    const mkBigBtn=(label,active,color,onClick)=>{
      const el=D({flex:"1",height:"44px",borderRadius:"8px",
        display:"flex",alignItems:"center",justifyContent:"center",
        background:active?color+"18":"#F8FAFC",
        border:`1.5px solid ${active?color:"#E2E8F0"}`,
        cursor:_canCheck?"pointer":"default",userSelect:"none",
        fontSize:"14px",fontWeight:active?"700":"400",
        color:active?color:"#CBD5E1",transition:"all 0.15s",
        opacity:_canCheck?"1":"0.6"},label);

        e.stopPropagation();

        await onClick();
      });
      return el;
    };
    const botRow=D({display:"flex",gap:"6px",paddingLeft:HB_OFFSET+"px"});
    botRow.appendChild(mkBigBtn("출석",att,"#16A34A",()=>setSD(s.id,{attendance:!att})));
    botRow.appendChild(mkBigBtn("단복",uni,"#2563EB",()=>setSD(s.id,{uniform:!uni})));

      if(_isAdminCheck){_showAdminAlert();}
      if(!_canCheck&&!_isAdminCheck) return;

  function mkClubHeader(type){

      D({fontWeight:"700",fontSize:"15px",color:"#475569",flex:"1"},label)
