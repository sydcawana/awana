// 출석상: 해당 주차가 출석상 수여 주차인지 확인하고, 학생이 대상인지 계산
function getAttAwardInfo(week){
  // 어느 출석상 회차인지 확인
  const cfg=[];
  if(S.settings.attAward1Week>0) cfg.push({week:S.settings.attAward1Week,allow:S.settings.attAward1Allow??1});
  if(S.settings.attAward2Week>0) cfg.push({week:S.settings.attAward2Week,allow:S.settings.attAward2Allow??1});
  const found=cfg.find(c=>c.week===week);
  if(!found) return null; // 이 주차는 출석상 주차 아님
  return found; // {week, allow}
}
function calcAttAward(sid, awardWeek, allowedAbsences){
  // 이 주차까지의 모든 주차를 확인 (0=테스트 제외, 잠긴 주차 포함)
  let absences=0;
  for(let w=1;w<=awardWeek;w++){
    const wd=S.wdata[w];
    const attended=wd?.students?.[sid]?.attendance;
    if(!attended) absences++;
  }
  return absences<=allowedAbsences;
}
function getAwards(sid){ return getWD().students?.[sid]?.awards||{}; }
function getPastAwards(sid){
  const past={badge:false,wing:false,gems:0,award:false,seals:[]};
  Object.entries(S.wdata).forEach(([w,wd])=>{
    if(Number(w)===S.week) return;
    const a=wd?.students?.[sid]?.awards; if(!a) return;
    if(a.badge) past.badge=true;
    if(a.wing)  past.wing=true;
    if(a.award) past.award=true;
    past.gems+=(a.gems||0);
    (a.seals||[]).forEach(s=>{if(!past.seals.includes(s))past.seals.push(s);});
  });
  return past;
}

function initRound(n){return{id:Date.now()+n,name:`라운드 ${n}`,scores:{red:0,yellow:0,green:0,blue:0}};}
function initGame(n=1){return{rounds:Array.from({length:n},(_,i)=>initRound(i+1))};}
function initWD(){return{students:{},games:{sparks:initGame(1),tnt:initGame(1)},gameFinalized:false};}
function getWD(){return S.wdata[S.week]||initWD();}
function getSD(sid){return getWD().students?.[sid]||{attendance:false,uniform:false,signs:0};}
function getTeam(tid){return TEAMS.find(t=>t.id===tid)||TEAMS[0];}
function hbStu(hb){return S.students.filter(s=>s.handbook===hb);}
function isLocked(){return S.closedWeeks.includes(S.week);}

function stuScore(sid){
  const d=getSD(sid),{attScore:a=50,uniScore:u=50,signScore:sg=50}=S.settings;
  return (d.attendance?a:0)+(d.uniform?u:0)+((d.signs||0)*sg);
}
function teamHb(tid){return S.students.filter(s=>s.team===tid).reduce((s,st)=>s+stuScore(st.id),0);}
function gameCum(type,tid){return(getWD().games?.[type]?.rounds||[]).reduce((s,r)=>s+(r.scores?.[tid]||0),0);}
function rankScores(type){
  const sorted=[...TEAMS].sort((a,b)=>gameCum(type,b.id)-gameCum(type,a.id));
  const res={};sorted.forEach((t,i)=>{res[t.id]=Math.max(0,S.settings.firstPlace-i*S.settings.gap);});return res;
}
function totalScore(tid){
  const hb=teamHb(tid);
  if(!getWD().gameFinalized) return hb;
  return hb+rankScores("sparks")[tid]+rankScores("tnt")[tid];
}
function allChecked(hb,field){const hs=hbStu(hb);return hs.length>0&&hs.every(s=>(getWD().students?.[s.id]||{})[field]);}

function parseCSV(text){
  text=text.replace(/^\uFEFF/,"").replace(/\r\n/g,"\n").replace(/\r/g,"\n");
  const lines=text.split("\n").map(l=>l.trim()).filter(Boolean);
  const result=[];
  lines.forEach((line,i)=>{
    if(i===0&&/이름|name/i.test(line)) return;
    const sep=line.includes("\t")?"\t":",";
    const raw=line.split(sep).map(x=>x.replace(/^"|"$/g,"").trim());
    const name=raw[0]||"";
    const teamRaw=(raw[1]||"").replace(/\s/g,"");
    const hb=(raw[2]||"").replace(/\s/g,"");
    const tid=TEAM_MAP[teamRaw];
    if(tid&&name) result.push({id:`s_${Date.now()}_${i}_${Math.random().toString(36).slice(2)}`,name,team:tid,handbook:hb});
  });
  return result;
}

const SOUNDS={

const _ac={};
function stopAllSounds(){Object.values(_ac).forEach(a=>{try{a.pause();a.currentTime=0;}catch(e){}});}
function playSound(key){
  try{stopAllSounds();if(!_ac[key])_ac[key]=new Audio(SOUNDS[key]);const a=_ac[key];a.currentTime=0;a.play().catch(()=>playFallback(key));}catch(e){playFallback(key);}
}
function playFallback(key){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    if(key==="drumroll"){for(let i=0;i<30;i++){const o=ctx.createOscillator(),g=ctx.createGain();o.type="sawtooth";o.frequency.value=80+Math.random()*40;const t=ctx.currentTime+i*0.05;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.15,t+0.02);g.gain.linearRampToValueAtTime(0,t+0.04);o.connect(g);g.connect(ctx.destination);o.start(t);o.stop(t+0.05);}}
    else if(key==="chime"){[523,659,784].forEach((f,i)=>{const o=ctx.createOscillator(),g=ctx.createGain();o.frequency.value=f;const t=ctx.currentTime+i*0.12;g.gain.setValueAtTime(0.3,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.4);o.connect(g);g.connect(ctx.destination);o.start(t);o.stop(t+0.4);});}
    else if(key==="fanfare"){[440,523,659,523].forEach((f,i)=>{const o=ctx.createOscillator(),g=ctx.createGain();o.type="square";o.frequency.value=f;const t=ctx.currentTime+i*0.15;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.2,t+0.02);g.gain.linearRampToValueAtTime(0,t+0.3);o.connect(g);g.connect(ctx.destination);o.start(t);o.stop(t+0.35);});}
    else if(key==="fanfare_big"){[523,659,784,1047,784,1047,1319].forEach((f,i)=>{const o=ctx.createOscillator(),g=ctx.createGain();o.type="square";o.frequency.value=f;const t=ctx.currentTime+i*0.15;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.3,t+0.02);g.gain.linearRampToValueAtTime(0,t+0.3);o.connect(g);g.connect(ctx.destination);o.start(t);o.stop(t+0.35);});}
  }catch(e){}
}

function startCeremony(){
  S.ceremony=true;S.cRevealed=[];
  S.cScores={red:0,yellow:0,green:0,blue:0};
  S.cGameScores={red:0,yellow:0,green:0,blue:0};
  S.cPhase="idle";S.cStep=0;S.cBanner="";
  const targets={};TEAMS.forEach(t=>{targets[t.id]=totalScore(t.id);});
  S.cTargets=targets;
  S.cSorted=[...TEAMS].sort((a,b)=>totalScore(b.id)-totalScore(a.id));
  S.cMaxScore=Math.max(...TEAMS.map(t=>targets[t.id]||0),1);
  TEAMS.forEach(t=>{
    S.cGameScores[t.id]=(rankScores("sparks")[t.id]||0)+(rankScores("tnt")[t.id]||0);
  });
  render();
  setTimeout(()=>cNextStep(),400);
}
function cAnimate(fromScores,toScores,dur,onDone){
  const t0=Date.now();
  (function tick(){
    const p=Math.min((Date.now()-t0)/dur,1),e=1-Math.pow(1-p,3);
    TEAMS.forEach(t=>{
      S.cScores[t.id]=Math.round((fromScores[t.id]||0)+((toScores[t.id]||0)-(fromScores[t.id]||0))*e);
    });
    updateBarsDirect();
    if(p<1){requestAnimationFrame(tick);}
    else{TEAMS.forEach(t=>{S.cScores[t.id]=toScores[t.id]||0;});onDone();}
  })();
}
function cNextStep(){
  if(S.cPhase==="animating"||S.cPhase==="done") return;
  const step=S.cStep;
  S.cPhase="animating";
  if(step===0){
    S.cBanner="🎮 게임 점수";render();
    playSound("drumroll");
    cAnimate({red:0,yellow:0,green:0,blue:0},S.cGameScores,2200,()=>{
      S.cStep=1;S.cPhase="paused";render();
    });
  } else if(step===1){
    S.cBanner="📖 암송 점수 추가!";render();
    playSound("drumroll");
    const rank4=S.cSorted[3];
    const stop4=rank4?S.cTargets[rank4.id]||0:0;
    const from={...S.cScores};
    const to={};TEAMS.forEach(t=>{to[t.id]=Math.min(S.cTargets[t.id]||0,stop4);});
    cAnimate(from,to,1800,()=>{
      S.cRevealed=[...S.cRevealed,S.cSorted[3].id];
      S.cStep=2;S.cPhase="paused";
      playSound("chime");render();
    });
  } else if(step===2){
    S.cBanner="";render();
    playSound("drumroll");
    const rank3=S.cSorted[2];
    const stop3=rank3?S.cTargets[rank3.id]||0:0;
    const from={...S.cScores};
    const to={};TEAMS.forEach(t=>{to[t.id]=Math.min(S.cTargets[t.id]||0,stop3);});
    cAnimate(from,to,1800,()=>{
      S.cRevealed=[...S.cRevealed,S.cSorted[2].id];
      S.cStep=3;S.cPhase="paused";
      playSound("chime");render();
    });
  } else if(step===3){
    S.cBanner="";render();
    playSound("drumroll");
    const from={...S.cScores};
    const to={...S.cTargets};
    cAnimate(from,to,2000,()=>{
      S.cRevealed=[...S.cRevealed,S.cSorted[0].id];
      S.cStep=4;S.cPhase="paused";
      spawnConfetti();playSound("fanfare_big");render();
    });
  } else if(step===4){
    S.cRevealed=[...S.cRevealed,S.cSorted[1].id];
    S.cStep=5;S.cPhase="done";
    playSound("fanfare");render();
  }
}

function el(tag,props={},...ch){
  const e=document.createElement(tag);
  Object.entries(props).forEach(([k,v])=>{
    if(k==="style"&&typeof v==="object") Object.assign(e.style,v);
    else if(k==="className") e.className=v;
    else if(k.startsWith("on")&&typeof v==="function") e.addEventListener(k.slice(2).toLowerCase(),v);
    else e.setAttribute(k,v);
  });
  ch.flat().forEach(c=>{if(c==null||c===false)return;e.appendChild(typeof c==="string"||typeof c==="number"?document.createTextNode(String(c)):c);});
  return e;
}
const D=(s,...c)=>el("div",{style:s},...c);
const SP=(s,...c)=>el("span",{style:s},...c);
const B=(s,fn,...c)=>el("button",{style:s,onClick:fn},...c);
function inp(ph,val,fn,style={},type="text"){
  const i=document.createElement("input");i.type=type;i.placeholder=ph;i.value=val!=null?String(val):"";
  Object.assign(i.style,{border:"1px solid #E2E8F0",borderRadius:"8px",padding:"8px 10px",fontSize:"13px",...style});
  i.addEventListener("input",()=>fn(i.value));return i;
}
function sel(opts,val,fn,style={}){
  const s=document.createElement("select");Object.assign(s.style,style);
  opts.forEach(([v,l,os])=>{const o=document.createElement("option");o.value=v;o.textContent=l;if(v===val)o.selected=true;if(os)Object.assign(o.style,os);s.appendChild(o);});
  s.addEventListener("change",()=>fn(s.value));return s;
}

            getAwardGroup(hb)==="tnt"?B({width:"36px",height:"28px",borderRadius:"6px",border:"1px solid #E2E8F0",background:"#F8FAFC",cursor:locked?"not-allowed":"pointer",fontSize:"12px",fontWeight:"700",color:"#475569"},()=>setSD(s.id,{signs:Math.round(((d.signs||0)+0.5)*10)/10}),"+0.5"):null,
            B({width:"32px",height:"28px",borderRadius:"6px",border:"1px solid #E2E8F0",background:"#F8FAFC",cursor:locked?"not-allowed":"pointer",fontSize:"13px",fontWeight:"700",color:"#475569"},()=>setSD(s.id,{signs:(d.signs||0)+1}),"+1"),
            B({width:"32px",height:"28px",borderRadius:"6px",border:"1px solid #E2E8F0",background:"#F8FAFC",cursor:locked?"not-allowed":"pointer",fontSize:"13px",fontWeight:"700",color:"#475569"},()=>setSD(s.id,{signs:(d.signs||0)+3}),"+3")
          )
        )
      );
    })
  );
}

      ...[["sparks","스팍스"],["tnt","티앤티"]].map(([t,l])=>{

          ),
          D({display:"flex",gap:"5px",flexWrap:"wrap",opacity:locked?"0.5":"1"},
            ...[50,100,200,300,400].map(sc=>B({padding:"5px 10px",borderRadius:"8px",border:"1px solid #E2E8F0",background:"#F8FAFC",color:"#475569",fontWeight:"600",fontSize:"12px",cursor:(fin||locked)?"not-allowed":"pointer"},()=>{if(!fin&&!locked)setGame(type,g=>({...g,rounds:g.rounds.map(r=>r.id===round.id?{...r,scores:{...r.scores,[t.id]:(r.scores?.[t.id]||0)+sc}}:r)}));},`+${sc}`)),
            B({padding:"5px 10px",borderRadius:"8px",border:"1px solid #FECACA",background:"#FEF2F2",color:"#EF4444",fontWeight:"600",fontSize:"12px",cursor:(fin||locked)?"not-allowed":"pointer"},()=>{if(!fin&&!locked)setGame(type,g=>({...g,rounds:g.rounds.map(r=>r.id===round.id?{...r,scores:{...r.scores,[t.id]:Math.max(0,(r.scores?.[t.id]||0)-50)}}:r)}));},"−50")
          )
        ))
      )
    )),
    D({background:"#fff",borderRadius:"12px",border:"2px solid #E2E8F0",padding:"14px",marginTop:"14px"},
      D({fontWeight:"600",fontSize:"13px",color:"#475569",marginBottom:"8px"},"누적 순위"),
      ...[...TEAMS].sort((a,b)=>gameCum(type,b.id)-gameCum(type,a.id)).map((t,i)=>D({display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:i<3?"1px solid #F1F5F9":"none"},
        SP({color:i===0?"#EAB308":"#64748B",fontWeight:i===0?"700":"400"},["🥇","🥈","🥉","4️⃣"][i]," ",t.name,"팀"),
        SP({fontWeight:"600",color:t.color},gameCum(type,t.id).toLocaleString(),"점")
      ))
    )
  );
}

function buildResult(sorted){
  const wd=getWD();
  function teamHbGroup(tid,grp){
    return S.students.filter(s=>s.team===tid&&grp.books.includes(s.handbook))
      .reduce((sum,st)=>sum+stuScore(st.id),0);
  }
  const sparksGrp=HB_GROUPS.find(g=>g.label==="Sparks");
  const tntGrp=HB_GROUPS.find(g=>g.label==="T&T");

  return D({},
    mkWeekBadge(),
    D({fontWeight:"600",fontSize:"15px",marginBottom:"12px"},"최종 결과"),
    ...sorted.map((t,i)=>{
      const isFirst=i===0;
      const sparksHb=teamHbGroup(t.id,sparksGrp);
      const tntHb=teamHbGroup(t.id,tntGrp);
      const sparksGame=wd.gameFinalized?rankScores("sparks")[t.id]:null;
      const tntGame=wd.gameFinalized?rankScores("tnt")[t.id]:null;

      return D({background:"#fff",borderRadius:"12px",
        border:`2px solid ${isFirst?t.color:t.border}`,
        padding:"14px 16px",marginBottom:"10px"},
        D({display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"10px"},
          D({display:"flex",alignItems:"center",gap:"8px"},
            SP({fontSize:"18px"},["🥇","🥈","🥉","4️⃣"][i]),
            SP({fontWeight:"800",color:t.color,fontSize:"15px"},t.name,"팀")
          ),
          SP({fontWeight:"800",fontSize:"17px",color:t.color},totalScore(t.id).toLocaleString(),"점")
        ),
        D({borderTop:"1px solid #F1F5F9",paddingTop:"8px",display:"flex",gap:"12px",flexWrap:"wrap"},
          D({display:"flex",alignItems:"center",gap:"4px"},
            SP({fontSize:"11px",color:"#64748B"},"암송"),
            SP({fontWeight:"700",fontSize:"12px",color:"#1E293B"},(sparksHb+tntHb).toLocaleString(),"점")
          ),
          wd.gameFinalized?D({display:"flex",alignItems:"center",gap:"4px"},
            SP({fontSize:"11px",color:"#64748B"},"게임"),
            SP({fontWeight:"700",fontSize:"12px",color:"#1E293B"},((sparksGame||0)+(tntGame||0)).toLocaleString(),"점")
          ):SP({fontSize:"11px",color:"#94A3B8"},"게임 미확정")
        )
      );
    }),
    !wd.gameFinalized?D({background:"#F8FAFC",border:"1px solid #E2E8F0",borderRadius:"10px",padding:"10px 14px",marginTop:"4px",fontSize:"13px",color:"#64748B"},"⚠️ 게임 결과가 아직 확정되지 않았습니다."):null,
    wd.gameFinalized?B({width:"100%",background:"linear-gradient(135deg,#7C3AED,#A855F7)",color:"#fff",border:"none",borderRadius:"12px",padding:"14px",fontWeight:"800",fontSize:"15px",cursor:"pointer",marginTop:"8px"},()=>startCeremony(),"🎬 시상식 공개"):null
  );
}

//  시상 팝업
// ════════════════════════════════════
function buildAwardPopup(){
  const {sid,name,hb}=S.awardPopup;
  const st=S.students.find(s=>s.id===sid);
  const t=getTeam(st?.team||"red");
  const isSpks=getAwardGroup(hb)==="sparks";
  const cur=getAwards(sid);
  const past=getPastAwards(sid);
  const isAdmin=S.role==="admin";
  const locked=isLocked();
  const close=()=>{S.awardPopup=null;render();};
  async function save(patch){await saveAwards(sid,{...cur,...patch});S.awardPopup={sid,name,hb};render();}

  // 원 안에 숫자 표시
  function mkCircle(n,color,bg,border,size=36){
    return D({width:size+"px",height:size+"px",borderRadius:"50%",
      display:"flex",alignItems:"center",justifyContent:"center",
      background:bg,border:`2px solid ${border}`,
      fontWeight:"800",fontSize:(size*0.38)+"px",color,flexShrink:"0"},String(n));
  }

  // ── 스팍스 ──
  function buildSparks(){
    const badgeNum=HB_BADGE_NUM[hb]||1;
    // 승급표식/날개핀은 학생 객체에서 영구 저장
    const hadBadge=!!st?.badge, hasBadge=!!cur.badge;
    const hadWing=!!st?.wing,   hasWing=!!cur.wing;
    const pastGems=past.gems||0, curGems=cur.gems||0, totalGems=pastGems+curGems;

    function mkBadgeCard(label,had,has,stuKey,curKey){
      const bc=HB_BADGE_COLOR[hb]||{color:"#22C55E",light:"#F0FDF4",border:"#86EFAC"};
      const bg=had?bc.light:has?bc.light:"#F8FAFC";
      const border=had?bc.color:has?bc.color:"#E2E8F0";
      const circleColor=had?bc.color:has?bc.color:"#E2E8F0";
      const card=D({flex:"1",borderRadius:"12px",border:`2px solid ${border}`,
        background:bg,padding:"12px 8px",textAlign:"center",
        cursor:locked?"not-allowed":"pointer",position:"relative"},
        D({width:"44px",height:"44px",borderRadius:"50%",margin:"0 auto 8px",
          background:circleColor,
          display:"flex",alignItems:"center",justifyContent:"center",
          fontWeight:"800",fontSize:"18px",color:"#fff"},
          had||has?"✓":String(badgeNum)
        ),
        D({fontSize:"12px",fontWeight:"700",color:(had||has)?bc.color:"#1E293B",lineHeight:"1.3"},label),
        had?D({fontSize:"10px",color:bc.color,marginTop:"4px"},"완료 ✓"):null,
        isAdmin&&had?B({position:"absolute",top:"4px",right:"4px",fontSize:"10px",
          color:"#EF4444",background:"#fff",border:"1px solid #FECACA",
          borderRadius:"4px",padding:"1px 5px",cursor:"pointer"},
          async e=>{e.stopPropagation();
            await saveStuMilestone(sid,{[stuKey]:false});
            await save({[curKey]:false});
            S.awardPopup={sid,name,hb};render();
          },"해제"):null
      );
      if(!locked) card.addEventListener("click",async e=>{
        if(e.target.tagName==="BUTTON") return;
        const newVal=!(had||has);
        await saveStuMilestone(sid,{[stuKey]:newVal});
        await save({[curKey]:newVal});
      });
      return card;
    }

    // 보석 1~8 모두 표시, 순서대로만 클릭 가능
    const gemsUnlocked=(hadBadge||hasBadge)&&(hadWing||hasWing);
    const nextIdx=pastGems; // 다음으로 받을 보석 인덱스
    const hasCurGem=curGems>0;
    const allDone=pastGems>=8;

    const gemGrid=D({display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:"8px"},
      ...GEM_SEQ.map((tid,i)=>{
        const tm=TEAMS.find(x=>x.id===tid);
        const gemName=tid==="red"?"빨강":"초록";
        const isPast=i<pastGems;
        const isNext=i===nextIdx&&!allDone&&gemsUnlocked;
        const isCur=isNext&&hasCurGem;
        // 순서 잠금: 이전 보석 받아야 다음 클릭 가능
        const isBlocked=!isPast&&!isNext&&!isCur;
        const isLocked=(!isNext&&!isCur)||locked||!gemsUnlocked;

        const circleStyle={width:"36px",height:"36px",borderRadius:"50%",
          display:"flex",alignItems:"center",justifyContent:"center",
          fontWeight:"800",fontSize:"15px"};

        let circle;
        if(isPast){
          circle=D({...circleStyle,background:tm.color,color:"#fff"},"✓");
        } else if(isCur){
          circle=D({...circleStyle,background:tm.color,color:"#fff"},"✓");
        } else if(isNext){
          // 받을 수 있는 보석: 볼드 테두리, 색상 강조
          circle=D({...circleStyle,background:tm.light,
            border:`2px solid ${tm.color}`,color:tm.color,fontSize:"16px",fontWeight:"900"},
            String(i+1));
        } else {
          // 아직 못 받는 보석: 흐리게
          circle=D({...circleStyle,background:"#F8FAFC",
            border:"1px solid #E2E8F0",color:"#CBD5E1"},String(i+1));
        }

        const box=D({display:"flex",flexDirection:"column",alignItems:"center",gap:"5px",
          padding:"10px 6px",borderRadius:"10px",
          border:`2px solid ${isPast||isCur?tm.color:isNext?tm.color:"#E2E8F0"}`,
          background:isPast||isCur?tm.light:isNext?tm.light+"80":"#F8FAFC",
          cursor:isLocked?"default":"pointer",
          opacity:(!isPast&&!isNext&&!isCur)?"0.35":"1"},
          circle,
          SP({fontSize:"10px",fontWeight:isNext||isPast||isCur?"700":"400",
            color:isPast||isCur||isNext?tm.color:"#CBD5E1"},gemName)
        );

        if(!isLocked) box.addEventListener("click",async()=>{
          await save({gems:isCur?0:1});
        });
        return box;
      })
    );

    const showBadge=true, showWing=true;
    return D({},
      (showBadge||showWing)?D({display:"flex",gap:"10px",marginBottom:"14px"},
        showBadge?mkBadgeCard(HB_BADGE_LABEL[hb]||"승급표식",hadBadge,hasBadge,"badge","badge"):null,
        showWing ?mkBadgeCard(HB_WING_LABEL[hb]||"날개핀",hadWing,hasWing,"wing","wing"):null
      ):null,
      D({fontWeight:"700",fontSize:"13px",color:"#475569",marginBottom:"8px"},"▸ 보석"),
      !gemsUnlocked
        ? D({fontSize:"11px",color:"#F59E0B",marginBottom:"10px"},"⚠️ 승급표식과 날개핀 완료 후 보석을 받을 수 있어요")
        : allDone
          ? D({fontSize:"11px",color:"#94A3B8",marginBottom:"10px"},"🎉 8개 보석을 모두 받았어요!")
          : D({fontSize:"11px",color:"#94A3B8",marginBottom:"10px"},
              `${pastGems>0?pastGems+"개 받음 · ":""}이번 주: ${GEM_SEQ[nextIdx]==="red"?"빨강":"초록"} 보석`),
      gemGrid
    );
    }

  // ── T&T (어드벤처/챌린지) ──
  function buildTnt(){
    const hasAward=!!cur.award, hadAward=past.award;
    const curSeals=cur.seals||[];
    const hbc=HB_TNT_COLOR[hb]||{color:t.color,light:t.light,border:t.border};
    const tntColor=hbc.color, tntLight=hbc.light, tntBorder=hbc.border;

    // 수상대 (스팍스 승급표식처럼 번호+과정명)
    const awardNum={"어드벤처1":1,"어드벤처2":2,"챌린지1":1,"챌린지2":2};
    const awardNumVal=awardNum[hb]||1;
    const awardCard=D({flex:"1",borderRadius:"12px",border:`2px solid ${hadAward?"#CBD5E1":hasAward?tntColor:"#E2E8F0"}`,
      background:hadAward?"#F8FAFC":hasAward?tntLight:"#F8FAFC",
      padding:"12px 8px",textAlign:"center",
      cursor:locked?"not-allowed":"pointer",position:"relative"},
      D({width:"44px",height:"44px",borderRadius:"50%",margin:"0 auto 8px",
        background:hadAward?"#CBD5E1":hasAward?tntColor:"#E2E8F0",
        display:"flex",alignItems:"center",justifyContent:"center",
        fontWeight:"800",fontSize:"18px",color:"#fff"},
        hadAward||hasAward?"✓":String(awardNumVal)
      ),
      D({fontSize:"12px",fontWeight:"700",color:(hadAward||hasAward)?tntColor:"#1E293B",lineHeight:"1.3"},hb+"\n수상대"),
      hadAward?D({fontSize:"10px",color:"#94A3B8",marginTop:"4px"},"완료 ✓"):null,
      isAdmin&&hadAward?B({position:"absolute",top:"4px",right:"4px",fontSize:"10px",
        color:"#EF4444",background:"#fff",border:"1px solid #FECACA",
        borderRadius:"4px",padding:"1px 5px",cursor:"pointer"},
        async e=>{e.stopPropagation();await save({award:false});},"해제"):null
    );
    if(!locked&&!hadAward) awardCard.addEventListener("click",async e=>{
      if(e.target.tagName==="BUTTON") return;
      await save({award:!cur.award});
    });

    // 씰 1~8 (원 안에 숫자)
    const sealGrid=D({display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:"8px"},
      ...[1,2,3,4,5,6,7,8].map(n=>{
        const sn="씰"+n;
        const hadBefore=past.seals.includes(sn);
        const hasCur=curSeals.includes(sn);
        // 앞 씰이 모두 완료돼야 이 씰 클릭 가능
        const prevDone=n===1||past.seals.includes("씰"+(n-1))||curSeals.includes("씰"+(n-1));
        const isBlocked=!prevDone&&!hadBefore&&!hasCur;
        const box=D({display:"flex",flexDirection:"column",alignItems:"center",gap:"4px",
          padding:"10px 6px",borderRadius:"10px",
          border:`2px solid ${hadBefore?tntColor:hasCur?tntColor:"#E2E8F0"}`,
          background:hadBefore?tntLight:hasCur?tntLight:"#F8FAFC",
          cursor:(locked||hadBefore||isBlocked)?"default":"pointer",position:"relative"},
          hadBefore
            ? D({width:"36px",height:"36px",borderRadius:"50%",background:tntColor,
                display:"flex",alignItems:"center",justifyContent:"center",
                fontWeight:"800",fontSize:"16px",color:"#fff"},"✓")
            : mkCircle(n,hasCur?tntColor:"#94A3B8",hasCur?tntLight:"#F8FAFC",hasCur?tntColor:"#E2E8F0")
        );

        if(!locked&&!hadBefore&&!isBlocked) box.addEventListener("click",async()=>{
          const next=hasCur?curSeals.filter(x=>x!==sn):[...curSeals,sn];
          await save({seals:next});
        });
        return box;
      })
    );

    return D({},
      D({display:"flex",gap:"10px",marginBottom:"14px"},awardCard),
      D({fontWeight:"700",fontSize:"13px",color:"#475569",marginBottom:"10px"},"▸ 씰"),
      D({fontSize:"11px",color:"#94A3B8",marginBottom:"10px"},
        `${hb} · 완료된 씰은 채워진 원으로 표시`),
      sealGrid
    );
  }

  // 요약
  const summary=[];
  if(isSpks){
    if(cur.badge) summary.push("🏅"+HB_BADGE_LABEL[hb]);
    if(cur.wing)  summary.push("🪽 "+HB_WING_LABEL[hb]);
    if(cur.gems)  GEM_SEQ.slice(past.gems, past.gems+cur.gems).forEach(tid=>summary.push(tid==="red"?"🔴 빨강 보석":"🟢 초록 보석"));
  } else {
    if(cur.award) summary.push("🏆"+hb+"수상대");
    (cur.seals||[]).forEach(s=>summary.push("●"+s));
  }

  const curMemo=getWD()?.students?.[sid]?.memo||"";

  return D({position:"fixed",inset:"0",background:"rgba(0,0,0,0.5)",
    display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:"150"},
    D({background:"#fff",borderRadius:"20px 20px 0 0",width:"100%",maxWidth:"480px",
      padding:"20px 20px 32px",maxHeight:"88vh",overflowY:"auto"},
      D({display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"8px"},
        D({},
          D({fontWeight:"700",fontSize:"16px"},`🏅 ${name} 시상`),
          D({fontSize:"12px",color:"#94A3B8",marginTop:"2px"},
            `${S.week===0?"0주차":S.week+"주차"} · ${hb}`)
        ),
        B({background:"none",border:"none",fontSize:"22px",cursor:"pointer",color:"#64748B"},close,"×")
      ),
      summary.length
        ? D({fontSize:"12px",color:"#475569",marginBottom:"12px",background:"#F1F5F9",
            borderRadius:"8px",padding:"6px 10px",fontWeight:"600"},
            "이번 주: "+summary.join(" "))
        : D({fontSize:"12px",color:"#94A3B8",marginBottom:"12px"},"이번 주 시상 없음"),
      isSpks?buildSparks():buildTnt(),
      // 메모
      D({marginTop:"16px",borderTop:"1px solid #F1F5F9",paddingTop:"14px"},
        D({fontWeight:"600",fontSize:"13px",color:"#475569",marginBottom:"6px"},"📝 특이사항 메모"),
        (()=>{
          const ta=document.createElement("textarea");
          Object.assign(ta.style,{width:"100%",boxSizing:"border-box",border:"1px solid #E2E8F0",

function buildCeremony(){
  const sorted=S.cSorted||[...TEAMS].sort((a,b)=>totalScore(b.id)-totalScore(a.id));
  const maxScore=S.cMaxScore||Math.max(...TEAMS.map(t=>totalScore(t.id)),1);
  const FIXED=["red","blue","green","yellow"];
  const RL=["🥇","🥈","🥉","4️⃣"],RN=["1등","2등","3등","4등"];
  const step=S.cStep||0,isAnim=S.cPhase==="animating",isDone=S.cPhase==="done";
  const lastRevId=S.cRevealed&&S.cRevealed.length>0?S.cRevealed[S.cRevealed.length-1]:null;
  const lastRev=lastRevId?TEAMS.find(t=>t.id===lastRevId):null;
  const lastRank=lastRev?sorted.findIndex(t=>t.id===lastRevId):-1;
  let bannerContent;
  if(lastRev){
    bannerContent=[
      D({fontSize:"16px",color:"#94A3B8",letterSpacing:"2px",marginBottom:"4px"},RL[lastRank]+" "+RN[lastRank]),
      D({fontSize:"46px",fontWeight:"900",lineHeight:"1.1",color:lastRev.color},lastRev.name,"팀!"),
      D({fontSize:"22px",fontWeight:"800",color:"#1E293B",marginTop:"4px"},(S.cTargets&&S.cTargets[lastRev.id]||0).toLocaleString()+"점")
    ];
  } else if(S.cBanner){
    bannerContent=D({fontSize:"30px",fontWeight:"900",color:"#1E293B",letterSpacing:"1px"},S.cBanner);
  } else {
    bannerContent=D({fontSize:"16px",color:"#64748B"},"버튼을 눌러 시작하세요");
  }
  const bannerArea=D({minHeight:"110px",display:"flex",flexDirection:"column",
    alignItems:"center",justifyContent:"center",marginBottom:"8px",flexShrink:"0"},bannerContent);
  const BAR_MAX=240;
  const barArea=D({display:"flex",alignItems:"flex-end",gap:"8px",
    height:(BAR_MAX+80)+"px",width:"100%",boxSizing:"border-box",
    padding:"0 12px",marginBottom:"8px",flexShrink:"0"},
    ...FIXED.map(tid=>{
      const t=TEAMS.find(x=>x.id===tid);
      const score=S.cScores&&S.cScores[t.id]||0;
      const barH=Math.max(4,Math.round((score/maxScore)*BAR_MAX));
      const rev=S.cRevealed&&S.cRevealed.includes(t.id);
      const rank=sorted.findIndex(x=>x.id===t.id);
      const numEl=document.createElement("div");
      numEl.id="cnum_"+t.id;
      Object.assign(numEl.style,{fontSize:rev?"18px":"13px",fontWeight:"800",
        color:t.color,textAlign:"center",marginBottom:"4px",minHeight:"20px",
        opacity:rev?"1":"0.4"});
      numEl.textContent=score>0?score.toLocaleString():"";
      const barEl=document.createElement("div");
      barEl.id="cbar_"+t.id;
      Object.assign(barEl.style,{width:"100%",height:barH+"px",
        background:t.grad,borderRadius:"8px 8px 0 0",
        boxShadow:rev?"0 0 32px "+t.color+"cc, 0 0 8px "+t.color:"none",
        position:"relative",
        border:rev?"2px solid "+t.color:"1px solid "+t.color+"44",
        opacity:rev?"1":"0.35"});
      if(rev&&rank===0){
        const cr=document.createElement("div");
        cr.style.cssText="position:absolute;top:-30px;left:50%;transform:translateX(-50%);font-size:24px";
        cr.textContent="👑";barEl.appendChild(cr);
      }
      const medalEl=D({fontSize:"20px",height:"26px",textAlign:"center",marginBottom:"2px"},rev?RL[rank]:"");
      const nameEl=rev
        ?D({marginTop:"6px",textAlign:"center",background:"#fff",
            borderRadius:"10px",padding:"5px 10px",
            boxShadow:"0 2px 12px "+t.color+"55"},
            SP({fontSize:"18px",fontWeight:"900",color:t.color},t.name,"팀!"))
        :D({marginTop:"6px",textAlign:"center",opacity:"0.4"},
            SP({fontSize:"13px",fontWeight:"700",color:t.color},t.name,"팀"));
      return D({display:"flex",flexDirection:"column",alignItems:"center",flex:"1"},
        medalEl,numEl,
        D({width:"100%",height:BAR_MAX+"px",display:"flex",alignItems:"flex-end"},barEl),
        nameEl);
    })
  );
  const SL=["▶ 시작하기","4등까지 →","3등까지 →","🏆 우승 팀 발표!!","🥈 준우승 팀 발표!","완료"];
  const mainBtn=!isDone?B({
    background:isAnim?"#E2E8F0":"linear-gradient(135deg,#3B82F6,#1D4ED8)",
    color:isAnim?"#94A3B8":"#fff",border:"none",borderRadius:"14px",
    padding:"14px 32px",fontWeight:"800",fontSize:"16px",
    cursor:isAnim?"not-allowed":"pointer",opacity:isAnim?"0.5":"1",
    boxShadow:isAnim?"none":"0 6px 20px rgba(59,130,246,0.5)"
  },()=>{if(!isAnim)cNextStep();},SL[Math.min(step,5)]):null;
  const closeBtn=B({
    background:"#F1F5F9",color:"#64748B",border:"1px solid #E2E8F0",
    borderRadius:"10px",padding:"10px 20px",fontWeight:"600",fontSize:"13px",cursor:"pointer"
  },()=>{stopAllSounds();S.ceremony=false;render();},"닫기");
  return D({position:"fixed",inset:"0",
    background:"#fff",border:"12px solid #DC2626",boxSizing:"border-box",
    zIndex:"200",display:"flex",flexDirection:"column",
    alignItems:"center",justifyContent:"space-between",overflow:"hidden"},
    el("div",{id:"cconf",style:{position:"absolute",inset:"0",pointerEvents:"none",overflow:"hidden"}}),
    D({width:"100%",textAlign:"center",padding:"48px 16px 0",flexShrink:"0",position:"relative",zIndex:"1"},
      D({fontSize:"11px",color:"#DC2626",letterSpacing:"4px",marginBottom:"6px",fontWeight:"700"},"A W A N A  시상식"),
      D({fontSize:"16px",fontWeight:"700",color:"#1E293B"},
        (S.week===0?"0주차":S.week+"주차")+" 최종 순위")
    ),
    D({width:"100%",textAlign:"center",padding:"0 16px",position:"relative",zIndex:"1"},bannerArea),
    D({width:"100%",position:"relative",zIndex:"1"},barArea),
    D({display:"flex",gap:"12px",alignItems:"center",
      padding:"12px 20px 32px",flexShrink:"0",position:"relative",zIndex:"1"},
      mainBtn,closeBtn)
  );
}

// ── 학생 관리 ──
function buildStMgr(){
  const srch=inp("🔍 학생 이름 검색...",S.search,v=>{S.search=v;render();},{width:"100%",marginBottom:"12px",boxSizing:"border-box"});
  const nameI=inp("이름",S.newSt.name,v=>{S.newSt.name=v;},{flex:"1"});
  const teamS=sel(TEAMS.map(t=>[t.id,t.name]),S.newSt.team,v=>{S.newSt.team=v;},{border:"1px solid #E2E8F0",borderRadius:"8px",padding:"8px 6px",fontSize:"13px"});
  const hbS=sel(HANDBOOKS.map(h=>[h,h]),S.newSt.handbook,v=>{S.newSt.handbook=v;},{border:"1px solid #E2E8F0",borderRadius:"8px",padding:"8px 6px",fontSize:"13px",flex:"1"});
  const addRow=el("div",{style:{display:"grid",gridTemplateColumns:"1fr 60px 1fr 34px",gap:"6px",marginBottom:"12px"}},
    nameI,teamS,hbS,
    B({background:"#22C55E",color:"#fff",border:"none",borderRadius:"8px",cursor:"pointer",fontWeight:"700",fontSize:"18px"},async()=>{
      if(!S.newSt.name.trim()) return;
      S.students.push({id:`s_${Date.now()}`,name:S.newSt.name.trim(),team:S.newSt.team,handbook:S.newSt.handbook});
      S.newSt={name:"",team:"red",handbook:"행글라이더"};
      await saveStudents();render();
    },"+")
  );

  // CSV 업로드
  const fileI=document.createElement("input");
  fileI.type="file";fileI.accept=".csv";fileI.style.display="none";
  fileI.addEventListener("change",async e=>{
    const f=e.target.files[0];if(!f) return;
    const r=new FileReader();
    r.onload=async ev=>{
      const parsed=parseCSV(ev.target.result);
      if(!parsed.length){alert("추가된 학생이 없어요.\n형식: 이름,팀명,핸드북");return;}
      const ex=new Set(S.students.map(s=>s.name));
      const newS=parsed.filter(s=>!ex.has(s.name));
      const dup=parsed.filter(s=>ex.has(s.name)).map(s=>s.name);
      const msg=dup.length?`⚠️ 중복 제외 (${dup.length}명)\n`:"";
      if(!newS.length){alert(msg+"새로 추가된 학생이 없어요.");return;}
      S.students=[...S.students,...newS];
      await saveStudents();render();
      alert(msg+`✅ ${newS.length}명 추가됐어요!`);
    };
    r.readAsText(f,"UTF-8");e.target.value="";
  });

  // 학생 목록 - 아코디언 스타일
  const listItems=HB_GROUPS.flatMap(group=>{
    const books=group.books.filter(hb=>hbStu(hb).filter(s=>s.name.includes(S.search)).length>0);
    if(!books.length) return [];
    const gKey="stMgr_"+group.label;
    const open=S.statsOpen[gKey]!==false;
    const header=D({display:"flex",justifyContent:"space-between",alignItems:"center",
      padding:"9px 12px",cursor:"pointer",marginBottom:open?"0":"6px",
      background:group.light,borderRadius:open?"10px 10px 0 0":"10px",
      border:`2px solid ${group.border}`});
    const hdrL=D({display:"flex",alignItems:"center",gap:"6px"});
    hdrL.appendChild(group.label==="Sparks"?mkSparksIcon(15):mkTntIcon(15));
    hdrL.appendChild(SP({fontWeight:"800",color:group.color,fontSize:"13px"},
      " "+group.label,
      SP({fontWeight:"400",fontSize:"11px",color:group.color,marginLeft:"4px"},
        group.label==="Sparks"?"행글라이더 · 윙러너 · 스카이스토머":"어드벤처1~챌린지2")));
    const cnt=group.books.reduce((n,hb)=>n+hbStu(hb).filter(s=>s.name.includes(S.search)).length,0);
    hdrL.appendChild(SP({fontSize:"11px",color:group.color,marginLeft:"4px"},cnt+"명"));
    header.appendChild(hdrL);
    header.appendChild(SP({fontSize:"13px",color:group.color},open?"▲":"▼"));
    header.addEventListener("click",()=>{S.statsOpen[gKey]=!open;render();});
    if(!open) return [header];

    const bodyRows=books.flatMap(hb=>{
      const filtered=hbStu(hb).filter(s=>s.name.includes(S.search));
      if(!filtered.length) return [];
      return [
        D({fontWeight:"600",fontSize:"11px",color:"#64748B",padding:"6px 12px 3px",background:"#F8FAFC"},hb),
        ...filtered.map((s,si2)=>{
          const t=getTeam(s.team);
          if(S.editSt?.id===s.id){
            const es=S.editSt;
            const en=inp("이름",es.name,v=>{S.editSt.name=v;},{flex:"1"});
            const et=sel(TEAMS.map(x=>[x.id,x.name]),es.team,v=>{S.editSt.team=v;},{border:"1px solid #E2E8F0",borderRadius:"8px",padding:"6px",fontSize:"12px"});
            const eh=sel(HANDBOOKS.map(h=>[h,h]),es.handbook,v=>{S.editSt.handbook=v;},{border:"1px solid #E2E8F0",borderRadius:"8px",padding:"6px",fontSize:"12px",flex:"1"});
            return D({background:"#F0F9FF",padding:"8px 12px",borderBottom:"1px solid #E2E8F0"},
              D({display:"flex",gap:"6px",marginBottom:"6px"},en,et),
              D({display:"flex",gap:"6px"},eh,
                B({background:"#22C55E",color:"#fff",border:"none",borderRadius:"8px",padding:"6px 12px",cursor:"pointer",fontWeight:"700",fontSize:"13px"},async()=>{S.students=S.students.map(x=>x.id===s.id?{...x,...S.editSt}:x);S.editSt=null;await saveStudents();render();},"저장"),
                B({background:"#F1F5F9",border:"none",borderRadius:"8px",padding:"6px 12px",cursor:"pointer",fontSize:"13px"},()=>{S.editSt=null;render();},"취소")
              )
            );
          }
          return D({display:"flex",justifyContent:"space-between",alignItems:"center",
            padding:"8px 12px",background:"#fff",borderBottom:"1px solid #F1F5F9"},
            D({display:"flex",flexDirection:"column",gap:"2px"},
              D({display:"flex",alignItems:"center",gap:"8px"},
                SP({fontWeight:"700",fontSize:"13px",color:"#1E293B"},s.name),
                SP({fontSize:"11px",color:t.color,fontWeight:"600"},`● ${t.name}`)
              ),
              (()=>{
                let att=0,signs=0;
                Object.values(S.wdata).forEach(wd2=>{
                  const d=(wd2?.students||{})[s.id]||{};
                  if(d.attendance) att++;
                  signs+=d.signs||0;
                });
                return SP({fontSize:"11px",color:"#94A3B8"},
                  s.handbook," · 출석 ",att,"회 · 암송 ",Math.round(signs*10)/10,"개");
              })()
            ),
            D({display:"flex",gap:"4px"},
              B({background:"none",border:"1px solid #E2E8F0",borderRadius:"6px",color:"#3B82F6",cursor:"pointer",fontSize:"12px",padding:"3px 8px"},()=>{S.editSt={...s};render();},"✏️"),
              B({background:"none",border:"none",color:"#EF4444",cursor:"pointer",fontSize:"18px"},async()=>{if(!confirm(s.name+"을(를) 삭제할까요?"))return;S.students=S.students.filter(x=>x.id!==s.id);await saveStudents();render();},"×")
            )
          );
        })
      ];
    });
    const body=D({border:`2px solid ${group.border}`,borderTop:"none",borderRadius:"0 0 10px 10px",overflow:"hidden",marginBottom:"8px"},...bodyRows);
    return [header,body];
  });

  return D({},
    srch,
    D({fontWeight:"600",fontSize:"13px",color:"#475569",marginBottom:"8px",display:"flex",justifyContent:"space-between",alignItems:"center"},
      SP({},"학생 추가"),
      D({display:"flex",alignItems:"center",gap:"6px"},
        SP({fontSize:"11px",color:"#94A3B8"},`총 ${S.students.length}명`),
        B({background:"#F59E0B",color:"#fff",border:"none",borderRadius:"6px",padding:"4px 10px",cursor:"pointer",fontSize:"11px",fontWeight:"600"},async()=>{
          if(!confirm("학생 명단을 모두 삭제할까요?\n이 작업은 되돌릴 수 없습니다.")) return;
          S.students=[];await saveStudents();render();alert("✅ 학생 명단이 초기화됐어요.");
        },"🔄 초기화"),
        B({background:"#F1F5F9",color:"#475569",border:"1px solid #E2E8F0",borderRadius:"6px",padding:"4px 10px",cursor:"pointer",fontSize:"11px"},()=>fileI.click(),"📁 CSV"),
        fileI
      )
    ),
    addRow,
    ...listItems,
    !S.students.length?D({textAlign:"center",color:"#94A3B8",padding:"20px",fontSize:"13px"},"등록된 학생이 없어요 → 🔄 초기화 버튼을 눌러주세요"):null
  );
}

function buildStatsView(){
  // 팀별 우승/준우승 계산
  const win1={red:0,yellow:0,green:0,blue:0}, win2={red:0,yellow:0,green:0,blue:0};
  Object.keys(S.wdata).forEach(w=>{
    const wd=S.wdata[w]; if(!wd?.gameFinalized) return;
    const sorted=[...TEAMS].sort((a,b)=>{
      const calc=(tid)=>{
        const hb=S.students.filter(s=>s.team===tid).reduce((s2,st)=>{
          const d=(wd?.students||{})[st.id]||{};
          const{attScore:a=50,uniScore:u=50,signScore:sg=50}=S.settings;
          return s2+(d.attendance?a:0)+(d.uniform?u:0)+((d.signs||0)*sg);
        },0);
        let g=0;
        ["sparks","tnt"].forEach(type=>{
          const rounds=(wd.games?.[type]?.rounds)||[];
          const cum={};TEAMS.forEach(x=>{cum[x.id]=rounds.reduce((s3,r)=>s3+(r.scores?.[x.id]||0),0);});
          const si2=[...TEAMS].sort((x,y)=>cum[y.id]-cum[x.id]);
          const ri=si2.findIndex(x=>x.id===tid);
          g+=Math.max(0,S.settings.firstPlace-ri*S.settings.gap);
        });
        return hb+g;
      };
      return calc(b.id)-calc(a.id);
    });
    if(sorted[0]) win1[sorted[0].id]++;
    if(sorted[1]) win2[sorted[1].id]++;
  });

  return D({},
    D({fontWeight:"600",fontSize:"14px",marginBottom:"10px",color:"#1E293B"},"팀 통계"),
    D({display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px"},
      ...TEAMS.map(t=>{
        const cumHb=Object.values(S.wdata).reduce((sum,wd2)=>
          sum+S.students.filter(s=>s.team===t.id).reduce((s2,st)=>{
            const d=(wd2?.students||{})[st.id]||{};
            const{attScore:a=50,uniScore:u=50,signScore:sg=50}=S.settings;
            return s2+(d.attendance?a:0)+(d.uniform?u:0)+((d.signs||0)*sg);
          },0),0);
        return D({background:"#fff",borderRadius:"10px",padding:"12px 14px",border:`2px solid ${t.border}`},
          D({display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"8px"},
            D({display:"flex",alignItems:"center",gap:"6px"},
              D({width:"8px",height:"8px",borderRadius:"50%",background:t.color,flexShrink:"0"}),
              SP({fontWeight:"600",color:t.color,fontSize:"13px"},t.name+"팀")
            ),
            SP({fontSize:"11px",color:"#94A3B8"},S.students.filter(s=>s.team===t.id).length,"명")
          ),
          D({display:"flex",gap:"6px",marginBottom:"8px"},
            D({flex:"1",background:"#F8FAFC",borderRadius:"6px",padding:"6px 4px",textAlign:"center"},
              D({fontSize:"10px",color:"#94A3B8",marginBottom:"2px"},"🥇 우승"),
              SP({fontWeight:"600",color:t.color,fontSize:"13px"},win1[t.id],"회")
            ),
            D({flex:"1",background:"#F8FAFC",borderRadius:"6px",padding:"6px 4px",textAlign:"center"},
              D({fontSize:"10px",color:"#94A3B8",marginBottom:"2px"},"🥈 준우승"),
              SP({fontWeight:"600",color:"#64748B",fontSize:"13px"},win2[t.id],"회")
            )
          ),
          D({fontSize:"11px",color:"#94A3B8"},"핸드북 누적 ",SP({color:"#475569",fontWeight:"600"},cumHb.toLocaleString()),"점")
        );
      })
    ),
    !S.students.length?D({textAlign:"center",color:"#94A3B8",padding:"20px",fontSize:"13px",marginTop:"12px"},"등록된 학생이 없어요"):null
  );
}

  return D({},

function buildAwardsTab(){
  const wd=getWD();
  if(!S.awardsTab) S.awardsTab="sparks";

  // 현재 탭의 핸드북 목록
  const sparksHbs=["행글라이더","윙러너","스카이스토머"];
  const tntHbs=["어드벤처1","어드벤처2","챌린지1","챌린지2"];
  const curHbs=S.awardsTab==="sparks"?sparksHbs:tntHbs;

  // 선택된 핸드북 초기화
  if(!S.awardsSelHb||!curHbs.includes(S.awardsSelHb)) S.awardsSelHb=curHbs[0];
  const selHb=S.awardsSelHb;

  function awardItems(sid,hb){
    const a=wd?.students?.[sid]?.awards; if(!a) return [];
    const items=[];
    const attInfo=getAttAwardInfo(S.week);
    if(attInfo && calcAttAward(sid,attInfo.week,attInfo.allow))
      items.push({label:"출석상",color:"#7C3AED",bg:"#F5F3FF",border:"#DDD6FE"});
    if(getAwardGroup(hb)==="sparks"){
      const hbc=HB_BADGE_COLOR[hb]||{color:"#22C55E",light:"#F0FDF4",border:"#86EFAC"};
      if(a.badge) items.push({label:HB_BADGE_LABEL[hb]||"승급표식",color:hbc.color,bg:hbc.light,border:hbc.border});
      if(a.wing)  items.push({label:HB_WING_LABEL[hb]||"날개핀",color:hbc.color,bg:hbc.light,border:hbc.border});
      if(a.gems){
        const pastG=getPastAwards(sid).gems||0;
        GEM_SEQ.slice(pastG,pastG+a.gems).forEach(tid=>{
          const gc=TEAMS.find(x=>x.id===tid);
          items.push({label:tid==="red"?"빨강 보석":"초록 보석",color:gc.color,bg:gc.light,border:gc.border});
        });
      }
    } else {
      const hbc=HB_TNT_COLOR[hb]||{color:"#64748B",light:"#F8FAFC",border:"#E2E8F0"};
      if(a.award) items.push({label:hb+" 수상대",color:hbc.color,bg:hbc.light,border:hbc.border});
      (a.seals||[]).sort((x,y)=>parseInt(x)-parseInt(y))
        .forEach(s=>items.push({label:s,color:hbc.color,bg:hbc.light,border:hbc.border}));
    }
    return items;
  }

  // 스팍스/티앤티 탭
  const clubTabBar=D({display:"flex",gap:"8px",marginBottom:"14px"},
    ...[["sparks","스팍스"],["tnt","티앤티"]].map(([id,label])=>{
      const btn=B({flex:"1",padding:"10px 0",borderRadius:"10px",border:"none",cursor:"pointer",
        fontWeight:"700",fontSize:"14px",
        background:S.awardsTab===id?"#1E293B":"#F1F5F9",
        color:S.awardsTab===id?"#fff":"#64748B"},
        ()=>{S.awardsTab=id;S.awardsSelHb=null;render();});
      btn.appendChild(mkClubLabel(id," "+label,16));return btn;
    })
  );

  // 핸드북 선택 버튼
  const grp=HB_GROUPS.find(g=>g.label===(S.awardsTab==="sparks"?"Sparks":"T&T"));
  const hbBtns=D({display:"flex",gap:"6px",marginBottom:"12px",flexWrap:"wrap"},
    ...curHbs.map(hb=>{
      const stuList=S.students.filter(s=>s.handbook===hb);
      const awardCnt=stuList.filter(s=>awardItems(s.id,hb).length).length;
      const isSel=selHb===hb;
      const btn=D({flex:"1",minWidth:"0",padding:"8px 6px",borderRadius:"8px",textAlign:"center",
        cursor:"pointer",border:`2px solid ${isSel?grp.color:grp.border}`,
        background:isSel?grp.light:"#fff"},
        SP({fontWeight:"700",fontSize:"12px",color:isSel?grp.color:"#475569",
          display:"block",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"},hb),
        awardCnt>0
          ? SP({fontSize:"10px",color:isSel?grp.color:"#94A3B8",display:"block",marginTop:"2px"},awardCnt+"/"+stuList.length)
          : SP({fontSize:"10px",color:"#94A3B8",display:"block",marginTop:"2px"},stuList.length+"명")
      );
      btn.addEventListener("click",()=>{S.awardsSelHb=hb;render();});
      return btn;
    })
  );

  // 선택된 핸드북 학생 목록
  const selStu=S.students.filter(s=>s.handbook===selHb)
    .sort((a,b)=>a.name.localeCompare(b.name,"ko"))
    .map(s=>({s,hb:selHb,items:awardItems(s.id,selHb)}));

  const rows=selStu.length===0
    ? [D({padding:"20px",textAlign:"center",fontSize:"13px",color:"#94A3B8"},"등록된 학생이 없어요")]
    : selStu.map(({s,items},i2)=>{
        const memo=wd?.students?.[s.id]?.memo||"";
        return D({display:"flex",flexDirection:"column",
          background:items.length||memo?"#F8FAFC":"#fff",
          borderBottom:i2<selStu.length-1?"1px solid #E2E8F0":"none"},
          D({display:"flex",alignItems:"center",gap:"10px",padding:"10px 14px"},
            SP({fontWeight:"700",fontSize:"13px",color:items.length||memo?"#1E293B":"#94A3B8",minWidth:"52px"},s.name),
            items.length
              ? D({display:"flex",flexWrap:"wrap",gap:"4px"},
                  ...items.map(it=>SP({background:it.bg,borderRadius:"6px",
                    padding:"2px 8px",border:"1px solid "+it.border,
                    fontWeight:"700",fontSize:"12px",color:it.color},it.label)))
              : SP({fontSize:"12px",color:"#CBD5E1"},"수상 없음")
          ),
          memo?D({padding:"2px 14px 8px",fontSize:"11px",color:"#64748B",
            display:"flex",alignItems:"flex-start",gap:"4px"},
            SP({color:"#94A3B8",flexShrink:"0"},"📝"),SP({},memo)):null
        );
      });

  const listEl=D({background:"#fff",borderRadius:"12px",
    border:`2px solid ${grp.color}`,overflow:"hidden"},...rows);

  // 순위 섹션 (구 result 탭 내용)
  const sorted=[...TEAMS].sort((a,b)=>totalScore(b.id)-totalScore(a.id));
  function teamHbGroup(tid,grp2){
    return S.students.filter(s=>s.team===tid&&grp2.books.includes(s.handbook))
      .reduce((sum,st)=>sum+stuScore(st.id),0);
  }
  const sparksGrp=HB_GROUPS.find(g=>g.label==="Sparks");
  const tntGrp=HB_GROUPS.find(g=>g.label==="T&T");
  const rankSection=D({marginTop:"20px"},
    D({fontWeight:"600",fontSize:"15px",marginBottom:"12px",color:"#1E293B"},"이번 주 순위"),
    ...sorted.map((t,i)=>{
      const isFirst=i===0;
      const sparksHb=teamHbGroup(t.id,sparksGrp);
      const tntHb=teamHbGroup(t.id,tntGrp);
      const sparksGame=wd.gameFinalized?rankScores("sparks")[t.id]:null;
      const tntGame=wd.gameFinalized?rankScores("tnt")[t.id]:null;
      return D({background:"#fff",borderRadius:"12px",
        border:`2px solid ${isFirst?t.color:t.border}`,
        padding:"14px 16px",marginBottom:"10px"},
        D({display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"10px"},
          D({display:"flex",alignItems:"center",gap:"8px"},
            SP({fontSize:"18px"},["🥇","🥈","🥉","4️⃣"][i]),
            SP({fontWeight:"800",color:t.color,fontSize:"15px"},t.name,"팀")
          ),
          SP({fontWeight:"800",fontSize:"17px",color:t.color},totalScore(t.id).toLocaleString(),"점")
        ),
        D({borderTop:"1px solid #F1F5F9",paddingTop:"8px",display:"flex",gap:"12px",flexWrap:"wrap"},
          D({display:"flex",alignItems:"center",gap:"4px"},
            SP({fontSize:"11px",color:"#64748B"},"암송"),
            SP({fontWeight:"700",fontSize:"12px",color:"#1E293B"},(sparksHb+tntHb).toLocaleString(),"점")
          ),
          wd.gameFinalized?D({display:"flex",alignItems:"center",gap:"4px"},
            SP({fontSize:"11px",color:"#64748B"},"게임"),
            SP({fontWeight:"700",fontSize:"12px",color:"#1E293B"},((sparksGame||0)+(tntGame||0)).toLocaleString(),"점")
          ):SP({fontSize:"11px",color:"#94A3B8"},"게임 미확정")
        )
      );
    }),
    !wd.gameFinalized?D({background:"#F8FAFC",border:"1px solid #E2E8F0",borderRadius:"10px",padding:"10px 14px",marginTop:"4px",fontSize:"13px",color:"#64748B"},"⚠️ 게임 결과가 아직 확정되지 않았습니다."):null,
    wd.gameFinalized?B({width:"100%",background:"linear-gradient(135deg,#7C3AED,#A855F7)",color:"#fff",border:"none",borderRadius:"12px",padding:"14px",fontWeight:"800",fontSize:"15px",cursor:"pointer",marginTop:"8px"},()=>startCeremony(),"🎬 시상식 공개"):null
  );

  function buildMemoText(){
    const weekStr=S.week===0?"0주차 ("+WEEK_DATES[0]+")":S.week+"주차 ("+WEEK_DATES[S.week]+")";
    const withMemo=S.students.filter(s=>(wd&&wd.students&&wd.students[s.id]&&wd.students[s.id].memo||"").trim());
    if(!withMemo.length) return "["+weekStr+"] 특이사항 없음";
    return withMemo.map(s=>{
      const memo=(wd&&wd.students&&wd.students[s.id]&&wd.students[s.id].memo||"").trim();
      const t=TEAMS.find(x=>x.id===s.team);
      return "["+weekStr+"] "+s.name+"("+s.handbook+" | "+(t?t.name:"")+"팀): "+memo;
    }).join("\n");
  }
  function saveAsTxt(text){
    const weekStr=S.week===0?"0주차":S.week+"주차";
    const blob=new Blob([text],{type:"text/plain;charset=utf-8"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;a.download="어와나_"+weekStr+"_특이사항.txt";
    document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
  }
  const shareBtn=B({width:"100%",background:"linear-gradient(135deg,#FEE500,#F5D800)",
    color:"#1E293B",border:"none",borderRadius:"12px",padding:"13px",
    fontWeight:"800",fontSize:"14px",cursor:"pointer",marginTop:"8px"
  },()=>{
    const text=buildMemoText();
    const weekStr=S.week===0?"0주차":S.week+"주차";
    if(navigator.share){navigator.share({title:"어와나 "+weekStr+" 특이사항",text}).catch(()=>saveAsTxt(text));}
    else{saveAsTxt(text);}
  },"📋 특이사항 공유 / 저장");
  return D({},
    mkWeekBadge(),
    clubTabBar,
    hbBtns,
    listEl,
    rankSection,
    shareBtn
  );
}

</script>
</body>
</html>
