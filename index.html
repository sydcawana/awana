function buildScheduleEditor(){
  const scWeeks=WEEKS; // 전역 WEEKS 사용
  const COLS=["기수1 학년","기수1 이름","기수2 학년","기수2 이름","기도 구분","기도 이름"];
  const KEYS=["l1role","l1name","l2role","l2name","prole","pname"];

  // 로컬 편집 버퍼 (S.schedEdit에 저장)
  if(!S.schedEdit){
    S.schedEdit={};
    scWeeks.forEach(w=>{
      const sc=S.schedule[String(w)]||{};
      S.schedEdit[w]={l1role:sc.l1role||"",l1name:sc.l1name||"",l2role:sc.l2role||"",l2name:sc.l2name||"",prole:sc.prole||"",pname:sc.pname||""};
    });
  }

  const status=D({fontSize:"12px",color:"#94A3B8",marginTop:"6px",minHeight:"18px"},"");

  // 테이블 래퍼
  const tableWrap=document.createElement("div");
  Object.assign(tableWrap.style,{overflowX:"auto",borderRadius:"10px",border:"1px solid #E2E8F0"});

  const table=document.createElement("table");
  Object.assign(table.style,{width:"100%",borderCollapse:"collapse",fontSize:"12px"});

  // 헤더 행
  const thead=document.createElement("thead");
  const hrow=document.createElement("tr");
  Object.assign(hrow.style,{background:"#1E293B"});
  ["주차",...COLS].forEach(h=>{
    const th=document.createElement("th");
    th.textContent=h;
    Object.assign(th.style,{padding:"8px 6px",color:"#94A3B8",fontWeight:"700",
      fontSize:"11px",textAlign:"center",whiteSpace:"nowrap",
      borderRight:"1px solid #334155"});
    hrow.appendChild(th);
  });
  thead.appendChild(hrow);
  table.appendChild(thead);

  // 데이터 행
  const tbody=document.createElement("tbody");
  scWeeks.forEach((w,wi)=>{
    const tr=document.createElement("tr");
    Object.assign(tr.style,{background:wi%2===0?"#fff":"#F8FAFC",borderBottom:"1px solid #F1F5F9"});
    tr.addEventListener("mouseenter",()=>tr.style.background="#EFF6FF");
    tr.addEventListener("mouseleave",()=>tr.style.background=wi%2===0?"#fff":"#F8FAFC");

    // 주차 셀
    const wkTd=document.createElement("td");
    wkTd.textContent=w===0?"0주차":w+"주차";
    Object.assign(wkTd.style,{padding:"6px 8px",fontWeight:"700",fontSize:"12px",
      color:"#475569",textAlign:"center",whiteSpace:"nowrap",
      borderRight:"1px solid #F1F5F9",background:"#F8FAFC"});
    tr.appendChild(wkTd);

    // 편집 셀
    KEYS.forEach((key,ki)=>{
      const td=document.createElement("td");
      Object.assign(td.style,{padding:"3px 4px",borderRight:"1px solid #F1F5F9"});
      const inp=document.createElement("input");
      inp.value=S.schedEdit[w][key];
      inp.placeholder=COLS[ki];
      Object.assign(inp.style,{width:"100%",boxSizing:"border-box",
        border:"1px solid transparent",borderRadius:"6px",
        padding:"5px 6px",fontSize:"12px",color:"#1E293B",
        background:"transparent",outline:"none",
        fontFamily:"inherit"});
      inp.addEventListener("focus",()=>{inp.style.border="1px solid #3B82F6";inp.style.background="#fff";});
      inp.addEventListener("blur",()=>{inp.style.border="1px solid transparent";inp.style.background="transparent";});
      inp.addEventListener("input",()=>{S.schedEdit[w][key]=inp.value;});
      // Tab 키로 다음 셀 이동
      inp.addEventListener("keydown",e=>{
        if(e.key==="Enter"){saveBtn.click();}
      });
      td.appendChild(inp);
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
  table.appendChild(tbody);
  tableWrap.appendChild(table);

  const saveBtn=B({width:"100%",background:"#1E293B",color:"#fff",border:"none",
    borderRadius:"10px",padding:"12px",fontWeight:"700",fontSize:"14px",cursor:"pointer",marginTop:"10px"},
    async()=>{
      try{
        const parsed={};
        scWeeks.forEach(w=>{
          const d=S.schedEdit[w];
          if(d.l1name||d.l2name||d.pname) parsed[String(w)]=d;
        });
        await fbSave("schedule",parsed);
        S.schedule=parsed;
        S.schedEdit=null; // 버퍼 초기화
        status.textContent="✅ 저장됐어요!";
        status.style.color="#22C55E";
        render();
      } catch(e){
        status.textContent="❌ 저장 실패: "+e.message;
        status.style.color="#EF4444";
      }
    },"💾 저장");

  return D({},
    D({fontSize:"12px",color:"#94A3B8",marginBottom:"10px"},
      "셀을 클릭해서 바로 수정하고, 저장 버튼으로 한 번에 반영해요."),
    tableWrap,
    status,
    saveBtn
  );
}

function buildAwardsTab(){
  const wd=getWD();

  // ── 상태 초기화 ──
  if(!S.awPerspective) S.awPerspective="team";      // "team" | "handbook"
  if(!S.awClub)        S.awClub="all";              // "all" | "sparks" | "tnt"
  if(!S.awTeamSel)     S.awTeamSel="rank";          // "rank" | team id
  if(!S.awHbSel)       S.awHbSel=null;

  const sparksHbs=["행글라이더","윙러너","스카이스토머"];
  const tntHbs=["어드벤처1","어드벤처2","챌린지1","챌린지2"];
  const sparksGrp=HB_GROUPS.find(g=>g.label==="Sparks");
  const tntGrp=HB_GROUPS.find(g=>g.label==="T&T");

  // 현재 클럽 필터에 맞는 핸드북 목록
  function clubHbs(){
    if(S.awClub==="sparks") return sparksHbs;
    if(S.awClub==="tnt")    return tntHbs;
    return [...sparksHbs,...tntHbs];
  }

  // awHbSel 유효성 확인
  const validHbs=clubHbs();
  if(!S.awHbSel||!validHbs.includes(S.awHbSel)) S.awHbSel=validHbs[0]||null;

  // ── 공통 helpers ──
  function awardItems(sid,hb){
    const a=wd?.students?.[sid]?.awards; if(!a) return [];
    const items=[];
    const attInfo=getAttAwardInfo(S.week);
    if(attInfo && calcAttAward(sid,attInfo.week,attInfo.allow))
      items.push({label:"출석상",color:"#7C3AED",bg:"#F5F3FF",border:"#DDD6FE"});
    if(getAwardGroup(hb)==="sparks"){
      const hbc=HB_BADGE_COLOR[hb]||{color:"#22C55E",light:"#F0FDF4",border:"#86EFAC"};
      if(a.enroll) items.push({label:hb+" 입단",color:hbc.color,bg:hbc.light,border:hbc.border});
      if(a.badge) items.push({label:HB_BADGE_LABEL[hb]||"승급표식",color:hbc.color,bg:hbc.light,border:hbc.border});
      if(a.wing)  items.push({label:HB_WING_LABEL[hb]||"날개핀",color:hbc.color,bg:hbc.light,border:hbc.border});
      if(a.gems){
        const pastG=getPastAwards(sid).gems||0;
        GEM_SEQ.slice(pastG,pastG+a.gems).forEach(tid=>{
          const gc=TEAMS.find(x=>x.id===tid);
          items.push({label:tid==="red"?"빨강 보석":"초록 보석",color:gc.color,bg:gc.light,border:gc.border});
        });
      }
    } else {
      const hbc=HB_TNT_COLOR[hb]||{color:"#64748B",light:"#F8FAFC",border:"#E2E8F0"};
      if(a.enroll) items.push({label:hb+" 입단",color:hbc.color,bg:hbc.light,border:hbc.border});
      if(a.award) items.push({label:hb+" 수상대",color:hbc.color,bg:hbc.light,border:hbc.border});
      (a.seals||[]).sort((x,y)=>parseInt(x)-parseInt(y))
        .forEach(s=>items.push({label:s,color:hbc.color,bg:hbc.light,border:hbc.border}));
    }
    return items;
  }

  function mkStudentAwardRow(s,hb,idx,total){
    const items=awardItems(s.id,hb);
    const sd=wd?.students?.[s.id]||{attendance:false,uniform:false,signs:0};
    const locked2=isLocked();
    const t=getTeam(s.team);
    const signs=typeof sd.signs==="number"?sd.signs:parseFloat(sd.signs)||0;

    const row=D({display:"flex",flexDirection:"column",
      borderBottom:idx<total-1?"1px solid #F1F5F9":"none",
      padding:"10px 12px",
      background:"#fff",
      opacity:sd.attendance?1:0.4,
      transition:"opacity 0.15s"});

    // ── 이름+도트+암송 / 수상 뱃지들 ──
    const topRow=D({display:"flex",alignItems:"center",gap:"8px"});

    topRow.appendChild(D({display:"flex",alignItems:"center",gap:"6px",flexShrink:"0"},
      D({width:"9px",height:"9px",borderRadius:"50%",background:t.color,flexShrink:"0"}),
      SP({fontWeight:"700",fontSize:"18px",color:"#1E293B"},s.name),
      signs>0?SP({fontSize:"14px",fontWeight:"700",color:"#D97706"},signs+"개"):null
    ));

    topRow.appendChild(D({flex:"1",display:"flex",flexWrap:"wrap",gap:"4px",alignItems:"center"},
      items.length
        ? items.map(it=>SP({background:it.bg,borderRadius:"6px",
            padding:"4px 10px",border:"1px solid "+it.border,
            fontWeight:"700",fontSize:"13px",color:it.color},it.label))
        : [SP({fontSize:"13px",color:"#CBD5E1"},"수상 없음")]
    ));

    row.appendChild(topRow);

    const memo=wd?.students?.[s.id]?.memo||"";
    if(memo) row.appendChild(D({marginTop:"6px",fontSize:"11px",color:"#64748B",
      display:"flex",alignItems:"flex-start",gap:"4px"},
      SP({color:"#94A3B8",flexShrink:"0"},"📝"),SP({},memo)));

    return row;
  }

  // ════════════════════════════
  //  1단계: 관점 탭
  // ════════════════════════════
  const perspectiveTabs=D({display:"flex",gap:"6px",marginBottom:"12px"},
    ...[["team","🏆 팀별"],["handbook","📖 핸드북별"]].map(([id,label])=>
      B({flex:"1",padding:"10px 0",borderRadius:"10px",border:"none",cursor:"pointer",
        fontWeight:"700",fontSize:"14px",
        background:S.awPerspective===id?"#1E293B":"#F1F5F9",
        color:S.awPerspective===id?"#fff":"#64748B"},
        ()=>{S.awPerspective=id;S.awTeamSel="rank";S.awHbSel=null;render();},label)
    )
  );

  // ════════════════════════════
  //  3단계 + 콘텐츠
  // ════════════════════════════
  let detailSection;

  if(S.awPerspective==="team"){
    // ── 팀별 보기: 순위 카드만 ──
    const sorted=[...TEAMS].sort((a,b)=>totalScore(b.id)-totalScore(a.id));

    // 동점 처리: 같은 점수면 같은 등수
    const rankOf={};
    let ri=1;
    for(let i=0;i<sorted.length;){
      let j=i;
      while(j<sorted.length&&totalScore(sorted[j].id)===totalScore(sorted[i].id)) j++;
      for(let k=i;k<j;k++) rankOf[sorted[k].id]=ri;
      ri+=j-i;
      i=j;
    }

    function teamHbScore(tid){
      return S.students.filter(s=>s.team===tid&&[...sparksHbs,...tntHbs].includes(s.handbook))
        .reduce((sum,st)=>sum+stuScore(st.id),0);
    }

    const rankCards=sorted.map((t,i)=>{
      const gameSpk=wd.gameFinalized?rankScores("sparks")[t.id]:0;
      const gameTnt=wd.gameFinalized?rankScores("tnt")[t.id]:0;
      const total=totalScore(t.id);
      const totalCount=S.students.filter(s=>s.team===t.id).length;
      const attCount=S.students.filter(s=>s.team===t.id&&(wd.students?.[s.id]||{}).attendance).length;
      const rank=rankOf[t.id];

      function clubStats(hbs, gameScore){
        const members=S.students.filter(s=>s.team===t.id&&hbs.includes(s.handbook));
        const att=members.filter(s=>(wd.students?.[s.id]||{}).attendance).length;
        const uni=members.filter(s=>(wd.students?.[s.id]||{}).uniform).length;
        const signs=members.reduce((sum,s)=>{
          const v=(wd.students?.[s.id]||{}).signs||0;
          return sum+(typeof v==="number"?v:parseFloat(v)||0);
        },0);
        const hbScore=members.reduce((sum,s)=>sum+stuScore(s.id),0);
        return {count:members.length,att,uni,signs,gameScore:gameScore||0,total:hbScore+(wd.gameFinalized?(gameScore||0):0)};
      }
      const spkStats=clubStats(sparksHbs,gameSpk);
      const tntStats=clubStats(tntHbs,gameTnt);

      const card=D({background:"#fff",borderRadius:"12px",
        border:`2px solid ${t.border}`,
        padding:"12px 14px",marginBottom:"10px"});

      // 헤더
      const totalSigns=Math.round((spkStats.signs+tntStats.signs)*10)/10;
      const bonus=getBonus(t.id);
      const isAdminRole=S.role==="admin";
      const bonusEl=isAdminRole?D({display:"flex",alignItems:"center",gap:"4px"},
        B({background:"#F1F5F9",border:"1px solid #E2E8F0",borderRadius:"6px",
          padding:"2px 8px",fontSize:"14px",fontWeight:"700",cursor:"pointer",color:"#475569"},
          async()=>await setBonus(t.id,bonus-50),"−"),
        bonus>0?SP({fontSize:"13px",fontWeight:"700",color:"#2563EB",minWidth:"36px",textAlign:"center"},
          "+"+bonus.toLocaleString()):SP({fontSize:"13px",color:"#CBD5E1",minWidth:"36px",textAlign:"center"},"0"),
        B({background:"#F1F5F9",border:"1px solid #E2E8F0",borderRadius:"6px",
          padding:"2px 8px",fontSize:"14px",fontWeight:"700",cursor:"pointer",color:"#475569"},
          async()=>await setBonus(t.id,bonus+50),"+")
      ):bonus>0?SP({fontSize:"13px",fontWeight:"700",color:"#2563EB"},"+"+bonus.toLocaleString()):null;
      card.appendChild(D({display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"10px"},
        D({display:"flex",alignItems:"center",gap:"6px",flexWrap:"wrap"},
          SP({fontSize:"15px",fontWeight:"700",color:"#94A3B8"},rank+"위"),
          SP({fontSize:"15px"},TEAM_DOTS[t.id]),
          SP({fontWeight:"800",color:t.color,fontSize:"17px"},t.name+"팀"),
          SP({fontSize:"14px",color:"#94A3B8"},attCount+"/"+totalCount+"명"),
          SP({fontSize:"14px",color:"#CBD5E1"},"·"),
          SP({fontSize:"14px",color:"#94A3B8"},"암송 "+totalSigns+"개"),
          bonusEl
        ),
        SP({fontWeight:"800",fontSize:"19px",color:t.color},total.toLocaleString()+"점")
      ));

      function mkClubBox(stats,type){
        const grpColor=type==="sparks"?"#EF4444":"#16A34A";
        const hbPts=stats.signs*50+(stats.att*50)+(stats.uni*50); // 핸드북 점수
        const box=D({background:"#F8FAFC",borderRadius:"10px",padding:"10px 12px",
          border:"1px solid #E2E8F0",
          display:"flex",flexDirection:"column",gap:"6px",flex:"1"});
        // 클럽 헤더 (클릭 시 멤버 팝업)
        const hbs=type==="sparks"?sparksHbs:tntHbs;
        const members=S.students.filter(s=>s.team===t.id&&hbs.includes(s.handbook))
          .sort((a,b)=>a.name.localeCompare(b.name,"ko"));
        const hdr=D({display:"flex",alignItems:"center",gap:"4px",marginBottom:"2px",
          cursor:"pointer",borderRadius:"6px",padding:"2px 4px",
          transition:"background 0.15s"},
          (()=>{const h=document.createElement("div");h.style.cssText="display:flex;align-items:center;gap:4px;width:100%";
          h.appendChild(type==="sparks"?mkSparksIcon(14):mkTntIcon(14));
          h.appendChild(SP({fontSize:"16px",fontWeight:"800",color:grpColor},type==="sparks"?" 스팍스":" 티앤티"));
          h.appendChild(SP({fontSize:"11px",color:"#94A3B8",marginLeft:"auto"},"👆"));
          return h;})()
        );
        hdr.addEventListener("mouseenter",()=>hdr.style.background="#F1F5F9");
        hdr.addEventListener("mouseleave",()=>hdr.style.background="");
        const _isAdminForPopup=S.role==="admin"||S.role==="game";
        hdr.addEventListener("click",()=>{
          // 기존 팝업 제거
          const prev=document.getElementById("_memberPopup");if(prev)prev.remove();
          const overlay=document.createElement("div");
          overlay.id="_memberPopup";
          overlay.style.cssText="position:fixed;inset:0;background:rgba(0,0,0,0.35);z-index:500;display:flex;align-items:flex-end;justify-content:center";
          overlay.addEventListener("click",e=>{if(e.target===overlay)overlay.remove();});
          const sheet=document.createElement("div");
          sheet.style.cssText="background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:480px;padding:20px 20px 40px;max-height:70vh;overflow-y:auto";
          // 헤더
          const sheetHdr=document.createElement("div");
          sheetHdr.style.cssText="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px";
          const titleEl=document.createElement("div");
          titleEl.style.cssText="display:flex;align-items:center;gap:6px;font-weight:800;font-size:16px";
          titleEl.appendChild(type==="sparks"?mkSparksIcon(16):mkTntIcon(16));
          titleEl.appendChild(document.createTextNode((t.name+"팀 ")+(type==="sparks"?"스팍스":"티앤티")+" ("+members.length+"명)"));
          const closeBtn=document.createElement("button");
          closeBtn.textContent="×";closeBtn.style.cssText="background:none;border:none;font-size:22px;cursor:pointer;color:#64748B";
          closeBtn.onclick=()=>overlay.remove();
          sheetHdr.appendChild(titleEl);sheetHdr.appendChild(closeBtn);
          sheet.appendChild(sheetHdr);
          if(members.length===0){
            const empty=document.createElement("div");
            empty.style.cssText="text-align:center;color:#94A3B8;font-size:14px;padding:20px";
            empty.textContent="멤버가 없어요";
            sheet.appendChild(empty);
          } else {
            members.forEach(s=>{
              const sd=getSD(s.id);
              const signs=typeof sd.signs==="number"?sd.signs:parseFloat(sd.signs)||0;
              const row=document.createElement("div");
              const attended=(wd.students?.[s.id]||{}).attendance;
              row.style.cssText="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #F1F5F9;opacity:"+(!attended?"0.4":"1");
              const nameEl=document.createElement("div");
              nameEl.style.cssText="display:flex;align-items:center;gap:8px";
              const dot=document.createElement("div");
              dot.style.cssText="width:8px;height:8px;border-radius:50%;background:"+(!attended?"#CBD5E1":t.color)+";flex-shrink:0";
              const nm=document.createElement("span");
              nm.style.cssText="font-weight:700;font-size:15px;color:"+(!attended?"#94A3B8":"#1E293B");
              nm.textContent=s.name;
              const hbTag=document.createElement("span");
              hbTag.style.cssText="font-size:11px;color:#94A3B8;background:#F1F5F9;border-radius:4px;padding:1px 6px";
              hbTag.textContent=s.handbook;
              nameEl.appendChild(dot);nameEl.appendChild(nm);nameEl.appendChild(hbTag);
              const signsEl=document.createElement("span");
              signsEl.style.cssText="font-size:13px;font-weight:700;color:"+(!attended?"#CBD5E1":"#475569");
              signsEl.textContent=_isAdminForPopup?((!attended||signs===0)?"-개":"암송 "+Math.round(signs*10)/10+"개"):"";
              row.appendChild(nameEl);row.appendChild(signsEl);
              sheet.appendChild(row);
            });
          }
          overlay.appendChild(sheet);
          document.body.appendChild(overlay);
        });
        box.appendChild(hdr);
        // 한 줄: 핸드북 + 게임 점수
        const hbPts_=(stats.total-(wd.gameFinalized?stats.gameScore:0));
        const gmPts_=(wd.gameFinalized?stats.gameScore:0);
        box.appendChild(D({display:"flex",alignItems:"center",gap:"8px",flexWrap:"wrap"},
          SP({fontSize:"13px",color:"#94A3B8"},"📖"),
          SP({fontSize:"14px",fontWeight:"700",color:"#1E293B"},hbPts_.toLocaleString()+"점"),
          SP({fontSize:"12px",color:"#E2E8F0"},"|"),
          SP({fontSize:"13px",color:wd.gameFinalized?"#94A3B8":"#CBD5E1"},"🏃"),
          SP({fontSize:"14px",fontWeight:"700",color:wd.gameFinalized?"#1E293B":"#CBD5E1"},gmPts_.toLocaleString()+"점")
        ));
        return box;
      }

      const hasSpk=spkStats.count>0, hasTnt=tntStats.count>0;
      if(hasSpk||hasTnt){
        const clubRow=D({display:"flex",gap:"8px",flexWrap:"wrap"});
        if(hasSpk) clubRow.appendChild(mkClubBox(spkStats,"sparks"));
        if(hasSpk&&hasTnt) clubRow.appendChild(D({width:"1px",background:"#E2E8F0",alignSelf:"stretch"}));
        if(hasTnt) clubRow.appendChild(mkClubBox(tntStats,"tnt"));
        card.appendChild(clubRow);
      }
      return card;
    });

    const ceremonyBtn=wd.gameFinalized
      ?B({width:"100%",background:"#0EA5E9",color:"#fff",
        border:"none",borderRadius:"12px",padding:"13px",fontWeight:"800",fontSize:"15px",
        cursor:"pointer",marginBottom:"12px"},async()=>{
        const snap=await getDoc(doc(db,"awana","week_"+S.week));
        if(snap.exists()) S.wdata[S.week]=snap.data();
        startCeremony();
      },"🏆 시상식 공개")
      :null;

    detailSection=D({},
      ceremonyBtn,
      ...rankCards,
      !wd.gameFinalized?D({background:"#F8FAFC",border:"1px solid #E2E8F0",borderRadius:"10px",
        padding:"10px 14px",fontSize:"13px",color:"#64748B"},"⚠️ 게임 결과가 아직 확정되지 않았습니다."):null
    );

  } else {
    // ── 핸드북별 보기: 전체 펼침 (칩 선택 없음) ──
    // validHbs 기준으로 각 핸드북을 소제목 + 명단으로 나열

    const hbSections=D({});

    validHbs.forEach((hb,hbIdx)=>{
      const isSpks=sparksHbs.includes(hb);
      const grpColor=isSpks?sparksGrp.color:tntGrp.color;

      // 스팍스→티앤티 경계에 클럽 구분선 삽입 (전체 보기일 때)
      if(S.awClub==="all" && hb===tntHbs[0]){
        const divBtn=D({display:"flex",alignItems:"center",gap:"6px",
          margin:"14px 0 10px",padding:"8px 14px",
          background:"#F0FDF4",borderRadius:"10px",
          border:"1px solid #BBF7D0"});
        divBtn.appendChild(mkTntIcon(15));
        divBtn.appendChild(SP({fontWeight:"700",fontSize:"15px",color:"#16A34A"},"티앤티"));
        hbSections.appendChild(divBtn);
      }
      // 스팍스 첫 번째에도 레이블
      if(S.awClub==="all" && hb===sparksHbs[0]){
        const divBtn=D({display:"flex",alignItems:"center",gap:"6px",
          marginBottom:"10px",padding:"8px 14px",
          background:"#FFF0F0",borderRadius:"10px",
          border:"1px solid #FECACA"});
        divBtn.appendChild(mkSparksIcon(15));
        divBtn.appendChild(SP({fontWeight:"700",fontSize:"15px",color:"#EF4444"},"스팍스"));
        hbSections.appendChild(divBtn);
      }

      const stuList=S.students.filter(s=>s.handbook===hb)
        .sort((a,b)=>stuScore(b.id)-stuScore(a.id)||a.name.localeCompare(b.name,"ko"));

      const awardedCount=stuList.filter(s=>awardItems(s.id,hb).length).length;
      const attCount=stuList.filter(s=>(wd?.students?.[s.id]||{}).attendance).length;
      const absentCount=stuList.length-attCount;
      const uniCount=stuList.filter(s=>(wd?.students?.[s.id]||{}).uniform).length;
      const signsCount=stuList.reduce((sum,s)=>{
        const v=(wd?.students?.[s.id]||{}).signs||0;
        return sum+(typeof v==="number"?v:parseFloat(v)||0);
      },0);
      const allAtt2=stuList.length>0&&stuList.every(s=>(wd?.students?.[s.id]||{}).attendance);
      const locked3=isLocked();

      // 핸드북 소제목 헤더
      const hdrWrap=D({marginBottom:"6px"});

      // 헤더: 핸드북명
      const hdr1=D({
        display:"flex",alignItems:"center",justifyContent:"space-between",
        padding:"8px 0 8px",
        borderBottom:`2px solid ${grpColor}`
      },
        D({display:"flex",alignItems:"center",gap:"8px",flexWrap:"wrap"},
          D({width:"7px",height:"7px",borderRadius:"50%",background:grpColor,flexShrink:"0"}),
          SP({fontWeight:"700",fontSize:"16px",color:"#1E293B"},hb),
          awardedCount>0?SP({fontSize:"10px",fontWeight:"700",color:grpColor,
            background:"#F8FAFC",borderRadius:"6px",padding:"1px 6px",
            border:`1px solid ${grpColor}`},"시상 "+awardedCount):null
        )
      );
      hdrWrap.appendChild(hdr1);
      hbSections.appendChild(hdrWrap);

      // 명단
      if(stuList.length===0){
        hbSections.appendChild(mkEmpty());
      } else {
        const listEl=D({background:"#fff",borderRadius:"10px",
          border:`1px solid #E2E8F0`,overflow:"hidden",marginBottom:"16px"});
        stuList.forEach((s,i)=>listEl.appendChild(mkStudentAwardRow(s,hb,i,stuList.length)));
        hbSections.appendChild(listEl);
      }
    });

    detailSection=hbSections.children.length
      ? hbSections
      : mkEmpty();
  }

  // ── 특이사항 공유 버튼 ──
  const sparksHbsList=["행글라이더","윙러너","스카이스토머"];
  const advHbsList=["어드벤처1","어드벤처2"];
  const chalHbsList=["챌린지1","챌린지2"];
  if(!S.memoFilter) S.memoFilter="all";

  function buildMemoText(filter){
    const dateStr=WEEK_DATES[S.week]||"";
    const weekLabel=`[${S.week}주차 ${dateStr}]`;
    let students=S.students;
    if(filter==="sparks") students=students.filter(s=>sparksHbsList.includes(s.handbook));
    else if(filter==="adventure") students=students.filter(s=>advHbsList.includes(s.handbook));
    else if(filter==="challenge") students=students.filter(s=>chalHbsList.includes(s.handbook));

    const lines=[];
    students.forEach(s=>{
      const sd=wd?.students?.[s.id]||{};
      const memo=(sd.memo||"").trim();
      const absent=!sd.attendance;
      const noUniform=sd.attendance&&!sd.uniform;
      const aw=sd.awards||{};
      const enrolled=!!(aw.enroll||s.enroll);
      const noUniformAfterEnroll=enrolled&&sd.attendance&&!sd.uniform;
      const parts=[];
      if(absent) parts.push("결석");
      if(noUniformAfterEnroll) parts.push("단복 없음");
      if(memo) parts.push(memo);
      if(parts.length) lines.push(`[${s.name}] ${parts.join(" / ")}`);
    });
    if(!lines.length) return weekLabel+"\n특이사항 없음";
    return weekLabel+"\n"+lines.join("\n");
  }
  function saveAsTxt(text){
    const weekStr=S.week===0?"0주차":S.week+"주차";
    const blob=new Blob([text],{type:"text/plain;charset=utf-8"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;a.download="어와나_"+weekStr+"_특이사항.txt";
    document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
  }

  const filterOptions=[["all","전체"],["sparks","스팍스"],["adventure","어드벤처"],["challenge","챌린지"]];
  const filterRow=D({display:"flex",gap:"6px",flex:"1"});
  filterOptions.forEach(([val,label])=>{
    const active=S.memoFilter===val;
    filterRow.appendChild(B({
      padding:"8px 12px",borderRadius:"10px",border:`1px solid ${active?"#1E293B":"#E2E8F0"}`,
      background:active?"#1E293B":"#fff",color:active?"#fff":"#64748B",
      fontWeight:"700",fontSize:"13px",cursor:"pointer",whiteSpace:"nowrap"
    },()=>{S.memoFilter=val;render();},label));
  });

  const shareBtn=B({background:"linear-gradient(135deg,#FEE500,#F5D800)",
    color:"#1E293B",border:"none",borderRadius:"10px",padding:"8px 14px",
    fontWeight:"800",fontSize:"13px",cursor:"pointer",whiteSpace:"nowrap",flexShrink:"0"
  },()=>{
    const text=buildMemoText(S.memoFilter);
    const weekStr=S.week===0?"0주차":S.week+"주차";
    if(navigator.share){navigator.share({title:"어와나 "+weekStr+" 특이사항",text}).catch(()=>saveAsTxt(text));}
    else{saveAsTxt(text);}
  },"📋 공유 / 저장");

  const shareRow=D({display:"flex",gap:"8px",alignItems:"center",marginTop:"12px"},
    filterRow,
    shareBtn
  );

  return D({},
    perspectiveTabs,
    detailSection,
    shareRow
  );
}

</script>
</body>
</html>
